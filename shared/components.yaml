# Shared Components — tools, models, and infrastructure common to all clusters
#
# These are borrowed by every cluster. The per-cluster builder flags them
# as shared:true so the UI can render them faded (visually distinct from
# cluster-specific nodes). Toggle "Show shared" to reveal/hide them.

tools:
  - get_workspace_inventory
  - get_git_state
  - validate_agent_imports
  - check_service_health
  - execute_bash_command
  - read_host_file
  - write_host_file
  - get_crm_health_snapshot
  - list_recent_crm_leads
  - log_groceries
  - get_grocery_log
  - add_reminder

models:
  - gpt-5.5
  - glm-5.2
  - nvidia-deepseek-v4-flash

connections:
  github: GitHub (OAuth)
  resend: Resend (email)
  cloudflare-global: Cloudflare (global)
  frappe-crm: Frappe CRM (ff-ops-prod)

tool_connections:
  get_crm_health_snapshot: frappe-crm
  list_recent_crm_leads: frappe-crm
