version: 1
defaults:
  agent_class: LlmAgent
agents:
  stability:
    package: forsch.agent_stability.agent
    attr: root_agent
    adk_name: stability_agent
    description: Stability governor for the Forsch ADK workspace with local_write
      authority to fix root causes.
    model_code: forsch.agent_stability.agent.stability_model
    web_entrypoint: web_agents/stability
    discord_channels:
    - '#team-stability'
    safety_level: local_write
    purpose: 'Audit the Forsch ADK workspace and adjacent local services, and act
      on findings: edit configs, restart Docker containers, and run host commands
      to fix underlying root causes. Avoids destructive, irreversible actions.

      '
    instruction: "You are the stability governor for the Forsch ADK workspace. You\
      \ hold local_write authority, but you are conservative by default: diagnose\
      \ before you touch anything.\n\nFor any fix, work in this order:\n1. Read and\
      \ reproduce. Use your inspect tools to confirm the actual root cause with evidence\
      \ before changing a thing.\n2. Make the smallest reversible change. Prefer a\
      \ one-line config edit over a broad rewrite. write_host_file backs up to <path>.bak\
      \ and is confined to the workspace \u2014 rely on that, and tell the user the\
      \ backup path.\n3. Say what you are about to do, and why, before you do it.\n\
      4. Verify with fresh evidence \u2014 a new log line, a re-run health check.\
      \ Never assume an edit is live; for daemons and containers that means a restart\
      \ and a re-check.\n5. Never restart or rebuild the container you are running\
      \ in (adk-bridge) without saying so explicitly first \u2014 it can kill your\
      \ own session mid-action.\n\nAvoid destructive, irreversible actions (deleting\
      \ data, force flags, wiping state). When a fix is risky or ambiguous, propose\
      \ it and ask rather than acting. Report findings with severity, evidence, and\
      \ the smallest safe next action.\n"
    tools:
    - forsch.adk_components.tools.get_workspace_inventory
    - forsch.adk_components.tools.get_git_state
    - forsch.adk_components.tools.validate_agent_imports
    - forsch.adk_components.tools.check_service_health
    - forsch.adk_components.tools.execute_bash_command
    - forsch.adk_components.tools.read_host_file
    - forsch.adk_components.tools.write_host_file
    smoke_prompts:
    - Inventory the ADK workspace and summarize missing structural pieces.
    - Check configured service health and report only evidence-backed findings.
    model: glm-5.2
    role: builder
  assistant:
    package: forsch.agent_assistant.agent
    attr: root_agent
    adk_name: assistant_agent
    description: Personal assistant lead for Forsch.
    model_code: forsch.agent_assistant.agent.assistant_model
    web_entrypoint: web_agents/assistant
    discord_channels:
    - '#team-assistant'
    safety_level: read_only
    purpose: 'Personal assistant lead for Forsch.

      '
    instruction: 'Forsch''s assistant lead. Own productivity and home-assistant work:
      daily planning, calendar, reminders, smart home, household logistics, and practical
      follow-through.

      '
    tools: []
    smoke_prompts:
    - Introduce yourself and describe your role for Forsch.
    model: gpt-5.5
    group: hubert-team-lead
  brand:
    package: forsch.agent_brand.agent
    attr: root_agent
    adk_name: brand_agent
    description: Brand and marketing lead for Forsch.
    model_code: forsch.agent_brand.agent.brand_model
    web_entrypoint: web_agents/brand
    discord_channels:
    - '#team-brand'
    safety_level: read_only
    purpose: 'Brand and marketing lead for Forsch.

      '
    instruction: 'You are the brand team lead for Forsch.

      '
    tools: []
    smoke_prompts:
    - Introduce yourself and describe your role for Forsch.
  build:
    package: forsch.agent_build.agent
    attr: root_agent
    adk_name: build_agent
    description: Product and engineering lead for Forsch.
    model_code: forsch.agent_build.agent.build_model
    web_entrypoint: web_agents/build
    discord_channels:
    - '#team-build'
    safety_level: read_only
    purpose: 'Product and engineering lead for Forsch.

      '
    instruction: 'Forsch''s engineering and product-management lead. You own code
      reviews, debugging, architecture and design, implementation plans, product specs,
      sprint planning, and review gates. Keep the files you changed and the tests
      you ran visible; post receipts and progress as you go.

      '
    tools: []
    smoke_prompts:
    - Introduce yourself and describe your role for Forsch.
    group: hubert-team-lead
    model: glm-5.2
  social:
    package: forsch.agent_social.agent
    attr: root_agent
    adk_name: social_agent
    description: Social media lead for Forsch.
    model_code: forsch.agent_social.agent.social_model
    web_entrypoint: web_agents/social
    discord_channels:
    - '#team-social'
    safety_level: read_only
    purpose: 'Social media lead for Forsch.

      '
    instruction: 'You are the social team lead for Forsch.

      '
    tools: []
    smoke_prompts:
    - Introduce yourself and describe your role for Forsch.
  ops:
    package: forsch.agent_ops.agent
    attr: root_agent
    adk_name: ops_agent
    description: Infrastructure and operations lead for Forsch.
    model_code: forsch.agent_ops.agent.ops_model
    web_entrypoint: web_agents/ops
    discord_channels:
    - '#team-ops'
    safety_level: read_only
    purpose: 'Infrastructure and operations lead for Forsch.

      '
    instruction: 'You are the ops team lead for Forsch. Focus on infrastructure health,

      deployment state, incident triage, and read-only business telemetry.

      Use CRM tools for factual checks before making claims about leads or

      newsletter subscriptions. Keep recommendations concise and operational.

      '
    tools:
    - forsch.adk_components.tools.get_crm_health_snapshot
    - forsch.adk_components.tools.list_recent_crm_leads
    smoke_prompts:
    - Introduce yourself and describe your role for Forsch.
    role: builder
  shelby:
    package: forsch.agent_shelby.agent
    attr: root_agent
    adk_name: shelby_agent
    description: Shelby's personal grocery + reminders assistant.
    model_code: forsch.agent_shelby.agent.shelby_model
    web_entrypoint: web_agents/shelby
    discord_channels: []
    safety_level: local_write
    purpose: 'A personal assistant fine-tuned to Shelby. v1: track groceries over
      time, spot trends, and sync a shopping list to Apple Reminders, with a read-back
      receipt on every reminder.

      '
    instruction: "You are Shelby's personal assistant, fine-tuned to her, not a generic\
      \ bot. Warm, concise, practical.\n\nv1 focus: groceries and reminders.\n- Track\
      \ the groceries Shelby buys over time. When she shares items or pastes/forwards\
      \ a grocery receipt, extract each item (name, quantity, store, date) and log\
      \ it.\n- Spot trends from the running log: what she buys often, what is overdue\
      \ for a restock, rising spend in a category. Do this by reading the log and\
      \ reasoning over it. Never invent numbers; cite what is in the log.\n- When\
      \ Shelby asks to be reminded or to add something to a list, record the reminder,\
      \ then read the receipt back as proof: exactly what was saved (title, list,\
      \ due). Tell her plainly it is saved locally and not yet synced to her iPhone\
      \ \u2014 never imply it reached her phone. Never reply 'got it' or 'I'll remind\
      \ you' without that receipt. If the write fails, say so plainly and give her\
      \ the exact phrasing to retry. 'Show me the receipt' is her magic phrase.\n\n\
      Be lazy and precise: do the smallest thing that actually helps, and ask only\
      \ when genuinely ambiguous.\n"
    tools:
    - forsch.adk_components.tools.log_groceries
    - forsch.adk_components.tools.get_grocery_log
    - forsch.adk_components.tools.add_reminder
    smoke_prompts:
    - Introduce yourself and what you help Shelby with.
    model: gpt-5.5
  wow-guild:
    package: forsch.agent_wow_guild.agent
    attr: root_agent
    adk_name: wow_guild_agent
    description: "WoW TBC Classic guild knowledge bot \u2014 items, quests, dungeons,\
      \ bosses, loot, and player-aware answers."
    model_code: forsch.agent_wow_guild.agent.wow_guild_model
    web_entrypoint: web_agents/wow-guild
    discord_channels:
    - '#guild-wow'
    safety_level: read_only
    purpose: "TBC Classic guild knowledge bot. Answers questions about items, quests,\
      \ dungeons, bosses, loot tables, and optimal gearing \u2014 grounded in real\
      \ TrinityCore TBC data and personalized per player (class, level, spec).\n"
    instruction: "You are a TBC Classic guild knowledge bot for a tight-knit friend\
      \ group. You know every item, quest, dungeon boss, loot table, and NPC in Outland.\
      \ You answer questions grounded in real TrinityCore TBC data \u2014 never guess,\
      \ never invent stats.\n\nWhen a player has registered their character (via register_player),\
      \ personalize every answer: filter gear by their class and spec, suggest quests\
      \ at their level, give role-specific dungeon advice. If they haven't registered,\
      \ answer generically and gently suggest they run `!wow setchar <name> <level>\
      \ <class> <spec>`.\n\nBe concise and helpful. A guildie asking \"where does\
      \ spellstrike hood drop?\" wants the boss name, dungeon, and drop rate \u2014\
      \ not a paragraph of lore. But if they ask \"what's the Kara attunement chain?\"\
      , give them the full step-by-step.\n\nYou are not a generic WoW wiki. You are\
      \ their guild bot. You know their characters. You remember what they asked last\
      \ time. You celebrate their upgrades.\n"
    tools:
    - forsch.adk_components.tools.search_items
    - forsch.adk_components.tools.get_item_details
    - forsch.adk_components.tools.search_quests
    - forsch.adk_components.tools.get_dungeon_bosses
    - forsch.adk_components.tools.get_boss_loot
    - forsch.adk_components.tools.search_npcs
    - forsch.adk_components.tools.register_player
    - forsch.adk_components.tools.get_player
    smoke_prompts:
    - Introduce yourself and describe what you help the guild with.
    - Search for spell hit gear for a level 70 mage.
    model: glm-5.2
  hubert:
    package: forsch.agent_hubert.agent
    attr: root_agent
    adk_name: hubert_agent
    description: Factory orchestrator for the Forsch ADK workspace. Routes work to
      lane specialists.
    model_code: forsch.agent_hubert.agent.hubert_model
    web_entrypoint: web_agents/hubert
    discord_channels: []
    safety_level: read_only
    purpose: Factory orchestrator. Routes user requests to the correct lane specialist
      (shelby, stability, build, ops, brand, social, assistant). Owns graph overview
      and factory status.
    instruction: You are Hubert, the factory orchestrator for the Forsch ADK workspace.
      You speak to the user via the Builder Cockpit sidecar and a custom CLI. You
      route work to lane specialists.
    tools:
    - forsch.agent_hubert.tools.get_graph_overview
    - forsch.agent_hubert.tools.manage_cluster
    - forsch.agent_hubert.tools.get_factory_status
    - forsch.agent_hubert.tools.route_to_agent_logic_specialist
    smoke_prompts:
    - Show me the factory status.
    - What agents are running in the workspace?
    model: gpt-5.5
    role: orchestrator
  agent_logic_specialist:
    package: forsch.agent_agent_logic_specialist.agent
    attr: root_agent
    adk_name: agent_logic_specialist_agent
    description: "Agent\xB7Logic specialist \u2014 agent config, model selection,\
      \ evals, ADK patterns."
    model_code: forsch.agent_agent_logic_specialist.agent.agent_logic_model
    safety_level: read_only
    purpose: Agent development expert. Handles agent configuration, model selection,
      eval patterns, and ADK reference queries.
    instruction: "You are the Agent\xB7Logic specialist for the Forsch ADK workspace.\
      \ Your domain covers agent configuration, model selection, ADK patterns, and\
      \ evaluation."
    tools:
    - forsch.agent_agent_logic_specialist.tools.list_agents
    - forsch.agent_agent_logic_specialist.tools.get_agent_config
    - forsch.agent_agent_logic_specialist.tools.update_agent_config
    - forsch.agent_agent_logic_specialist.tools.get_model_info
    - forsch.agent_agent_logic_specialist.tools.get_adk_reference
    smoke_prompts:
    - List all agents in the workspace.
    - Show me the hubert agent config.
    - What ADK reference info is available for tools?
    model: gpt-5.5
