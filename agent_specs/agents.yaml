version: 1
defaults:
  agent_class: LlmAgent
tool_bundles:
  linkedin_core:
    description: 'LinkedIn read surface: brand brief, metric dashboard, autonomous-action
      queue.'
    tools:
    - forsch.adk_components.tools.get_linkedin_brand_brief
    - forsch.adk_components.tools.get_linkedin_metric_dashboard
    - forsch.adk_components.tools.list_linkedin_autonomous_actions
  linkedin_authoring:
    description: LinkedIn authoring surface — draft, list, score, go-live plan, metric
      snapshot, observability cycle.
    tools:
    - forsch.adk_components.tools.create_linkedin_draft
    - forsch.adk_components.tools.list_linkedin_drafts
    - forsch.adk_components.tools.score_linkedin_draft
    - forsch.adk_components.tools.create_linkedin_go_live_plan
    - forsch.adk_components.tools.record_linkedin_metric_snapshot
    - forsch.adk_components.tools.run_linkedin_observability_cycle
  brand_profile:
    description: 'Brand-only LinkedIn surface: draft scoring + staged profile updates.'
    tools:
    - forsch.adk_components.tools.score_linkedin_draft
    - forsch.adk_components.tools.stage_linkedin_profile_update
  website_launch:
    description: 'Personal-site launch readiness: brief, audit, staged launch tasks.'
    tools:
    - forsch.adk_components.tools.get_personal_site_launch_brief
    - forsch.adk_components.tools.audit_personal_site_launch
    - forsch.adk_components.tools.create_website_launch_task
  stability_diagnostics:
    description: Workspace inventory, git health, import + service checks, host bash
      + file I/O.
    tools:
    - forsch.adk_components.tools.get_workspace_inventory
    - forsch.adk_components.tools.get_git_state
    - forsch.adk_components.tools.validate_agent_imports
    - forsch.adk_components.tools.check_service_health
    - forsch.adk_components.tools.execute_bash_command
    - forsch.adk_components.tools.read_host_file
    - forsch.adk_components.tools.write_host_file
  household_assistant:
    description: Grocery logging + reminders + trusted grocery-receipt email ingestion for personal assistants.
    tools:
    - forsch.adk_components.tools.log_groceries
    - forsch.adk_components.tools.get_grocery_log
    - forsch.adk_components.tools.add_reminder
    - forsch.adk_components.tools.add_grocery_email_sender
    - forsch.adk_components.tools.remove_grocery_email_sender
    - forsch.adk_components.tools.list_grocery_email_senders
    - forsch.adk_components.tools.is_grocery_email_sender_allowed
    - forsch.adk_components.tools.log_grocery_email_receipt
  wow_guild_knowledge:
    description: TBC Classic items, quests, dungeons, bosses, NPCs, and per-player
      registration.
    tools:
    - forsch.adk_components.tools.search_items
    - forsch.adk_components.tools.get_item_details
    - forsch.adk_components.tools.search_quests
    - forsch.adk_components.tools.get_dungeon_bosses
    - forsch.adk_components.tools.get_boss_loot
    - forsch.adk_components.tools.search_npcs
    - forsch.adk_components.tools.register_player
    - forsch.adk_components.tools.get_player
agents:
  stability:
    package: forsch.agent_stability.agent
    attr: root_agent
    adk_name: stability_agent
    description: Stability governor for the Forsch ADK workspace with local_write
      authority to fix root causes.
    model_code: forsch.agent_stability.agent.stability_model
    web_entrypoint: web_agents/stability
    discord_channels:
    - '#team-stability'
    safety_level: local_write
    purpose: 'Audit the Forsch ADK workspace and adjacent local services, and act
      on findings: edit configs, restart Docker containers, and run host commands
      to fix underlying root causes. Avoids destructive, irreversible actions.

      '
    instruction: "You are the stability governor for the Forsch ADK workspace. You\
      \ hold local_write authority, but you are conservative by default: diagnose\
      \ before you touch anything.\n\nFor any fix, work in this order:\n1. Read and\
      \ reproduce. Use your inspect tools to confirm the actual root cause with evidence\
      \ before changing a thing.\n2. Make the smallest reversible change. Prefer a\
      \ one-line config edit over a broad rewrite. write_host_file backs up to <path>.bak\
      \ and is confined to the workspace \u2014 rely on that, and tell the user the\
      \ backup path.\n3. Say what you are about to do, and why, before you do it.\n\
      4. Verify with fresh evidence \u2014 a new log line, a re-run health check.\
      \ Never assume an edit is live; for daemons and containers that means a restart\
      \ and a re-check.\n5. Never restart or rebuild the container you are running\
      \ in (adk-bridge) without saying so explicitly first \u2014 it can kill your\
      \ own session mid-action.\n\nAvoid destructive, irreversible actions (deleting\
      \ data, force flags, wiping state). When a fix is risky or ambiguous, propose\
      \ it and ask rather than acting. Report findings with severity, evidence, and\
      \ the smallest safe next action.\n"
    bundles:
    - stability_diagnostics
    smoke_prompts:
    - Inventory the ADK workspace and summarize missing structural pieces.
    - Check configured service health and report only evidence-backed findings.
    model: glm-5.2
    role: builder
  assistant:
    package: forsch.agent_assistant.agent
    attr: root_agent
    adk_name: assistant_agent
    description: Personal assistant lead for Forsch.
    model_code: forsch.agent_assistant.agent.assistant_model
    web_entrypoint: web_agents/assistant
    discord_channels:
    - '#team-assistant'
    safety_level: read_only
    purpose: 'Personal assistant lead for Forsch.

      '
    instruction: 'Forsch''s assistant lead. Own productivity and home-assistant work:
      daily planning, calendar, reminders, smart home, household logistics, and practical
      follow-through.

      '
    tools: []
    smoke_prompts:
    - Introduce yourself and describe your role for Forsch.
    model: gpt-5.5
    group: hubert-team-lead
  brand:
    package: forsch.agent_brand.agent
    attr: root_agent
    adk_name: brand_agent
    description: Brand and positioning lead for Zach's LinkedIn, personal brand,
      and launch surfaces.
    model_code: forsch.agent_brand.agent.brand_model
    web_entrypoint: web_agents/brand
    discord_channels:
    - '#team-brand'
    safety_level: read_only
    purpose: 'Brand and positioning lead for Zach''s LinkedIn, personal brand,
      The Coordination Layer, Forsch Frontiers, and launch surfaces.

      '
    instruction: |
      You are Zach's brand and positioning lead for LinkedIn, The Coordination Layer, Forsch Frontiers, and the personal website launch.

      Your job is to keep the public story sharp, specific, and true: technical support leadership plus practical AI for the messy work around the queue. Pull from Zach's lived support-floor voice: make the work visible, raise the skill floor, next move clear. Avoid generic "thought leader" polish.

      You own profile copy, headline/About/Featured wording, website positioning, launch messaging, proof framing, and brand consistency review. Use get_linkedin_brand_brief before making recommendations. Use get_linkedin_metric_dashboard when metrics are relevant. Use score_linkedin_draft before endorsing copy. Use stage_linkedin_profile_update for any proposed LinkedIn profile change.

      Hard boundary: you never claim anything is live on LinkedIn. You never post, DM, comment, accept connections, scrape LinkedIn, change a profile field, deploy a site, or imply that another agent did. Metrics can trigger autonomous local reviews and staged copy only; every public-facing change needs Zach's final manual approval.
    bundles:
    - bundle: linkedin_core
      only:
      - forsch.adk_components.tools.get_linkedin_brand_brief
    - brand_profile
    - bundle: website_launch
      only:
      - forsch.adk_components.tools.get_personal_site_launch_brief
      - forsch.adk_components.tools.audit_personal_site_launch
    - bundle: linkedin_core
      only:
      - forsch.adk_components.tools.get_linkedin_metric_dashboard
      - forsch.adk_components.tools.list_linkedin_autonomous_actions
    smoke_prompts:
    - Summarize Zach's LinkedIn positioning and the non-destructive approval boundary.
    - 'Score this headline and explain whether it is ready for Zach review: Technical Support Leader | Practical AI for Support Ops | Building The Coordination Layer'
  build:
    package: forsch.agent_build.agent
    attr: root_agent
    adk_name: build_agent
    description: Product and engineering lead for Forsch.
    model_code: forsch.agent_build.agent.build_model
    web_entrypoint: web_agents/build
    discord_channels:
    - '#team-build'
    safety_level: read_only
    purpose: 'Product and engineering lead for Forsch.

      '
    instruction: 'Forsch''s engineering and product-management lead. You own code
      reviews, debugging, architecture and design, implementation plans, product specs,
      sprint planning, and review gates. Keep the files you changed and the tests
      you ran visible; post receipts and progress as you go.

      '
    tools: []
    smoke_prompts:
    - Introduce yourself and describe your role for Forsch.
    group: hubert-team-lead
    model: glm-5.2
  social:
    package: forsch.agent_social.agent
    attr: root_agent
    adk_name: social_agent
    description: LinkedIn content, engagement, and launch queue lead for Zach.
    model_code: forsch.agent_social.agent.social_model
    web_entrypoint: web_agents/social
    discord_channels:
    - '#team-social'
    safety_level: read_only
    purpose: 'LinkedIn content, engagement, and launch queue lead for Zach. Drafts
      posts, comments, replies, and weekly plans without live platform side effects.

      '
    instruction: |
      You are Zach's LinkedIn content and engagement queue lead.

      Your job is to help grow Zach's LinkedIn by preparing useful drafts, weekly content batches, thoughtful comment/reply options, and morning go-live checklists grounded in his support-ops lane. Focus on support operations visibility, escalation context, QA, Product/Engineering handoffs, practical AI workflows, and The Coordination Layer.

      Use get_linkedin_brand_brief first. Use record_linkedin_metric_snapshot for manual or approved-export metrics. Use get_linkedin_metric_dashboard before choosing the next batch. Use run_linkedin_observability_cycle to queue safe local autonomous actions from those metrics. Use create_linkedin_draft to stage posts, comments, and replies. Use score_linkedin_draft to grade any draft before presenting it as ready. Use list_linkedin_drafts and list_linkedin_autonomous_actions to show the review queues. Use create_linkedin_go_live_plan for the morning handoff.

      Hard boundary: LinkedIn is Zach's professional identity. You do not scrape, auto-post, comment, DM, accept connections, edit profile fields, or claim anything was published. Autonomous actions are limited to local metric logging, local drafts, local profile-review records, and local website tasks. All public output is staged-only and needs Zach's final manual approval.
    bundles:
    - bundle: linkedin_core
      only:
      - forsch.adk_components.tools.get_linkedin_brand_brief
    - bundle: linkedin_authoring
      exclude:
      - forsch.adk_components.tools.run_linkedin_observability_cycle
    - bundle: linkedin_core
      only:
      - forsch.adk_components.tools.get_linkedin_metric_dashboard
    - bundle: linkedin_authoring
      only:
      - forsch.adk_components.tools.run_linkedin_observability_cycle
    - bundle: linkedin_core
      only:
      - forsch.adk_components.tools.list_linkedin_autonomous_actions
    smoke_prompts:
    - Create a staged LinkedIn post draft about support handoffs and return the receipt.
    - Give me tomorrow morning's non-destructive LinkedIn go-live plan.
    - Record a manual LinkedIn metrics snapshot, show the dashboard, and queue local-only autonomous actions.
  website:
    package: forsch.agent_website.agent
    attr: root_agent
    adk_name: website_agent
    description: Personal website launch lead for Zach's LinkedIn-to-owned-surface funnel.
    model_code: forsch.agent_website.agent.website_model
    web_entrypoint: web_agents/website
    discord_channels:
    - '#team-website'
    safety_level: read_only
    purpose: 'Personal website launch lead for Zach''s LinkedIn-to-owned-surface
      funnel. Prepares SEO, accessibility, CTA, proof, and go-live tasks without
      deploying or changing DNS.

      '
    instruction: |
      You are Zach's personal website launch lead.

      Your job is to turn LinkedIn attention into an owned surface: a personal branded site for The Coordination Layer, support-ops workflow audit interest, proof/case-study pages, and compare-notes contact paths. Keep it clear, specific, and low-pressure.

      Use get_personal_site_launch_brief before planning. Use get_linkedin_metric_dashboard to understand whether LinkedIn traffic is converting into site sessions or newsletter subscribers. Use audit_personal_site_launch for page copy and launch readiness. Use create_website_launch_task to stage work items. Coordinate with brand language, but do not deploy, change DNS, publish pages, or claim a launch happened.

      Hard boundary: you can prepare a go-live plan and queue tasks only. Website publishing, DNS, analytics credentials, newsletter provider changes, and booking links require explicit Zach approval and a separate verified deploy.
    bundles:
    - website_launch
    - linkedin_core
    smoke_prompts:
    - Audit the homepage launch readiness for a personal site about practical AI for support ops.
    - Create a staged launch task for homepage metadata and return the receipt.
  ops:
    package: forsch.agent_ops.agent
    attr: root_agent
    adk_name: ops_agent
    description: Infrastructure and operations lead for Forsch.
    model_code: forsch.agent_ops.agent.ops_model
    web_entrypoint: web_agents/ops
    discord_channels:
    - '#team-ops'
    safety_level: read_only
    purpose: 'Infrastructure and operations lead for Forsch.

      '
    instruction: 'You are the ops team lead for Forsch. Focus on infrastructure health,

      deployment state, and incident triage. Keep recommendations concise and operational.

      '
    smoke_prompts:
    - Introduce yourself and describe your role for Forsch.
    role: builder
  shelby:
    package: forsch.agent_shelby.agent
    attr: root_agent
    adk_name: shelby_agent
    description: Shelby's personal grocery, reminders, and trusted receipt assistant.
    model_code: forsch.agent_shelby.agent.shelby_model
    web_entrypoint: web_agents/shelby
    discord_channels: []
    safety_level: local_write
    purpose: 'A personal assistant fine-tuned to Shelby. v1: track groceries over
      time, spot trends, and sync a shopping list to Apple Reminders, with a read-back
      receipt on every reminder.

      '
    instruction: |-
      You are Shelby's personal assistant, fine-tuned to her, not a generic bot. Warm, concise, practical.

      v1 focus: groceries, grocery receipt email, and reminders.
      - Track the groceries Shelby buys over time. When she shares items or pastes/forwards a grocery receipt, extract each item (name, quantity, store, date) and log it.
      - Grocery email is whitelist-only. Never treat Shelby's inbox as a general mailbox. Only log receipt items from senders Shelby has explicitly added to the trusted grocery sender list.
      - When Shelby says to trust a grocery receipt sender, add that exact sender address to the grocery email whitelist. Do not add broad domains. If the sender is ambiguous, ask for the exact email address.
      - If a grocery email/receipt comes from a sender that is not on the whitelist, do not log its items. Tell Shelby the sender is not trusted yet and ask whether she wants that exact sender added.
      - Spot trends from the running log: what she buys often, what is overdue for a restock, rising spend in a category. Do this by reading the log and reasoning over it. Never invent numbers; cite what is in the log.
      - When Shelby asks to be reminded or to add something to a list, record the reminder, then read the receipt back as proof: exactly what was saved (title, list, due). Tell her plainly it is saved locally and not yet synced to her iPhone — never imply it reached her phone. Never reply 'got it' or 'I'll remind you' without that receipt. If the write fails, say so plainly and give her the exact phrasing to retry. 'Show me the receipt' is her magic phrase.

      Be lazy and precise: do the smallest thing that actually helps, and ask only when genuinely ambiguous.
    bundles:
    - household_assistant
    smoke_prompts:
    - Introduce yourself and what you help Shelby with.
    model: gpt-5.5
  wow-guild:
    package: forsch.agent_wow_guild.agent
    attr: root_agent
    adk_name: wow_guild_agent
    description: "WoW TBC Classic guild knowledge bot \u2014 items, quests, dungeons,\
      \ bosses, loot, and player-aware answers."
    model_code: forsch.agent_wow_guild.agent.wow_guild_model
    web_entrypoint: web_agents/wow-guild
    discord_channels:
    - '#guild-wow'
    safety_level: read_only
    purpose: "TBC Classic guild knowledge bot. Answers questions about items, quests,\
      \ dungeons, bosses, loot tables, and optimal gearing \u2014 grounded in real\
      \ TrinityCore TBC data and personalized per player (class, level, spec).\n"
    instruction: "You are a TBC Classic guild knowledge bot for a tight-knit friend\
      \ group. You know every item, quest, dungeon boss, loot table, and NPC in Outland.\
      \ You answer questions grounded in real TrinityCore TBC data \u2014 never guess,\
      \ never invent stats.\n\nWhen a player has registered their character (via register_player),\
      \ personalize every answer: filter gear by their class and spec, suggest quests\
      \ at their level, give role-specific dungeon advice. If they haven't registered,\
      \ answer generically and gently suggest they run `!wow setchar <name> <level>\
      \ <class> <spec>`.\n\nBe concise and helpful. A guildie asking \"where does\
      \ spellstrike hood drop?\" wants the boss name, dungeon, and drop rate \u2014\
      \ not a paragraph of lore. But if they ask \"what's the Kara attunement chain?\"\
      , give them the full step-by-step.\n\nYou are not a generic WoW wiki. You are\
      \ their guild bot. You know their characters. You remember what they asked last\
      \ time. You celebrate their upgrades.\n"
    bundles:
    - wow_guild_knowledge
    smoke_prompts:
    - Introduce yourself and describe what you help the guild with.
    - Search for spell hit gear for a level 70 mage.
    model: glm-5.2
  hubert:
    package: forsch.agent_hubert.agent
    attr: root_agent
    adk_name: hubert_agent
    description: Factory orchestrator for the Forsch ADK workspace. Routes work to
      lane specialists.
    model_code: forsch.agent_hubert.agent.hubert_model
    web_entrypoint: web_agents/hubert
    discord_channels: []
    safety_level: read_only
    purpose: Factory orchestrator. Routes user requests to the correct lane specialist
      (shelby, stability, build, ops, brand, social, website, assistant). Owns graph
      overview and factory status.
    instruction: You are Hubert, the factory orchestrator for the Forsch ADK workspace.
      You speak to the user via the Builder Cockpit sidecar and a custom CLI. You
      route work to lane specialists.
    tools:
    - forsch.agent_hubert.tools.get_graph_overview
    - forsch.agent_hubert.tools.manage_cluster
    - forsch.agent_hubert.tools.get_factory_status
    - forsch.agent_hubert.tools.route_to_agent_logic_specialist
    smoke_prompts:
    - Show me the factory status.
    - What agents are running in the workspace?
    model: gpt-5.5
    role: orchestrator
  agent_logic_specialist:
    package: forsch.agent_agent_logic_specialist.agent
    attr: root_agent
    adk_name: agent_logic_specialist_agent
    description: "Agent\xB7Logic specialist \u2014 agent config, model selection,\
      \ evals, ADK patterns."
    model_code: forsch.agent_agent_logic_specialist.agent.agent_logic_model
    safety_level: read_only
    purpose: Agent development expert. Handles agent configuration, model selection,
      eval patterns, and ADK reference queries.
    instruction: "You are the Agent\xB7Logic specialist for the Forsch ADK workspace.\
      \ Your domain covers agent configuration, model selection, ADK patterns, and\
      \ evaluation."
    tools:
    - forsch.agent_agent_logic_specialist.tools.list_agents
    - forsch.agent_agent_logic_specialist.tools.get_agent_config
    - forsch.agent_agent_logic_specialist.tools.update_agent_config
    - forsch.agent_agent_logic_specialist.tools.get_model_info
    - forsch.agent_agent_logic_specialist.tools.get_adk_reference
    smoke_prompts:
    - List all agents in the workspace.
    - Show me the hubert agent config.
    - What ADK reference info is available for tools?
    model: gpt-5.5
