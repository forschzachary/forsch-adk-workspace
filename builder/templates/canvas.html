<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#efe7d6; --card:#fbf6ea; --ink1:#382f20; --ink2:#6f6450; --mut:#9a8e76;
    --line:#ddd0b6; --sage:#5f7d5b; --sage-soft:#dfe6d4; --brass:#a9823f; --thread:#bcae8e;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{font-family:"Newsreader",Georgia,serif;color:var(--ink1);
    background:radial-gradient(120% 90% at 75% -10%,#f7f1e3 0%,#efe7d6 55%,#e7ddc8 100%);}
  .mono{font-family:"Spline Sans Mono",ui-monospace,monospace;}
  .bar{display:flex;align-items:center;gap:14px;padding:12px 20px;border-bottom:1px solid var(--line);background:#f2ebdb;height:56px;}
  .mark{display:flex;align-items:center;gap:9px;font-weight:600;font-size:17px;}
  .mark .dot{width:10px;height:10px;border-radius:50%;background:var(--sage);box-shadow:0 0 0 4px var(--sage-soft);}
  .crumb{color:var(--ink2);font-size:14px;}.crumb b{color:var(--ink1);}
  select.agentsel{font-family:"Spline Sans Mono",monospace;font-size:13px;border:1px solid var(--line);
    background:var(--card);color:var(--ink1);border-radius:8px;padding:5px 8px;}
  .status{margin-left:auto;font-family:"Spline Sans Mono",monospace;font-size:12px;color:var(--ink2);
    display:flex;align-items:center;gap:7px;}
  .status .tick{width:7px;height:7px;border-radius:50%;background:var(--brass);}
  .status.busy .tick{background:#d8a23a;}.status.ok .tick{background:var(--sage);}.status.err .tick{background:#b05a45;}
  .gen{font-family:"Newsreader",serif;font-weight:600;font-size:15px;color:#f7f1e3;background:var(--sage);
    border:1px solid #4d6849;border-radius:10px;padding:9px 18px;cursor:pointer;}
  .gen:hover{background:#56714f;}.gen:disabled{opacity:.55;cursor:default;}
  .stage{display:grid;grid-template-columns:1fr 300px;height:100%;}
  .canvas{position:relative;overflow:hidden;cursor:grab;
    background-image:radial-gradient(#cdbf9f55 1px,transparent 1.4px);background-size:26px 26px;}
  .canvas.panning{cursor:grabbing;}
  .world{position:absolute;left:0;top:0;transform-origin:0 0;}
  svg.threads{position:absolute;left:0;top:0;overflow:visible;pointer-events:none;}
  .node{position:absolute;user-select:none;}
  .agent{width:340px;background:var(--card);border:1px solid #e4d7ba;border-radius:16px;
    box-shadow:0 1px 0 #fffaf0,0 16px 34px -20px #5a4a2a66;padding:16px 18px 15px;}
  .agent.sel{outline:2px solid var(--sage);outline-offset:3px;}
  .grab{cursor:grab;}.grab:active{cursor:grabbing;}
  .kind{font-family:"Spline Sans Mono",monospace;font-size:10.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--brass);}
  .agent h2{margin:3px 0 2px;font-size:24px;font-weight:600;}
  .agent .sub{font-size:14px;color:var(--ink2);margin-bottom:11px;}
  .meta{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap;}
  .pill{font-family:"Spline Sans Mono",monospace;font-size:11px;padding:4px 9px;border-radius:999px;border:1px solid var(--line);color:var(--ink2);background:#f3ecdc;}
  .pill.safe{color:#4d6849;background:var(--sage-soft);border-color:#cdd9c2;}
  .lead{color:var(--mut);font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;display:block;margin:0 0 5px;}
  textarea.instr{width:100%;border:1px solid #ece1c8;border-radius:9px;background:#fffdf6;color:#463c2b;
    font-family:"Newsreader",serif;font-size:14px;line-height:1.5;padding:9px 10px;resize:vertical;min-height:96px;}
  textarea.instr:focus{outline:none;border-color:var(--sage);}
  .chip{background:#faf4e6;border:1px solid #e3d6b8;border-radius:11px;padding:8px 11px;min-width:150px;
    box-shadow:0 8px 20px -16px #5a4a2a66;}
  .chip.route{border-color:#cdd9c2;background:#f1f5ea;}.chip.evals{border-color:#e8d6c4;background:#f8efe2;}
  .chip .tag{font-family:"Spline Sans Mono",monospace;font-size:9.5px;letter-spacing:.7px;text-transform:uppercase;color:var(--mut);margin-bottom:3px;display:flex;justify-content:space-between;align-items:center;}
  .chip .t{font-family:"Spline Sans Mono",monospace;font-size:12.5px;color:var(--ink1);}
  .chip .s{font-size:12px;color:var(--mut);}
  .rm{cursor:pointer;color:#bda;color:#c2b48f;font-size:13px;line-height:1;}
  .rm:hover{color:#b05a45;}
  .rail{border-left:1px solid var(--line);background:#f2ebdb;padding:15px 14px;overflow:auto;}
  .rail h3{margin:0 0 3px;font-size:15px;font-weight:600;}
  .rail .note{font-size:12.5px;color:var(--ink2);line-height:1.45;margin-bottom:13px;}
  .spec{display:flex;align-items:flex-start;gap:9px;background:var(--card);border:1px solid #e6dabf;border-radius:10px;
    padding:8px 10px;margin-bottom:8px;cursor:pointer;}
  .spec:hover{border-color:var(--sage);}
  .spec .nm{font-family:"Spline Sans Mono",monospace;font-size:12px;color:var(--ink1);}
  .spec .ds{font-size:11px;color:var(--mut);margin-top:1px;}
  .spec .plus{color:#c9bb9a;font-size:15px;margin-top:1px;}.spec:hover .plus{color:var(--sage);}
  .div{font-family:"Spline Sans Mono",monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);margin:16px 0 9px;}
  pre.result{font-family:"Spline Sans Mono",monospace;font-size:11px;line-height:1.45;color:#463c2b;
    background:#fffdf6;border:1px solid #e6dabf;border-radius:9px;padding:10px;white-space:pre-wrap;max-height:240px;overflow:auto;}
  .empty{color:var(--mut);font-size:12.5px;font-style:italic;}
  .split{display:flex;height:calc(100vh - 57px);}
  .pane-builder{flex:0 0 58%;min-width:400px;overflow:hidden;}
  .divider{flex:0 0 8px;background:var(--line);cursor:col-resize;transition:background .15s;}
  .divider:hover{background:var(--sage);}
  .pane-term{flex:1 1 auto;min-width:300px;background:#1b1812;}
  .pane-term iframe{width:100%;height:100%;border:0;display:block;}
</style>
</head>
<body>
  <div class="bar">
    <div class="mark"><span class="dot"></span> Agent&nbsp;Builder</div>
    <span class="crumb">manifest ·</span>
    <select class="agentsel" id="agentsel"></select>
    <div class="status" id="status"><span class="tick"></span><span id="statustext">ready</span></div>
    <button class="gen" id="gen">Generate &rsaquo;</button>
  </div>
  <div class="split">
    <div class="pane-builder">
    <div class="stage">
    <div class="canvas" id="canvas">
      <svg class="threads" id="threads"></svg>
      <div class="world" id="world"></div>
    </div>
    <aside class="rail">
      <h3>Components</h3>
      <div class="note">Click to wire a proven tool onto the agent, then Generate to regenerate the agent on the box.</div>
      <div id="palette"></div>
      <div class="div">last generate</div>
      <div id="result"><div class="empty">No generate yet.</div></div>
    </aside>
    </div>
    </div>
    <div class="divider" id="divider" title="drag to resize"></div>
    <div class="pane-term"><iframe id="termframe" title="Terminal" allow="clipboard-read; clipboard-write"></iframe></div>
  </div>

<script>
const VIEW = /*__VIEW__*/;
const TERM_URL = /*__TERMURL__*/;
const W = document.getElementById('world');
const SVG = document.getElementById('threads');
const canvas = document.getElementById('canvas');
const sel = document.getElementById('agentsel');

let cam = {x:60, y:40, k:1};
let state = null;       // {agent, instruction, tools[], pos{}}
const POS = {};         // node id -> {x,y}

function apiUrl(path){
  const loc = window.location;
  if (loc.pathname.includes('cockpit.embed') || loc.search.includes('path=')){
    return loc.pathname + '?path=' + encodeURIComponent(path);
  }
  const t = new URLSearchParams(loc.search).get('token');
  return path + (t ? ('?token=' + encodeURIComponent(t)) : '');
}
function setStatus(text, cls){
  document.getElementById('statustext').textContent = text;
  document.getElementById('status').className = 'status' + (cls ? ' '+cls : '');
}
function applyCam(){ W.style.transform = `translate(${cam.x}px,${cam.y}px) scale(${cam.k})`;
  SVG.style.transform = W.style.transform; }

function selectAgent(id){
  const a = VIEW.agents.find(x=>x.id===id) || VIEW.agents[0];
  state = { agent:a, instruction:a.instruction||'', tools:[...(a.tools||[])] };
  layout(); render();
}
function layout(){
  POS.agent = POS.agent || {x:360, y:200};
  const t = state.tools;
  t.forEach((nm,i)=>{ POS['tool:'+nm] = POS['tool:'+nm] || {x:40, y:90 + i*104}; });
  POS.route = POS.route || {x:780, y:150};
  POS.evals = POS.evals || {x:430, y:470};
}
function nodeEl(id, html, cls){
  const d = document.createElement('div'); d.className='node '+(cls||''); d.dataset.id=id;
  d.innerHTML = html; d.style.left=POS[id].x+'px'; d.style.top=POS[id].y+'px';
  W.appendChild(d); return d;
}
function render(){
  W.innerHTML=''; SVG.innerHTML='';
  const a = state.agent;
  const tools = state.tools.map(nm=>`
    <div class="tag">tool <span class="rm" data-rm="${nm}" title="remove">&times;</span></div>
    <div class="t">${nm}</div>`);
  // agent node
  const agentHtml = `
    <span class="kind grab" data-drag="agent">agent · ${a.safety||'read_only'}</span>
    <h2 class="grab" data-drag="agent">${a.name||a.id}</h2>
    <div class="sub">${a.description||''}</div>
    <div class="meta"><span class="pill">${a.model||'openai/gpt-5.5'}</span>
      <span class="pill safe">safe · ${a.safety||'read_only'}</span></div>
    <span class="lead">instruction</span>
    <textarea class="instr" id="instr">${(state.instruction||'').replace(/</g,'&lt;')}</textarea>`;
  nodeEl('agent', agentHtml, 'agent sel');
  // tool nodes
  state.tools.forEach(nm=>{
    nodeEl('tool:'+nm, `<div class="tag grab" data-drag="tool:${nm}">tool <span class="rm" data-rm="${nm}" title="remove">&times;</span></div><div class="t">${nm}</div>`, 'chip');
  });
  // route + evals
  if ((a.channels||[]).length)
    nodeEl('route', `<div class="tag grab" data-drag="route">discord route</div><div class="t">${a.channels.join(' ')}</div>`, 'chip route');
  if ((a.smoke_prompts||[]).length)
    nodeEl('evals', `<div class="tag grab" data-drag="evals">evals · ${a.smoke_prompts.length} smoke</div><div class="s">${(a.smoke_prompts[0]||'').replace(/</g,'&lt;')}</div>`, 'chip evals');
  drawThreads(); wireNodeDrag(); wireRemovals();
  document.getElementById('instr').addEventListener('input', e=>{ state.instruction = e.target.value; });
}
function center(id){ const el=W.querySelector(`[data-id="${id}"]`); if(!el) return null;
  return {x:POS[id].x + el.offsetWidth/2, y:POS[id].y + el.offsetHeight/2}; }
function thread(a,b,color){ if(!a||!b) return;
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  const mx=(a.x+b.x)/2;
  p.setAttribute('d',`M${a.x},${a.y} C${mx},${a.y} ${mx},${b.y} ${b.x},${b.y}`);
  p.setAttribute('fill','none'); p.setAttribute('stroke',color||'#bcae8e'); p.setAttribute('stroke-width','1.5');
  SVG.appendChild(p); }
function drawThreads(){ SVG.innerHTML=''; const ag=center('agent');
  state.tools.forEach(nm=>thread(center('tool:'+nm), ag, '#bcae8e'));
  thread(ag, center('route'), '#a9b79e'); thread(ag, center('evals'), '#cdb79a'); }

function wireNodeDrag(){
  W.querySelectorAll('[data-drag]').forEach(h=>{
    h.addEventListener('mousedown', e=>{
      e.stopPropagation(); const id=h.dataset.drag; const start={x:e.clientX,y:e.clientY,px:POS[id].x,py:POS[id].y};
      function mv(ev){ POS[id].x=start.px+(ev.clientX-start.x)/cam.k; POS[id].y=start.py+(ev.clientY-start.y)/cam.k;
        const el=W.querySelector(`[data-id="${id}"]`); el.style.left=POS[id].x+'px'; el.style.top=POS[id].y+'px'; drawThreads(); }
      function up(){ document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
      document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
    });
  });
}
function wireRemovals(){
  W.querySelectorAll('[data-rm]').forEach(x=>x.addEventListener('mousedown', e=>{
    e.stopPropagation(); const nm=x.dataset.rm; state.tools=state.tools.filter(t=>t!==nm); layout(); render(); markDirty(); }));
}
function addTool(nm){ if(state.tools.includes(nm)) return; state.tools.push(nm); layout(); render(); renderPalette(); markDirty(); }
function markDirty(){ setStatus('unsaved edits', 'busy'); }

function renderPalette(){
  const used = new Set(state.tools);
  const items = VIEW.palette.filter(p=>!used.has(p.name));
  const pal = document.getElementById('palette');
  pal.innerHTML = items.length ? '' : '<div class="empty">All components wired.</div>';
  items.forEach(p=>{ const d=document.createElement('div'); d.className='spec';
    d.innerHTML=`<span class="plus">+</span><div><div class="nm">${p.name}</div><div class="ds">${p.summary||p.module}</div></div>`;
    d.addEventListener('click',()=>addTool(p.name)); pal.appendChild(d); });
}

function b64url(s){ return btoa(unescape(encodeURIComponent(s))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''); }
async function generate(){
  const btn=document.getElementById('gen'); btn.disabled=true; setStatus('generating…','busy');
  try{
    const q = b64url(JSON.stringify({instruction:state.instruction, tools:state.tools}));
    const res = await fetch(apiUrl('/api/agent/'+state.agent.id+'?q='+q));
    const data = await res.json();
    const r=document.getElementById('result');
    if(data.ok){ setStatus('regenerated ✓','ok');
      r.innerHTML = `<div class="note" style="margin-bottom:8px">wrote ${(data.written||[]).length} file(s)</div><pre class="result">${(data.rendered_yaml||'').replace(/</g,'&lt;')}</pre>`;
    } else { setStatus('error','err'); r.innerHTML=`<pre class="result">${(data.error||'failed').replace(/</g,'&lt;')}</pre>`; }
  }catch(err){ setStatus('error','err'); document.getElementById('result').innerHTML=`<pre class="result">${String(err)}</pre>`; }
  btn.disabled=false;
}

// pan + zoom
canvas.addEventListener('mousedown', e=>{ if(e.target.closest('.node')) return;
  canvas.classList.add('panning'); const s={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y};
  function mv(ev){ cam.x=s.cx+(ev.clientX-s.x); cam.y=s.cy+(ev.clientY-s.y); applyCam(); }
  function up(){ canvas.classList.remove('panning'); document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
  document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up); });
canvas.addEventListener('wheel', e=>{ e.preventDefault(); const f=e.deltaY<0?1.08:0.926;
  const nk=Math.min(2,Math.max(0.4,cam.k*f)); const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  cam.x=mx-(mx-cam.x)*(nk/cam.k); cam.y=my-(my-cam.y)*(nk/cam.k); cam.k=nk; applyCam(); }, {passive:false});

// boot
VIEW.agents.forEach(a=>{ const o=document.createElement('option'); o.value=a.id; o.textContent=a.id; sel.appendChild(o); });
sel.addEventListener('change', ()=>{ for(const k in POS) delete POS[k]; selectAgent(sel.value); renderPalette(); });
document.getElementById('gen').addEventListener('click', generate);
// terminal is always-on, side by side with the builder
document.getElementById('termframe').setAttribute('src', TERM_URL);
// draggable divider (overlay the iframe while dragging so it doesn't swallow the mouse)
(function(){
  const div=document.getElementById('divider'), pane=document.querySelector('.pane-builder'),
        split=document.querySelector('.split'), frame=document.getElementById('termframe');
  div.addEventListener('mousedown', e=>{
    e.preventDefault(); document.body.style.cursor='col-resize'; frame.style.pointerEvents='none';
    function mv(ev){ const r=split.getBoundingClientRect();
      let pct=((ev.clientX-r.left)/r.width)*100; pct=Math.min(80,Math.max(25,pct));
      pane.style.flexBasis=pct+'%'; }
    function up(){ document.body.style.cursor=''; frame.style.pointerEvents='';
      document.removeEventListener('mousemove',mv); document.removeEventListener('mouseup',up); }
    document.addEventListener('mousemove',mv); document.addEventListener('mouseup',up);
  });
})();
applyCam();
if(VIEW.agents.length){ selectAgent(VIEW.agents[0].id); renderPalette(); }
else { W.innerHTML='<div class="node" style="left:40px;top:40px"><div class="empty">No agents in the manifest yet.</div></div>'; }
</script>
</body>
</html>
