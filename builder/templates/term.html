<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>terminal</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<style>
  html,body{margin:0;height:100%;background:#1b1812;overflow:hidden;}
  #t{height:100vh;padding:8px 10px;}
  .xterm-viewport::-webkit-scrollbar{width:8px;}
  .xterm-viewport::-webkit-scrollbar-thumb{background:#4a4234;border-radius:4px;}
</style>
</head>
<body>
<div id="t"></div>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<script>
const term = new Terminal({
  fontFamily: 'ui-monospace, "SF Mono", Menlo, Monaco, "Cascadia Code", monospace',
  fontSize: 13, lineHeight: 1.15, cursorBlink: true, cursorStyle: 'block', scrollback: 8000,
  theme: {
    background:'#1b1712', foreground:'#e6ddcb', cursor:'#d8b46a', cursorAccent:'#1b1712',
    selectionBackground:'#5f7d5b55',
    black:'#2a2620', red:'#cf6a4c', green:'#8aa872', yellow:'#d2a85a',
    blue:'#7fa6b8', magenta:'#b08aa6', cyan:'#88a6a0', white:'#d8cdb8',
    brightBlack:'#6f6450', brightRed:'#e08862', brightGreen:'#a6c489', brightYellow:'#e8c878',
    brightBlue:'#9cc0d2', brightMagenta:'#c8a4be', brightCyan:'#a4c4be', brightWhite:'#f2ead6'
  }
});
const fit = new FitAddon.FitAddon();
term.loadAddon(fit);
term.open(document.getElementById('t'));
fit.fit();
const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const ws = new WebSocket(`${proto}://${location.host}/term/ws?token=__TOKEN__`);
ws.binaryType = 'arraybuffer';
function sendResize(){ if (ws.readyState === 1) ws.send('\x00' + term.cols + ',' + term.rows); }
ws.onopen = () => { sendResize(); term.focus(); };
ws.onmessage = (e) => { term.write(typeof e.data === 'string' ? e.data : new Uint8Array(e.data)); };
ws.onclose = () => term.write('\r\n\x1b[38;5;131m[session closed]\x1b[0m\r\n');
term.onData(d => { if (ws.readyState === 1) ws.send(d); });
// The canvas drives the PTY via postMessage:
//   {type:'edit', file}  -> open the file in nano
//   {type:'run',  cmd}   -> run a command (e.g. spin up an agent + watch it behave)
//   {type:'interrupt'}   -> Ctrl-C the current foreground process
window.addEventListener('message', (e) => {
  const d = e.data;
  if (!d || ws.readyState !== 1) return;
  if (d.type === 'edit' && typeof d.file === 'string') {
    ws.send("nano '" + d.file.replace(/'/g, '') + "'\n");
    term.focus();
  } else if (d.type === 'run' && typeof d.cmd === 'string') {
    ws.send(d.cmd + "\n");
    term.focus();
  } else if (d.type === 'interrupt') {
    ws.send("\x03");
  }
});
addEventListener('resize', () => { fit.fit(); sendResize(); });
new ResizeObserver(() => { fit.fit(); sendResize(); }).observe(document.getElementById('t'));
</script>
</body>
</html>
