# Verify — main CI for all PRs and pushes to main.
#
# Runs the basic invariant suite on every change.  Routine PRs merge on this
# check alone (once the ruleset is armed).  Control-plane PRs additionally
# require the `control-plane-approved` check from control-plane-review.yml.
#
# Workspace-wide: the consolidated uv workspace (root pyproject.toml
# [tool.uv.workspace] members = packages/*, agents/*, clusters/*) is resolved
# by a single root uv.lock.  All steps run from the repo root.
#
# See docs/strategy/2026-06-28-repository-and-git-discipline.md §7.x

name: Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

jobs:
  verify:
    name: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync workspace (locked)
        run: uv sync --locked --all-packages --all-extras

      - name: Structure check
        run: uv run python scripts/check_structure.py

      - name: Bijection check
        run: uv run python scripts/check_bijection.py

      - name: Build all packages
        run: uv build --all-packages

      - name: Pytest (all packages)
        run: uv run python -m pytest agents --import-mode=importlib -q || { rc=$?; [ "$rc" = "5" ] && exit 0 || exit $rc; }
