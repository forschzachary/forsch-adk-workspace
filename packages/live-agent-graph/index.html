function openInspect(node) {
  inspectedNode = node;
  const panel = document.getElementById('inspect');
  const title = document.getElementById('inspect-title');
  const body = document.getElementById('inspect-body');
  const saveMsg = document.getElementById('inspect-save-msg');
  saveMsg.textContent = '';

  title.textContent = node.name;
  title.style.color = nodeColor(node);

  let html = '';

  // Read-only fields
  html += `<div class="field"><label>ID</label><div class="ro">${node.id}</div></div>`;
  html += `<div class="field"><label>Type</label><div class="ro">${node.type}</div></div>`;
  html += `<div class="field"><label>State</label><div class="ro">${node.state}</div></div>`;

  // Editable fields for agents
  if (node.type === 'agent') {
    html += `<div class="field"><label>Title</label><input id="insp-title" value="${esc(node.name)}"></div>`;
    html += `<div class="field"><label>Role</label><input id="insp-role" value="${esc(node.role || '')}"></div>`;

    // Model dropdown (feature D)
    const modelOpts = availableModels.map(m =>
      `<option value="${m}" ${m === node.model ? 'selected' : ''}>${m}</option>`
    ).join('');
    html += `<div class="field"><label>Model</label><select id="insp-model">
      <option value="">— none —</option>${modelOpts}</select></div>`;

    html += `<div class="field"><label>Safety Level</label>
      <select id="insp-safety">
        <option value="L0" ${(node.gates||{}).L0 ? 'selected' : ''}>L0</option>
        <option value="L1" ${(node.gates||{}).L1 ? 'selected' : ''}>L1</option>
        <option value="L2" ${(node.gates||{}).L2 ? 'selected' : ''}>L2</option>
        <option value="L3" ${(node.gates||{}).L3 ? 'selected' : ''}>L3</option>
      </select></div>`;

    // Workspace (read-only, from CRM)
    if (node.workspace) {
      html += `<div class="field"><label>Workspace</label><div class="ro" style="word-break:break-all;font-size:11px;">${esc(node.workspace)}</div></div>`;
    }
  }

  // Tool-specific card (mirrors the agent card: what bundles hold it + which agents use it)
  if (node.type === 'tool') {
    const _by = {}; (graphData.nodes || []).forEach(n => _by[n.id] = n);
    const _bn = (graphData.links || []).filter(l => l.kind === 'contains' && lid(l.target) === node.id).map(l => _by[lid(l.source)]).filter(Boolean);
    const _bk = [...new Set(_bn.map(b => b.bundle_key || b.name))];
    const _ag = [...new Set(_bn.map(b => b.for_agent).filter(Boolean))];
    if (node.family) html += `<div class="field"><label>Family</label><div class="ro">${esc(node.family)}</div></div>`;
    html += `<div class="field"><label>In bundles</label><div>${_bk.map(k => `<span class="contract-tag accept">${esc(k)}</span>`).join('') || '<span class="ro">—</span>'}</div></div>`;
    html += `<div class="field"><label>Used by</label><div>${_ag.map(a => `<span class="contract-tag emit">${esc(a)}</span>`).join('') || '<span class="ro">—</span>'}</div></div>`;
  }

  // Artifact
  html += `<div class="field"><label>Artifact</label><div class="ro" style="word-break:break-all;font-size:11px;">${esc(node.artifact || '—')}</div></div>`;

  // Contract (accepts/emits)
  if (node.contract) {
    html += `<div class="field"><label>Accepts</label><div>`;
    (node.contract.accepts || []).forEach(a => {
      html += `<span class="contract-tag accept">${a}</span>`;
    });
    html += `</div></div>`;
    html += `<div class="field"><label>Emits</label><div>`;
    (node.contract.emits || []).forEach(e => {
      html += `<span class="contract-tag emit">${e}</span>`;
    });
    html += `</div></div>`;
  }

  // Gates
  if (node.gates) {
    html += `<div class="field"><label>Gates</label><div class="gate-row">`;
    ['L0','L1','L2','L3'].forEach(g => {
      html += `<span class="gate-pill ${node.gates[g] ? 'pass' : ''}">${g} ${node.gates[g] ? '✓' : '✗'}</span>`;
    });
    html += `</div></div>`;
  }

  // Links count
  const links = graphData.links.filter(l => lid(l.source) === node.id || lid(l.target) === node.id);
  html += `<div class="field"><label>Connections</label><div class="ro">${links.length} links</div></div>`;

  // Focus button for agents
  if (node.type === 'agent') {
    html += `<div style="margin-top:10px;"><button id="insp-focus" class="small-action">🔍 Focus this agent</button></div>`;
  }

  body.innerHTML = html;
  panel.classList.add('open');

  // Attach focus button handler
  const focusBtn = document.getElementById('insp-focus');
  if (focusBtn) focusBtn.addEventListener('click', () => enterAgentFocus(node.id));
}

function renderFocusSection(agentId, section) {
  const target = document.getElementById('focus-section');
  if (!target) return;
  const agent = getNodeById(agentId);
  const clean = cleanAgentId(agentId);

  if (section === 'config') {
    const cfg = focusedAgentConfig?.config || focusedAgentConfig?.agent || focusedAgentConfig || {};
    const model = cfg.model || agent?.model || '';
    const instruction = cfg.instruction || '';
    const description = cfg.description || agent?.name || clean;
    const modelOpts = availableModels.map(m =>
      `<option value="${esc(m)}" ${m === model ? 'selected' : ''}>${esc(m)}</option>`
    ).join('');
    target.innerHTML = `
      <div class="field"><label>Agent ID</label><div class="ro">${esc(clean)}</div></div>
      <div class="field"><label>Description</label><input id="focus-description" value="${esc(description)}"></div>
      <div class="field"><label>Model</label><select id="focus-model"><option value="">— none —</option>${modelOpts}</select></div>
      <div class="field"><label>Instruction</label><textarea id="focus-instruction" rows="8">${esc(instruction)}</textarea></div>
      <div class="field"><label>Tools</label><div id="focus-tool-list" style="max-height:160px;overflow:auto;"></div></div>
      <button id="focus-save-config" class="small-action">Save config</button>
    `;
    // Populate tools as checkboxes
    const toolList = document.getElementById('focus-tool-list');
    const selectedTools = cfg.tools || [];
    const allTools = focusedAgentTools.length ? focusedAgentTools : (cfg.tools || []);
    // Deduplicate
    const toolSet = new Set([...selectedTools, ...allTools.map(t => typeof t === 'string' ? t : t.name || t.id || JSON.stringify(t))]);
    if (toolSet.size === 0) {
      toolList.innerHTML = '<div class="ro">No tools loaded. Click Tools tab to load.</div>';
    } else {
      let html = '';
      toolSet.forEach(t => {
        const checked = selectedTools.includes(t) ? 'checked' : '';
        html += `<label class="tool-check"><input type="checkbox" class="focus-tool-check" value="${esc(t)}" ${checked}> ${esc(t)}</label>`;
      });
      toolList.innerHTML = html;
    }
    attachFocusConfigHandlers(agentId);
  } else if (section === 'tools') {
    const tools = focusedAgentTools.length ? focusedAgentTools : (focusedAgentConfig?.config?.tools || focusedAgentConfig?.tools || []);
    const toolNames = Array.isArray(tools) ? tools.map(t => typeof t === 'string' ? t : (t.name || t.id || JSON.stringify(t))) : [];

    // Group tools by prefix (e.g. forsch.adk_components.tools.X → X)
    const groups = {};
    toolNames.forEach(t => {
      const parts = t.split('.');
      const short = parts[parts.length - 1];
      const prefix = parts.length > 1 ? parts.slice(0, -1).join('.') : '(root)';
      (groups[prefix] = groups[prefix] || []).push({ full: t, short });
    });

    let toolsHtml = `<div class="field"><label>Tools (${toolNames.length})</label></div>`;
    if (toolNames.length === 0) {
      toolsHtml += '<div class="ro" style="padding:8px 0;">No tools assigned to this agent.</div>';
    } else {
      for (const [prefix, items] of Object.entries(groups)) {
        const label = prefix === '(root)' ? 'Other' : prefix.split('.').pop();
        toolsHtml += `<div style="margin-bottom:8px;"><div style="font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px;">${esc(label)} (${items.length})</div>`;
        items.forEach(t => {
          toolsHtml += `<div class="tool-check" style="padding:2px 0;font-size:11px;">
            <span style="color:#f0883e;">&#9679;</span> ${esc(t.short)}
            ${t.short !== t.full ? `<span style="color:#484f58;font-size:10px;margin-left:4px;">${esc(t.full)}</span>` : ''}
          </div>`;
        });
        toolsHtml += '</div>';
      }
    }
    target.innerHTML = toolsHtml;
  } else if (section === 'evals') {
    const evalsets = focusedAgentEvalsets || [];
    const lastRun = focusedAgentEval;
    const statusClass = lastRun?.ok ? 'pass' : (lastRun?.error ? 'fail' : 'unknown');
    const statusText = lastRun?.ok ? 'PASS' : (lastRun?.error ? 'FAIL' : 'No runs');
    target.innerHTML = `
      <div class="field"><label>Evalsets (${evalsets.length})</label>
        <pre class="ro json-block">${esc(JSON.stringify(evalsets, null, 2))}</pre>
      </div>
      <button id="focus-run-evals-btn" class="small-action">Run evals</button>
      <div style="margin-top:8px;">
        <span class="eval-status ${statusClass}">${statusText}</span>
      </div>
      <div class="field" style="margin-top:8px;"><label>Last eval run</label>
        <pre class="ro json-block">${esc(JSON.stringify(lastRun || { info: 'no runs yet' }, null, 2))}</pre>
      </div>
    `;
    attachFocusEvalHandlers(agentId);
  } else if (section === 'runtime') {
    target.innerHTML = `
      <div class="field"><label>Model</label><div class="ro">${esc(agent?.model || '—')}</div></div>
      <div class="field"><label>State</label><div class="ro">${esc(agent?.state || '—')}</div></div>
      <div class="field"><label>Role</label><div class="ro">${esc(agent?.role || 'plain')}</div></div>
      <div class="field"><label>Runtime config</label>
        <div class="ro" style="font-size:11px;color:#8b949e;">Temperature, output tokens, safety, session/cache config. Wire after core shape is verified.</div>
      </div>
    `;
  } else if (section === 'run') {
    const verifyStatus = focusedAgentVerify?.ok ? 'pass' : (focusedAgentVerify?.error ? 'fail' : 'unknown');
    const verifyText = focusedAgentVerify?.ok ? 'PASS' : (focusedAgentVerify?.error ? 'FAIL' : 'Not run');
    target.innerHTML = `

document.getElementById('inspect-save').addEventListener('click', async () => {
  if (!inspectedNode || inspectedNode.type !== 'agent') return;
  const agentId = inspectedNode.id.replace('agent:', '');
  const saveMsg = document.getElementById('inspect-save-msg');
  const fields = {};
  const titleEl = document.getElementById('insp-title');
  const roleEl = document.getElementById('insp-role');
  const modelEl = document.getElementById('insp-model');
  const safetyEl = document.getElementById('insp-safety');

  // Collect changed fields
  if (titleEl && titleEl.value !== inspectedNode.name) fields.title = titleEl.value;
  if (roleEl && roleEl.value !== (inspectedNode.role || '')) fields.role = roleEl.value;
  if (modelEl && modelEl.value !== (inspectedNode.model || '')) fields.model = modelEl.value;
  if (safetyEl) {
    const level = safetyEl.value;
    const newGates = {L0: level >= 'L0', L1: level >= 'L1', L2: level >= 'L2', L3: level >= 'L3'};
    // Map safety level to status
    if (level === 'L0') fields.status = 'draft';
    else if (level === 'L1') fields.status = 'queued';
    else if (level === 'L2') fields.status = 'in_progress';
    else fields.status = 'complete';
  }

  if (!Object.keys(fields).length) {
    saveMsg.className = 'save-msg'; saveMsg.textContent = 'No changes'; return;
  }
  if (!(await ensureGraphSecret())) {
    saveMsg.className = 'save-msg err'; saveMsg.textContent = 'Edits locked'; return;
  }

  // Save each field
  saveMsg.className = 'save-msg'; saveMsg.textContent = 'Saving...';
  let saved = 0, total = Object.keys(fields).length;
  for (const [field, value] of Object.entries(fields)) {
    const body = `agent_id=${encodeURIComponent(agentId)}&field=${encodeURIComponent(field)}&value=${encodeURIComponent(value)}`;
    fetch(apiUrl('/save-agent'), { method: 'POST', headers: mutationHeaders(), body })
      .then(r => r.json())
      .then(data => {
        saved++;
        if (data.error) { saveMsg.className = 'save-msg err'; saveMsg.textContent = `Error: ${data.error}`; return; }
        if (saved === total) {
          saveMsg.className = 'save-msg ok'; saveMsg.textContent = `Saved ${saved} field(s)`;
          // Update local node
          if (fields.title) inspectedNode.name = fields.title;
          if (fields.model) inspectedNode.model = fields.model;
          if (fields.role) inspectedNode.role = fields.role;
          if (fields.status) inspectedNode.state = fields.status;
          fg.graphData(graphData);
          setTimeout(() => { saveMsg.textContent = ''; }, 3000);
        }
      })
      .catch(err => { saveMsg.className = 'save-msg err'; saveMsg.textContent = err.message; });
  }
});

function initSidecarResize() {
  const box = document.getElementById('sidecar-widget');
  const handle = document.getElementById('sidecar-resize-handle');
  if (!box || !handle) return;
  try {
    const saved = JSON.parse(localStorage.getItem('hubert-sidecar-size') || '{}');
    if (Number.isFinite(saved.width) && Number.isFinite(saved.height)) {
      box.style.setProperty('--sidecar-width', saved.width + 'px');
      box.style.setProperty('--sidecar-height', saved.height + 'px');
      box.classList.add('user-sized');
    }
  } catch (_) {}
  handle.addEventListener('dblclick', () => {
    box.style.removeProperty('--sidecar-width');
    box.style.removeProperty('--sidecar-height');
    box.classList.remove('user-sized');
    localStorage.removeItem('hubert-sidecar-size');
  });
  handle.addEventListener('pointerdown', (ev) => {
    if (window.matchMedia('(max-width: 720px)').matches) return;
    ev.preventDefault();
    handle.setPointerCapture(ev.pointerId);
    const rect = box.getBoundingClientRect();
    const startX = ev.clientX;
    const startY = ev.clientY;
    const startWidth = rect.width;
    const startHeight = rect.height;
    const onMove = (moveEv) => {
      const maxWidth = Math.max(420, window.innerWidth - 48);
      const maxHeight = Math.max(460, window.innerHeight - 80);
      const width = Math.min(maxWidth, Math.max(420, startWidth - (moveEv.clientX - startX)));
      const height = Math.min(maxHeight, Math.max(460, startHeight + (moveEv.clientY - startY)));
      box.style.setProperty('--sidecar-width', Math.round(width) + 'px');
      box.style.setProperty('--sidecar-height', Math.round(height) + 'px');
      box.classList.add('user-sized');
    };
    const onUp = () => {
      const next = {
        width: Math.round(box.getBoundingClientRect().width),
        height: Math.round(box.getBoundingClientRect().height)
      };
      localStorage.setItem('hubert-sidecar-size', JSON.stringify(next));
      handle.removeEventListener('pointermove', onMove);
      handle.removeEventListener('pointerup', onUp);
      handle.removeEventListener('pointercancel', onUp);
    };
    handle.addEventListener('pointermove', onMove);
    handle.addEventListener('pointerup', onUp);
    handle.addEventListener('pointercancel', onUp);
  });
}

  if (role === 'user') return 'You';
  if (role === 'pending') return 'Hubert';
  if (role === 'error') return 'Error';
  return 'Status';
}

function clearPendingHubertRun() {
  pendingHubertTimers.forEach(t => clearTimeout(t));
  pendingHubertTimers = [];
  pendingHubertRun = null;
}

function startPendingHubertRun(model, contextLabel) {
  clearPendingHubertRun();
  pendingHubertRun = {
    state: 'running',
    model: model || 'default',
    startedAt: Date.now(),
    stages: [
      { label: 'request queued', state: 'active', at_ms: 0 },
      { label: contextLabel || 'workspace context', state: 'pending' },
      { label: `${chatModelLabel(model || 'default')} selected`, state: 'pending' },
      { label: 'MiMo CLI running', state: 'pending' }
    ],
    tools: []
  };
  const advance = (index) => {
    if (!pendingHubertRun) return;
    pendingHubertRun.stages.forEach((stage, i) => {
      if (i < index) stage.state = 'done';
      else if (i === index) {
        stage.state = 'active';
        stage.at_ms = Date.now() - pendingHubertRun.startedAt;
      }
    });
    renderHubertMessages();
  };
  pendingHubertTimers.push(setTimeout(() => advance(1), 180));
  pendingHubertTimers.push(setTimeout(() => advance(2), 420));
  pendingHubertTimers.push(setTimeout(() => advance(3), 900));
}

function normalizeRunReceipt(data, fallbackModel, ok) {
  const events = Array.isArray(data?.events) ? data.events : [];
  const tools = Array.isArray(data?.tools) ? data.tools : [];
  const terminal = data?.progress?.current_event || events[events.length - 1] || {};
  return {
    state: ok ? 'complete' : 'error',
    model: data?.model || fallbackModel || 'default',
    elapsed_ms: Number(data?.elapsed_ms || terminal.at_ms || 0),
    stages: events.slice(-8).map((event, index, arr) => ({
      label: event.label || event.type || 'event',
      state: ok ? 'done' : (index === arr.length - 1 ? 'error' : 'done'),
      at_ms: Number(event.at_ms || 0),
      detail: event.detail || event.preview || '',
      type: event.type || ''
    })),
    tools: tools.slice(-10).map(tool => ({
      name: tool.name || tool.tool || tool.label || 'tool',
      status: tool.status || tool.type || 'event',
      at_ms: Number(tool.at_ms || 0),
      preview: tool.preview || tool.detail || ''
    })),
    diagnostic: data?.diagnostic || null
  };
}

function runHasFailure(run) {
  if (!run) return false;
  if (run.state === 'error' || run.diagnostic) return true;
  return (run.tools || []).some(t => /error|fail|denied|timeout/i.test(t.status || ''));
}
function renderRunPanel(run) {
  if (!run) return '';
  const failed = runHasFailure(run);
  // Tool-call display: hidden when the toggle is off — EXCEPT failures, which
  // always surface (a red marker) so they're never silently hidden.
  if (!showToolCalls && !failed) return '';
  const elapsed = run.elapsed_ms ? `${Math.max(1, Math.round(run.elapsed_ms / 1000))}s` : 'running';
  const stages = (run.stages || []).length ? run.stages : [{ label: 'working', state: run.state || 'active' }];
  const stageHtml = stages.map(stage => {
    const state = stage.state || (run.state === 'error' ? 'error' : 'done');
    const timing = Number.isFinite(stage.at_ms) && stage.at_ms > 0 ? `${Math.round(stage.at_ms / 1000)}s` : '';
    const detail = stage.detail ? ` title="${esc(stage.detail)}"` : '';
    return `<div class="hubert-run-stage ${esc(state)}"${detail}><span class="dot"></span><strong>${esc(stage.label || 'event')}</strong><small>${esc(timing)}</small></div>`;
  }).join('');
  const toolHtml = (run.tools || []).length ? `
    <div class="hubert-tool-list">
      ${(run.tools || []).map(tool => {
        const bad = /error|fail|denied|timeout/i.test(tool.status || '');
        return `
        <div class="hubert-tool-row${bad ? ' tool-failed' : ''}" title="${esc(tool.preview || '')}">
          <strong>${esc(tool.name || 'tool')}</strong>
          <span>${esc(tool.status || 'used')}</span>
        </div>`;
      }).join('')}
    </div>` : '';
  const diagnosticHtml = run.diagnostic ? `
    <div class="hubert-error-detail">
      <div class="error-code">${esc(run.diagnostic.code || 'CHAT_FAILED')}</div>
      <div>${esc(run.diagnostic.message || '')}</div>
      <div>${esc(run.diagnostic.next_action || '')}</div>
    </div>` : '';
  const nTools = (run.tools || []).length;
  const toolSummary = nTools ? ` · ${nTools} tool${nTools > 1 ? 's' : ''}` : '';
  const failMark = failed ? '<span class="run-fail">✕ failed</span>' : '';
  // Compact-by-default: a collapsed <details> summary; click to expand the full track.
  return `
    <details class="hubert-run-card${failed ? ' run-failed' : ''}">
      <summary>🔧 ${esc(chatModelLabel(run.model || 'default'))} · ${esc(elapsed)}${esc(toolSummary)}${failMark}</summary>
      <div class="hubert-run-track">${stageHtml}</div>
      ${toolHtml}
      ${diagnosticHtml}
    </details>
  `;
}

function chatFailureText(status, data, err) {
  if (err) return `Network error: ${err.message || err}`;
  const diagnostic = data?.diagnostic || {};
  const message = diagnostic.message || data?.error || 'Chat request failed';
  if (status === 401) return 'Cloudflare Access did not authenticate this chat request. Refresh the graph and try again.';
  if (status === 403) return 'This chat session belongs to another browser session. Refresh to start a clean one.';
  if (status === 429) return 'The chat rate limit is protecting the box. Wait a minute and send it again.';
  if (status === 400) return message;
  if (status >= 500) return `MiMo could not finish the run: ${message}`;
  return message;
}

function renderHubertMessages() {
  const el = document.getElementById('hubert-messages');
  const rows = hubertMessages.map(m => {
    const role = esc(m.role);
    return `<div class="hubert-msg ${role}"><div class="msg-meta">${esc(hubertRoleLabel(m.role))}</div><div class="msg-body">${formatHubertText(m.text)}${renderRunPanel(m.run)}</div></div>`;
  });
  if (hubertSending && pendingHubertRun) {
    rows.push(`<div class="hubert-msg pending"><div class="msg-meta">Hubert</div><div class="msg-body">working${renderRunPanel(pendingHubertRun)}</div></div>`);
  }
  el.innerHTML = rows.join('');
  el.scrollTop = el.scrollHeight;
  renderHubertContext();
}

async function sendHubertMessage() {
  const input = document.getElementById('hubert-input');
  const text = input.value.trim();
  if (!text || hubertSending) return;
  if (!(await ensureGraphSecret())) {
    hubertMessages.push({
      role: 'error',
      text: 'Edits are locked. Unlock edits before asking Hubert to act on the graph.',
      run: normalizeRunReceipt({
        model: document.getElementById('chat-model-select')?.value || 'default',
        diagnostic: { code: 'EDITS_LOCKED', message: 'Mutation auth is not available.', next_action: 'Unlock edits and retry.' },
        events: [{ label: 'edit auth missing', type: 'auth', at_ms: 0 }]
      }, null, false)
    });
    renderHubertMessages();
    return;
  }
  hubertSending = true;
  hubertMessages.push({ role: 'user', text });
  saveClusterChat(currentCluster);
  input.value = '';
  input.style.height = '';
  document.getElementById('hubert-send').disabled = true;

  // Build context
  let context = '';
  if (currentCluster) context += '[cluster: ' + currentCluster + '] ';
  const selectedContext = selectionContextLines(activeSelectionNodes());
  if (selectedContext.length) context += '[selected: ' + selectedContext.join('; ') + '] ';
  if (graphData) context += '[graph: ' + graphData.node_count + ' nodes, ' + graphData.link_count + ' links] ';

  const modelSel = document.getElementById('chat-model-select');
  const model = modelSel ? modelSel.value : 'default';
  const contextLabel = currentCluster ? `${currentCluster} context` : 'workspace context';
  startPendingHubertRun(model, contextLabel);
  renderHubertMessages();

  try {
    const hdrs = { 'Content-Type': 'application/json', ...graphSecretHeaders() };
    updateChatModelStatus('running', 'MiMo is working in the live workspace');
    const body = JSON.stringify({
      message: context + text,
      session_id: hubertSessionId,
      model
    });
    const r = await fetch(apiUrl('/chat'), { method: 'POST', headers: hdrs, body });
    let data = {};
    try {
      data = await r.json();
    } catch (_) {
      data = { ok: false, error: `HTTP ${r.status}` };
    }
    if (data.ok) {
      hubertMessages.push({
        role: 'assistant',
        text: data.response || '(no response)',
        run: normalizeRunReceipt(data, model, true)
      });
      hubertSessionId = data.session_id || hubertSessionId;
      if (data.model) {
        chatModelHealth[data.model] = {
          state: 'verified',
          note: `last reply in ${Math.max(1, Math.round((data.elapsed_ms || 0) / 1000))}s`
        };
      }
    } else {
      hubertMessages.push({
        role: 'error',
        text: chatFailureText(r.status, data),
        run: normalizeRunReceipt(data, model, false)
      });
      if (data.model) chatModelHealth[data.model] = { state: 'error', note: data.error || 'chat failed' };
    }
  } catch (e) {
    hubertMessages.push({
      role: 'error',
      text: chatFailureText(0, null, e),
      run: normalizeRunReceipt({
        model,
        diagnostic: { code: 'NETWORK_ERROR', message: e.message, next_action: 'Check the graph service and try again.' },
        events: [{ label: 'network request failed', type: 'network', at_ms: 0 }]
      }, model, false)
    });
    updateChatModelStatus('error', e.message);
  }
  hubertSending = false;
  clearPendingHubertRun();
  document.getElementById('hubert-send').disabled = false;
  updateChatModelStatus();
  saveClusterChat(currentCluster);
  renderHubertMessages();
}

document.getElementById('hubert-send').addEventListener('click', sendHubertMessage);
document.getElementById('hubert-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendHubertMessage();
  }
});
document.getElementById('hubert-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(Math.max(this.scrollHeight, 104), 220) + 'px';
});
document.querySelectorAll('.hubert-chip').forEach(btn => {
  btn.addEventListener('click', () => {
    const input = document.getElementById('hubert-input');
    const prompt = btn.dataset.prompt || '';
    input.value = input.value.trim() ? `${input.value.trim()}\n\n${prompt}` : prompt;
    input.dispatchEvent(new Event('input'));
    input.focus();
  });
});
renderHubertMessages();

// ── Fetch focused agent data ──
function loadFocusedAgentData(agentId) {
  const clean = cleanAgentId(agentId);
  const hdrs = mutationHeaders();
  Promise.allSettled([
    fetch(apiUrl(`/agent-config?agent_id=${encodeURIComponent(clean)}`), { headers: hdrs }).then(r => r.json()),
    fetch(apiUrl('/agent-tools'), { headers: hdrs }).then(r => r.json()),
    fetch(apiUrl('/agent-models'), { headers: hdrs }).then(r => r.json()),
    fetch(apiUrl(`/agent-verify?agent_id=${encodeURIComponent(clean)}`), { headers: hdrs }).then(r => r.json()),
    fetch(apiUrl(`/agent-evals?agent_id=${encodeURIComponent(clean)}`), { headers: hdrs }).then(r => r.json()),
  ]).then(results => {
    const [config, tools, models, verify, evals] = results;
    focusedAgentConfig = config.status === 'fulfilled' ? config.value : { ok: false, error: config.reason?.message || 'config failed' };
    focusedAgentTools = tools.status === 'fulfilled' ? (tools.value.tools || tools.value || []) : [];
    focusedAgentModels = models.status === 'fulfilled' ? (models.value.models || []) : [];
    focusedAgentVerify = verify.status === 'fulfilled' ? verify.value : { ok: false, error: verify.reason?.message || 'verify failed' };
    focusedAgentEvalsets = evals.status === 'fulfilled' ? (evals.value.evalsets || []) : [];
    focusedAgentEval = evals.status === 'fulfilled' ? (evals.value.last_run || null) : { ok: false, error: evals.reason?.message || 'evals failed' };
    // Refresh workbench if still in focus mode
    if (viewMode === 'agent' && focusedAgentId === agentId) {
      openAgentWorkbench(agentId, 'config');
      renderLens();
    }
  });
}

// ── Config save handler ──
function attachFocusConfigHandlers(agentId) {
  const btn = document.getElementById('focus-save-config');
  if (!btn) return;
  btn.addEventListener('click', () => saveFocusedAgentConfig(agentId));
}

async function saveFocusedAgentConfig(agentId) {
  const clean = cleanAgentId(agentId);
  const saveMsg = document.getElementById('inspect-save-msg');
  const instruction = document.getElementById('focus-instruction')?.value?.trim() || '';
  if (!instruction) {
    saveMsg.className = 'save-msg err';
    saveMsg.textContent = 'Instruction cannot be blank';
    return;
  }
  const tools = Array.from(document.querySelectorAll('.focus-tool-check:checked')).map(el => el.value);
  const body = JSON.stringify({
    agent_id: clean,
    description: document.getElementById('focus-description')?.value || clean,
    model: document.getElementById('focus-model')?.value || '',
    instruction,
    tools,
  });
  saveMsg.className = 'save-msg';
  saveMsg.textContent = 'Saving config...';
  if (!(await ensureGraphSecret())) {
    saveMsg.className = 'save-msg err';
    saveMsg.textContent = 'Edits locked';
    return;
  }
  fetch(apiUrl('/agent-config'), {
    method: 'POST',
    headers: mutationHeaders({ 'Content-Type': 'application/json' }),
    body,
  })
    .then(r => r.json())
    .then(data => {
      if (data.ok === false || data.error) {
        saveMsg.className = 'save-msg err';
        saveMsg.textContent = data.error || 'Save failed';
        return;
      }
      saveMsg.className = 'save-msg ok';
      saveMsg.textContent = 'Config saved';
      loadFocusedAgentData(agentId);
    })
    .catch(err => { saveMsg.className = 'save-msg err'; saveMsg.textContent = err.message; });
}

// ── Verify & Generate handlers ──
function attachFocusRunHandlers(agentId) {
  const verify = document.getElementById('focus-verify-btn');
  const generate = document.getElementById('focus-generate-btn');
  if (verify) verify.addEventListener('click', () => verifyFocusedAgent(agentId));
  if (generate) generate.addEventListener('click', () => generateFocusedAgent(agentId));
}

async function verifyFocusedAgent(agentId) {
  const clean = cleanAgentId(agentId);
  const saveMsg = document.getElementById('inspect-save-msg');
  saveMsg.className = 'save-msg';
  saveMsg.textContent = 'Verifying...';
  if (!(await ensureGraphSecret())) {
    saveMsg.className = 'save-msg err';
    saveMsg.textContent = 'Edits locked';
    return;
  }
  fetch(apiUrl(`/agent-verify?agent_id=${encodeURIComponent(clean)}`), { headers: mutationHeaders() })
    .then(r => r.json())
    .then(data => {
      focusedAgentVerify = data;
      saveMsg.className = data.ok === false ? 'save-msg err' : 'save-msg ok';
      saveMsg.textContent = data.ok === false ? (data.error || 'Verify failed') : 'Verify passed';
      renderFocusSection(agentId, 'run');
      renderLens();
    })
    .catch(err => { saveMsg.className = 'save-msg err'; saveMsg.textContent = err.message; });
}

async function generateFocusedAgent(agentId) {
  const clean = cleanAgentId(agentId);
  if (!confirm(`Generate agent ${clean}? This will write generated files from the current config.`)) return;
  const saveMsg = document.getElementById('inspect-save-msg');
  saveMsg.className = 'save-msg';
  saveMsg.textContent = 'Generating...';
  if (!(await ensureGraphSecret())) {
    saveMsg.className = 'save-msg err';
    saveMsg.textContent = 'Edits locked';
    return;
  }
  fetch(apiUrl('/agent-generate'), {
    method: 'POST',
    headers: mutationHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify({ agent_id: clean }),
  })
    .then(r => r.json())
    .then(data => {
      if (data.ok === false || data.error) {
        saveMsg.className = 'save-msg err';
        saveMsg.textContent = data.error || 'Generate failed';
        return;
      }
      saveMsg.className = 'save-msg ok';
      saveMsg.textContent = 'Generated';
      verifyFocusedAgent(agentId);
    })
    .catch(err => { saveMsg.className = 'save-msg err'; saveMsg.textContent = err.message; });
}

// ── Eval handlers ──
function attachFocusEvalHandlers(agentId) {
  const btn = document.getElementById('focus-run-evals-btn');
  if (!btn) return;
  btn.addEventListener('click', () => runFocusedAgentEvals(agentId));
}

async function runFocusedAgentEvals(agentId) {
  const clean = cleanAgentId(agentId);
  const saveMsg = document.getElementById('inspect-save-msg');
  const evalsetId = focusedAgentEvalsets?.[0]?.id || 'default';
  saveMsg.className = 'save-msg';
  saveMsg.textContent = 'Running evals...';
  if (!(await ensureGraphSecret())) {
    saveMsg.className = 'save-msg err';
    saveMsg.textContent = 'Edits locked';
    return;
  }
  fetch(apiUrl('/agent-eval-run'), {
    method: 'POST',
    headers: mutationHeaders({ 'Content-Type': 'application/json' }),
    body: JSON.stringify({ agent_id: clean, evalset_id: evalsetId }),
  })
    .then(r => r.json())
    .then(data => {
      focusedAgentEval = data;
      saveMsg.className = data.ok ? 'save-msg ok' : 'save-msg err';
      saveMsg.textContent = data.ok ? 'Evals passed' : (data.error || 'Evals failed');
      renderFocusSection(agentId, 'evals');
      renderLens();
    })
    .catch(err => { saveMsg.className = 'save-msg err'; saveMsg.textContent = err.message; });
}

// ── Fetch models list ──
function loadModels() {
  fetch(apiUrl('/models'))
    .then(r => r.json())
    .then(data => { availableModels = data.models || []; })
    .catch(() => {});
}

// ── URL hash deep-linking ──
function parseHashState() {
  const raw = window.location.hash.replace(/^#/, '');
  const params = new URLSearchParams(raw);
  return { cluster: params.get('cluster'), agent: params.get('agent') };
}

function writeHashState() {
  const params = new URLSearchParams();
  if (currentCluster) params.set('cluster', currentCluster);
  if (viewMode === 'agent' && focusedAgentId) params.set('agent', cleanAgentId(focusedAgentId));
  const next = '#' + params.toString();
  if (window.location.hash !== next) history.replaceState(null, '', next);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
    if (handleGraphArrowKey(e.key)) {
      e.preventDefault();
      e.stopPropagation();
    }
    return;
  }
  if ((e.key === 'Enter' || e.key === ' ') && keyboardNodeId) {
    const node = keyboardNodeById(keyboardNodeId);
    if (node) {
      e.preventDefault();
      e.stopPropagation();
      openInspect(node);
    }
    return;
  }
  if (e.key === 'Escape') {
    if (sidecarOpen) { closeSidecar(); return; }
    if (wireMode) { document.getElementById('wire-cancel').click(); return; }
    if (viewMode === 'agent') { exitAgentFocus(); return; }
    if (document.getElementById('inspect').classList.contains('open')) {
      document.getElementById('inspect-close').click(); return;
    }
    if (selectedNodeIds.size) { clearGraphSelection(); return; }
    if (keyboardNodeId) { clearKeyboardNode(); return; }
  }
  if (e.key === 'i' || e.key === 'I') { toggleSidecar(); }
});

// ── Init ──
loadClusters();
loadRegistryAgents();
loadModels();
startPulse();

// ── Restore hash state on load ──
setTimeout(() => {
  const hash = parseHashState();
  if (hash.cluster && hash.cluster !== currentCluster) {
    selectCluster(hash.cluster);
  }
  if (hash.agent) {
    // Wait for graph data to load, then enter focus
    const tryFocus = () => {
      if (graphData && graphData.nodes) {
        const agentId = 'agent:' + hash.agent;
        if (getNodeById(agentId)) {
          enterAgentFocus(agentId);
        }
      } else {
        setTimeout(tryFocus, 500);
      }
    };
    setTimeout(tryFocus, 800);
  }
}, 500);
