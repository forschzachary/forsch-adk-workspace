<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Agent Graph — Cluster Tabs</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }
  #graph-wrap { width: 100vw; height: 100vh; position: relative; }
  #graph { width: 100%; height: 100%; position: relative; z-index: 2; outline: none; }
  #graph:focus-visible { box-shadow: inset 0 0 0 1px rgba(88,166,255,0.32); }
  .sr-only {
    position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
    overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
  }
  /* ── Swim-lane overlay: operator controls above the graph-space lane sheet ── */
  #swimlane-overlay {
    position: absolute; left: 0; top: 36px; right: 300px; bottom: 0;
    pointer-events: none; z-index: 1;
    display: none; flex-direction: column;
  }
  #swimlane-overlay.on { display: flex; }
  .swimlane-row {
    position: relative; flex: 1 1 0;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .swimlane-row:first-child { border-top: none; }
  /* ── Interactive controls layer (above the canvas) ── */
  #swimlane-controls {
    position: absolute; left: 0; top: 0; right: 300px; bottom: 0;
    z-index: 3; pointer-events: none;
    display: none; overflow: visible;
  }
  #swimlane-controls.on { display: none; }
  .swimlane-ctrl-row {
    position: absolute; left: 0; top: 0; width: 0; height: 0;
    pointer-events: none; transition: box-shadow 0.12s;
  }
  body.dragging .swimlane-ctrl-row { pointer-events: auto; }   /* graph-space drop targets only while dragging a chip */
  .swimlane-ctrl-row.drop-ok { box-shadow: inset 0 0 0 1px var(--lane-hue); background: rgba(255,255,255,0.02); }
  .swimlane-header {
    position: absolute; top: 14px; left: 18px;
    display: grid;
    grid-template-columns: max-content max-content max-content 1fr;
    align-items: center; column-gap: 12px; row-gap: 8px;
    width: min(760px, calc(100vw - 380px));
    pointer-events: none;
  }
  .swimlane-header > * { pointer-events: auto; }
  .swimlane-header.disabled { opacity: 0.4; }
  .swimlane-label {
    display: flex; align-items: center; gap: 9px;
    font-size: 10px; font-weight: 600; letter-spacing: 2.5px;
    text-transform: uppercase; color: rgba(150,170,190,0.5);
    white-space: nowrap; user-select: none;
  }
  .swimlane-label::before {
    content: ''; width: 3px; height: 18px; border-radius: 2px;
    background: var(--lane-hue); opacity: 0.6;
  }
  .lane-form { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
  .lane-form[hidden] { display: none; }
  .lane-form input {
    font-size: 11px; background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
    color: #c9d1d9; padding: 3px 7px; width: 128px;
  }
  .lane-form input:focus { outline: none; border-color: var(--lane-hue); }
  .lane-form button {
    font-size: 11px; background: #1a3a1a; border: 1px solid #2ea043; color: #3fb950;
    border-radius: 4px; padding: 3px 10px; cursor: pointer;
  }
  .lane-lib {
    grid-column: 1 / -1;
    display: flex; gap: 7px; flex-wrap: wrap; align-items: center;
    min-height: 22px;
  }
  .lane-chip {
    font-size: 10px; font-family: ui-monospace, 'SF Mono', monospace; color: #c9d1d9;
    background: rgba(255,255,255,0.03); border: 1px solid var(--lane-hue);
    border-radius: 10px; padding: 2px 9px; cursor: grab; white-space: nowrap; opacity: 0.85;
  }
  .lane-chip:hover { opacity: 1; background: rgba(255,255,255,0.08); }
  .lane-chip:active { cursor: grabbing; }
  .lane-chip.in-cluster { opacity: 0.3; cursor: default; border-style: dashed; }
  /* ── Tool bundles: collapsible groups in the Tools · Data picker ── */
  .lane-bundle-group { display: inline-flex; flex-direction: column; gap: 3px; vertical-align: top; }
  .lane-bundle-chip {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 10px; font-family: ui-monospace, 'SF Mono', monospace; color: #d4a574;
    background: rgba(212,165,116,0.08); border: 1px solid #d4a574;
    border-radius: 10px; padding: 2px 9px; cursor: pointer; white-space: nowrap;
  }
  .lane-bundle-chip:hover { background: rgba(212,165,116,0.16); }
  .lane-bundle-chip .chev { font-size: 8px; opacity: 0.8; transition: transform 0.12s; }
  .lane-bundle-chip.open .chev { transform: rotate(90deg); }
  .lane-bundle-chip .count { font-size: 8px; background: rgba(212,165,116,0.25); border-radius: 7px; padding: 0 5px; }
  .lane-bundle-children { display: none; flex-wrap: wrap; gap: 4px; padding: 2px 0 2px 10px; }
  .lane-bundle-children.open { display: flex; }
  .tool-child {
    font-size: 9px; font-family: ui-monospace, 'SF Mono', monospace; color: #9db3c0;
    background: rgba(255,255,255,0.03); border: 1px dashed rgba(212,165,116,0.4);
    border-radius: 8px; padding: 1px 7px; cursor: pointer; white-space: nowrap; opacity: 0.85;
  }
  .tool-child:hover { opacity: 1; }
  .tool-child.inactive { opacity: 0.3; cursor: default; text-decoration: line-through; }
  .lane-msg { font-size: 10px; }
  .lane-msg.ok { color: #3fb950; }
  .lane-msg.err { color: #ff7b72; }
  /* ── Tab bar ── */
  #tab-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 15;
    display: flex; align-items: center; gap: 0;
    background: #161b22; border-bottom: 1px solid #30363d;
    padding: 0 8px; height: 36px; overflow-x: auto;
  }
  #tab-bar .tab {
    padding: 6px 14px; font-size: 12px; color: #8b949e;
    background: transparent; border: none; border-bottom: 2px solid transparent;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
    transition: color 0.15s, border-color 0.15s;
  }
  #tab-bar .tab:hover { color: #c9d1d9; }
  #tab-bar .tab.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  #tab-bar .tab .pct { font-size: 10px; color: #3fb950; margin-left: 4px; }
  #tab-bar .tab-add-agent {
    padding: 4px 8px; font-size: 11px; color: #d2a8ff;
    background: transparent; border: 1px dashed #30363d; border-radius: 4px;
    cursor: pointer; flex-shrink: 0; margin-left: 8px;
  }
  #tab-bar .tab-add-agent:hover { background: #1a1a2e; border-color: #d2a8ff; }
  /* ── Panel (shifted down for tab bar) ── */
  #panel {
    position: fixed; top: 48px; right: 16px; z-index: 10;
    background: rgba(16,22,30,0.94); border: 1px solid rgba(88,166,255,0.18); border-radius: 10px;
    box-shadow: 0 18px 50px rgba(0,0,0,0.34);
    padding: 12px; width: 268px; font-size: 13px; max-height: calc(100vh - 72px); overflow-y: auto;
    scrollbar-gutter: stable;
  }
  #panel h3 { margin: 12px 0 6px; color: #a5d6ff; font-size: 11px; text-transform: uppercase; letter-spacing: 1.8px; }
  #panel h3:first-child { margin-top: 0; }
  #panel .panel-kicker {
    font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: 1.7px; margin-bottom: 8px;
  }
  #panel .panel-group {
    display: grid; gap: 5px;
  }
  #panel .panel-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 5px;
  }
  #panel .lens-btn, #panel .action-btn {
    display: block; width: 100%; margin: 0; padding: 7px 9px;
    background: rgba(255,255,255,0.035); border: 1px solid rgba(139,148,158,0.22); border-radius: 6px;
    color: #c9d1d9; cursor: pointer; text-align: left; font-size: 11px;
  }
  #panel .lens-btn:hover, #panel .action-btn:hover { background: rgba(88,166,255,0.08); border-color: rgba(88,166,255,0.38); }
  #panel .lens-btn.active { background: rgba(31,111,235,0.92); border-color: #58a6ff; color: #f0f6fc; }
  #panel .action-btn.primary { background: rgba(46,160,67,0.14); border-color: rgba(63,185,80,0.46); color: #7ee787; }
  #panel .action-btn.primary:hover { background: rgba(46,160,67,0.34); color: #f0fff4; }
  #panel .action-btn:disabled {
    opacity: 0.45; cursor: not-allowed; border-color: rgba(139,148,158,0.16);
    background: rgba(255,255,255,0.025); color: #8b949e;
  }
  #panel .action-btn:disabled:hover { background: rgba(255,255,255,0.025); border-color: rgba(139,148,158,0.16); }
  #panel .action-btn.spawn { background: #1a3a1a; border-color: #2ea043; color: #3fb950; }
  #panel .action-btn.spawn:hover { background: #2ea043; color: #fff; }
  #panel .action-btn.refresh { background: rgba(88,166,255,0.08); border-color: rgba(88,166,255,0.42); color: #a5d6ff; }
  #panel .action-btn.refresh:hover { background: rgba(31,111,235,0.85); color: #fff; }
  #panel .action-btn.deps.on, #panel .action-btn.infra.on { background: rgba(86,212,221,0.11); border-color: rgba(86,212,221,0.58); color: #56d4dd; }
  #panel .action-btn.shared.on { background: #1a2a1a; border-color: #3fb950; color: #3fb950; }
  #panel input, #panel select {
    width: 100%; margin: 4px 0; padding: 5px 8px;
    background: #0d1117; border: 1px solid #30363d; border-radius: 4px;
    color: #c9d1d9; font-size: 12px;
  }
  #panel input:focus, #panel select:focus { outline: none; border-color: #58a6ff; }
  #panel .legend { margin-top: 8px; }
  #panel .legend-item { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 11px; }
  #panel .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  #panel .legend-icon { width: 12px; height: 12px; flex-shrink: 0; font-size: 11px; text-align: center; line-height: 12px; }
  #panel .legend-note { font-size: 10px; color: #8b949e; margin-top: 4px; line-height: 1.35; max-width: 210px; white-space: normal; }
  #panel .sep { border-top: 1px solid rgba(139,148,158,0.18); margin: 10px 0; }
  #panel .msg { font-size: 11px; margin-top: 4px; min-height: 16px; }
  #panel .msg.ok { color: #3fb950; }
  #panel .msg.err { color: #ff7b72; }
  #panel .selection-card {
    border: 1px solid rgba(139,148,158,0.2);
    border-radius: 8px;
    background: rgba(13,17,23,0.52);
    padding: 9px;
    min-height: 82px;
  }
  #selection-title {
    color: #e6edf3;
    font-weight: 750;
    font-size: 12px;
    line-height: 1.25;
    overflow-wrap: anywhere;
  }
  #selection-meta {
    margin-top: 4px;
    color: #8b949e;
    font-size: 11px;
    line-height: 1.35;
  }
  #selection-list {
    display: grid;
    gap: 5px;
    margin-top: 8px;
    max-height: 150px;
    overflow-y: auto;
  }
  .selection-chip {
    display: grid;
    grid-template-columns: 7px minmax(0,1fr);
    gap: 7px;
    align-items: center;
    border: 1px solid rgba(139,148,158,0.18);
    border-radius: 6px;
    padding: 5px 6px;
    background: rgba(255,255,255,0.03);
  }
  .selection-chip .swatch {
    width: 7px;
    height: 22px;
    border-radius: 999px;
    background: #58a6ff;
  }
  .selection-chip .name {
    color: #d8dee7;
    font-size: 11px;
    font-weight: 650;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .selection-chip .meta {
    margin-top: 1px;
    color: #8b949e;
    font-size: 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .mimo-ready {
    margin-top: 6px;
    color: #7ee787;
    font-size: 11px;
    line-height: 1.35;
  }
  #info { position: fixed; bottom: 16px; left: 16px; z-index: 10; font-size: 12px; color: #8b949e; }
  #tooltip {
    position: fixed; pointer-events: none; z-index: 20;
    background: #161b22; border: 1px solid #30363d; border-radius: 6px;
    padding: 8px 12px; font-size: 12px; max-width: 300px; display: none;
  }
  /* ── Inspect panel (right slide-in) ── */
  #inspect {
    position: fixed; top: 40px; right: 0; bottom: 0; width: 320px; z-index: 20;
    background: #161b22; border-left: 1px solid #30363d;
    transform: translateX(100%); transition: transform 0.2s ease;
    display: flex; flex-direction: column; overflow: hidden;
  }
  #inspect.open { transform: translateX(0); }
  #inspect-header {
    padding: 12px 16px; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 8px;
  }
  #inspect-header .close-btn {
    margin-left: auto; background: none; border: none; color: #8b949e;
    cursor: pointer; font-size: 16px; padding: 2px 6px;
  }
  #inspect-header .close-btn:hover { color: #ff7b72; }
  #inspect-header h3 { margin: 0; font-size: 14px; color: #58a6ff; }
  #inspect-body { flex: 1; overflow-y: auto; padding: 12px 16px; font-size: 12px; }
  #inspect-body .field { margin-bottom: 10px; }
  #inspect-body .field label { display: block; color: #8b949e; margin-bottom: 3px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
  #inspect-body .field input, #inspect-body .field select, #inspect-body .field textarea {
    width: 100%; padding: 5px 8px; background: #0d1117; border: 1px solid #30363d;
    border-radius: 4px; color: #c9d1d9; font-size: 12px; font-family: inherit;
  }
  #inspect-body .field textarea { min-height: 60px; resize: vertical; }
  #inspect-body .field input:focus, #inspect-body .field select:focus, #inspect-body .field textarea:focus {
    outline: none; border-color: #58a6ff;
  }
  #inspect-body .field .ro { color: #8b949e; padding: 5px 0; }
  #inspect-body .field .contract-tag {
    display: inline-block; padding: 2px 6px; margin: 2px; border-radius: 3px;
    font-size: 10px; background: #21262d; border: 1px solid #30363d;
  }
  #inspect-body .field .contract-tag.accept { border-color: #3fb950; color: #3fb950; }
  #inspect-body .field .contract-tag.emit { border-color: #58a6ff; color: #58a6ff; }
  #inspect-body .gate-row { display: flex; gap: 6px; margin-top: 4px; }
  #inspect-body .gate-pill {
    padding: 3px 8px; border-radius: 3px; font-size: 10px; font-weight: 600;
    background: #21262d; border: 1px solid #30363d; color: #8b949e;
  }
  #inspect-body .gate-pill.pass { border-color: #3fb950; color: #3fb950; }
  #inspect-footer {
    padding: 10px 16px; border-top: 1px solid #30363d;
    display: flex; gap: 8px;
  }
  #inspect-footer button {
    flex: 1; padding: 6px 10px; border-radius: 4px; border: 1px solid #30363d;
    cursor: pointer; font-size: 12px;
  }
  #inspect-footer .save-btn { background: #238636; border-color: #2ea043; color: #fff; }
  #inspect-footer .save-btn:hover { background: #2ea043; }
  #inspect-footer .wire-btn { background: #1f6feb; border-color: #1f6feb; color: #fff; }
  #inspect-footer .wire-btn:hover { background: #388bfd; }
  #inspect-footer .wire-btn.active { background: #da3633; border-color: #da3633; }
  #inspect .save-msg { padding: 0 16px 8px; font-size: 11px; min-height: 16px; }
  #inspect .save-msg.ok { color: #3fb950; }
  #inspect .save-msg.err { color: #ff7b72; }
  /* ── AI sidecar (bottom-left chat) ── */
  #ai-sidecar {
    position: fixed; bottom: 0; left: 0; width: 380px; height: 320px; z-index: 20;
    background: #161b22; border-top: 1px solid #30363d; border-right: 1px solid #30363d;
    border-radius: 0 8px 0 0; display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform 0.2s ease;
  }
  #ai-sidecar.open { transform: translateY(0); }
  #ai-sidecar-header {
    padding: 8px 12px; border-bottom: 1px solid #30363d;
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  #ai-sidecar-header .avatar { width: 20px; height: 20px; border-radius: 50%; background: #d29922; display: flex; align-items: center; justify-content: center; font-size: 10px; }
  #ai-sidecar-header span { font-size: 12px; color: #8b949e; }
  #ai-sidecar-header .close-btn { margin-left: auto; background: none; border: none; color: #8b949e; cursor: pointer; font-size: 14px; }
  #ai-sidecar-header .close-btn:hover { color: #ff7b72; }
  #ai-messages { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 12px; }
  #ai-messages .msg { margin-bottom: 8px; padding: 6px 10px; border-radius: 6px; max-width: 90%; }
  #ai-messages .msg.user { background: #1f6feb22; border: 1px solid #1f6feb44; margin-left: auto; }
  #ai-messages .msg.hubert { background: #d2992222; border: 1px solid #d2992244; }
  #ai-messages .msg .sender { font-size: 10px; color: #8b949e; margin-bottom: 2px; }
  #ai-messages .msg.system { background: #21262d; border: 1px solid #30363d; color: #8b949e; font-style: italic; text-align: center; max-width: 100%; }
  #ai-input-row { display: flex; gap: 6px; padding: 8px 12px; border-top: 1px solid #30363d; flex-shrink: 0; }
  #ai-input-row input { flex: 1; padding: 6px 10px; background: #0d1117; border: 1px solid #30363d; border-radius: 4px; color: #c9d1d9; font-size: 12px; }
  #ai-input-row input:focus { outline: none; border-color: #58a6ff; }
  #ai-input-row button { padding: 6px 12px; background: #238636; border: 1px solid #2ea043; border-radius: 4px; color: #fff; cursor: pointer; font-size: 12px; }
  #ai-input-row button:hover { background: #2ea043; }
  #ai-input-row button:disabled { background: #21262d; border-color: #30363d; color: #484f58; cursor: not-allowed; }
  /* ── Wiring mode overlay ── */
  #wire-status {
    position: fixed; top: 44px; left: 50%; transform: translateX(-50%); z-index: 25;
    background: #1f6feb; color: #fff; padding: 6px 16px; border-radius: 4px;
    font-size: 12px; display: none;
  }
  #wire-status.active { display: block; }
  #wire-status .cancel { margin-left: 8px; background: none; border: none; color: #fff; text-decoration: underline; cursor: pointer; }
  /* ── View crumb ── */
  .view-crumb {
    position: absolute; top: 48px; left: 16px; z-index: 5;
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px; border: 1px solid rgba(139,148,158,0.25);
    border-radius: 9px; background: rgba(13,17,23,0.84);
    color: #8b949e; font-size: 12px;
  }
  #view-crumb-text { color: #c9d1d9; padding: 0 3px; white-space: nowrap; }
  .view-crumb button {
    border: 1px solid rgba(139,148,158,0.28); border-radius: 6px;
    background: rgba(22,27,34,0.9); color: #c9d1d9; cursor: pointer;
    padding: 3px 8px; font-size: 11px;
  }
  .view-crumb button:hover { border-color: #58a6ff; }
  .cluster-mode-segment {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 2px; border: 1px solid rgba(139,148,158,0.18);
    border-radius: 8px; background: rgba(255,255,255,0.025);
  }
  .cluster-mode-segment button {
    border: 0; background: transparent; color: #8b949e;
    padding: 3px 7px; border-radius: 6px; font-size: 10px;
  }
  .cluster-mode-segment button.active {
    color: #f0f6fc; background: rgba(88,166,255,0.18);
    box-shadow: inset 0 0 0 1px rgba(88,166,255,0.28);
  }
  .cluster-mode-segment button[data-mode="active"].active { background: rgba(63,185,80,0.17); box-shadow: inset 0 0 0 1px rgba(63,185,80,0.34); }
  .cluster-mode-segment button[data-mode="staging"].active { background: rgba(240,136,62,0.18); box-shadow: inset 0 0 0 1px rgba(240,136,62,0.34); }
  .cluster-mode-segment button[data-mode="off"].active { background: rgba(139,148,158,0.14); box-shadow: inset 0 0 0 1px rgba(139,148,158,0.28); }
  #cluster-restart-btn {
    color: #a5d6ff; border-color: rgba(88,166,255,0.32);
  }
  /* ── Focus workbench ── */
  .focus-tabs { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .focus-tab, .small-action {
    border: 1px solid #30363d; border-radius: 6px;
    background: #161b22; color: #c9d1d9;
    padding: 5px 8px; cursor: pointer; font-size: 11px;
  }
  .focus-tab:hover { border-color: #58a6ff; }
  .focus-tab.active { border-color: #58a6ff; color: #58a6ff; }
  .small-action.danger-light { border-color: rgba(248,81,73,0.45); }
  .small-action:hover { border-color: #58a6ff; }
  .json-block { white-space: pre-wrap; max-height: 220px; overflow: auto; font-size: 11px; background: #0d1117; padding: 6px 8px; border-radius: 4px; border: 1px solid #30363d; }
  .tool-check { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 11px; }
  .tool-check input { width: auto; }
  .eval-status { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 10px; font-weight: 600; }
  .eval-status.pass { background: #1a3a1a; border: 1px solid #3fb950; color: #3fb950; }
  .eval-status.fail { background: #3a1a1a; border: 1px solid #ff7b72; color: #ff7b72; }
  .eval-status.unknown { background: #21262d; border: 1px solid #30363d; color: #8b949e; }

<script>
// ── Color map ──
const COLORS = {
  agent: '#58a6ff', tool: '#f0883e', logic: '#3fb950',
  intake: '#d2a8ff', router: '#ff7b72', database: '#a5d6ff',
  ui: '#f0c040', builder: '#ffa198', design: '#79c0ff',
  capability: '#56d4dd',
  // A bundle is a container of orange tools → desaturated gold so it reads as
  // "a group of tools" while staying in the Tools · Data lane palette.
  bundle: '#d4a574',
  // Infra rail colors
  service: '#c8a0ff', host: '#8b949e', container: '#79c0ff',
  network: '#56d4dd', tunnel: '#ffa198',
};

const TOOL_ROLE_COLORS = {
  media: '#f0c040',
  access: '#ff7b72',
  queue: '#d2a8ff',
  memory: '#7ee787',
  comms: '#a5d6ff',
  health: '#56d4dd',
  action: '#ffa657',
};

// ── Helpers ──
const hexAlpha = a => Math.round(Math.max(0, Math.min(1, a)) * 255).toString(16).padStart(2, '0');
const lid = x => (x && typeof x === 'object') ? x.id : x;
const rgba = (hex, alpha) => hex + hexAlpha(alpha);

function toolRole(node) {
  const text = [node?.id, node?.name, node?.artifact].filter(Boolean).join(' ').toLowerCase();
  if (/(tv|playlist|movie|library|media|schedule|watched|jellyfin|pick)/.test(text)) return 'media';
  if (/(access|invite|guest|activation|account|login|provision|offboard|suspend|resume)/.test(text)) return 'access';
  if (/(queue|event|stage|request|retry|cancel|create|advance|bumps?)/.test(text)) return 'queue';
  if (/(knowledge|remember|read|list_knowledge|memory)/.test(text)) return 'memory';
  if (/(announce|dm|resend|friend|onboard|concierge)/.test(text)) return 'comms';
  if (/(audit|health|diagnose|storage|counts|admin|verify)/.test(text)) return 'health';
  return 'action';
}

function nodeColor(node) {
  if (node?.type === 'tool') return TOOL_ROLE_COLORS[toolRole(node)] || COLORS.tool;
  return COLORS[node?.type] || '#8b949e';
}

// ── Double-click detector (fallback for libraries without onNodeDoubleClick) ──
let _lastClick = { id: null, ts: 0 };
function _maybeDoubleClick(node) {
  const now = Date.now();
  const same = _lastClick.id === node.id;
  const fast = now - _lastClick.ts < 350;
  _lastClick = { id: node.id, ts: now };
  return same && fast;
}

// ── Node metrics ──
function computeNodeMetrics(data) {
  const cc = {};
  for (const l of data.links) {
    const s = lid(l.source), t = lid(l.target);
    cc[s] = (cc[s] || 0) + 1;
    cc[t] = (cc[t] || 0) + 1;
  }
  const gc = {};
  for (const n of data.nodes) {
    if (n.type === 'agent' && n.gates) {
      let passed = 0;
      if (n.gates.L0) passed++;
      if (n.gates.L1) passed++;
      if (n.gates.L2) passed++;
      if (n.gates.L3) passed++;
      gc[n.id] = passed / 4;
    }
  }
  return { cc, gc };
}

let nodeMetrics = { cc: {}, gc: {} };

const PADI_LIKE_LENSES = new Set(['padi', 'not-built', 'crossover', 'dependencies']);
function isPadiLens(lens = currentLens) {
  return PADI_LIKE_LENSES.has(lens);
}

function isPadiDataSourceNode(node) {
  return isPadiLens() && node?.rail === 'dependency' && node.type === 'database';
}

function isPinnedRailNode(node) {
  return !!node?.rail && !isPadiDataSourceNode(node);
}

function nodeRadius(node) {
  if (isPinnedRailNode(node)) return 5; // Rail nodes are medium dots
  const count = nodeMetrics.cc[node.id] || 0;
  if (node.type === 'agent') return Math.max(7, Math.min(18, 6 + count * 1.45));
  if (node.type === 'intake' || node.type === 'ui') return Math.max(10, Math.min(18, 8 + count * 1.4));
  // A bundle is a "blob" that grows with how many tools it holds — bloat at a glance.
  if (node.type === 'bundle') return Math.max(11, Math.min(28, 9 + (node.tools_count || count) * 1.8));
  return Math.max(4, Math.min(16, 4 + count * 1.3));
}

function padiScreenStableNodes() {
  return isPadiLens() && viewMode !== 'agent';
}

function nodeVisualRadius(node, scale) {
  const r = nodeRadius(node);
  // Screen-stable nodes (PADI) render at r/scale so they hold a constant on-screen size.
  // But when you zoom OUT (scale < ~0.67) r/scale balloons the WORLD radius — a bundle blob
  // grows past its fixed halo ring and swallows its own tools, collapsing the cluster into a
  // pile. Cap the world radius at 1.5× the base so zoom-out stays legible (below the cap the
  // nodes simply shrink on screen with the world, which is what you want for an overview).
  return padiScreenStableNodes() && !isPinnedRailNode(node) ? Math.min(r / scale, r * 1.5) : r;
}

const LANE_Y = {
  intake: -240, ui: -240,
  agent: -80, logic: -80,
  tool: 80, bundle: 80,
  database: 240,
};
// Swim-lane sheet rows, top → bottom. The colored sheet is drawn in graph
// coordinates so it scales and pans with the live graph; the DOM layer above it
// is only the operator control surface.
const PADI_LANES = [
  { key: 'interfaces', label: 'Interfaces',    hue: '210,168,255' },
  { key: 'agent',      label: 'Agent · Logic', hue: '88,166,255'  },
  { key: 'tools',      label: 'Tools',         hue: '240,136,62'  },
  { key: 'datasources', label: 'Data Sources', hue: '165,214,255' },
];
// LANE_Y value → swim-lane row index
const LANE_INDEX = { '-240': 0, '-80': 1, '80': 2, '240': 3 };
const RAIL_X = 900;
const PADI_LANE_DEFAULT_HEIGHT = 320;
const PADI_LANE_GAP = 0;
const PADI_LANE_MIN_HEIGHT = {
  interfaces: 270,
  agent: 340,
  tools: 620,
  datasources: 270,
};
const PADI_WORLD_X_SHIFT = -80;
const PADI_CONTROL_GAP = 6;
const PADI_CONTROL_LEFT_PAD = 18;
const PADI_CONTROL_TOP_PAD = 28;
const PADI_CONTROL_ROW_GAP = 28;
const PADI_LIBRARY_COL_STEP = 86;
const PADI_LIBRARY_ROW_STEP = 26;
const PADI_LIBRARY_COLS = 3;
const PADI_NODE_Y_OFFSET = 42;
const PADI_TOOL_LABEL_ZOOM = 1.24;
const PADI_TOOL_TOP_CORRIDOR = Math.PI * 0.42;
const PADI_ROUTE_PIN_STORAGE_PREFIX = 'live-agent-graph:padi-route-pins:';

function padiLaneCenter(laneIndex) {
  const geometry = computePadiLaneGeometry(defaultPadiLaneHeights());
  return geometry.y[laneIndex] || 0;
}

function defaultPadiLaneHeights() {
  return PADI_LANES.map(lane => PADI_LANE_MIN_HEIGHT[lane.key] || PADI_LANE_DEFAULT_HEIGHT);
}

function computePadiLaneGeometry(heights) {
  const safeHeights = PADI_LANES.map((lane, i) => Math.max(
    PADI_LANE_MIN_HEIGHT[lane.key] || PADI_LANE_DEFAULT_HEIGHT,
    heights[i] || PADI_LANE_DEFAULT_HEIGHT
  ));
  const totalHeight = safeHeights.reduce((sum, h) => sum + h, 0) + PADI_LANE_GAP * Math.max(0, safeHeights.length - 1);
  let top = -totalHeight / 2;
  const y = [];
  const topY = [];
  const bottomY = [];
  safeHeights.forEach((height, i) => {
    topY[i] = top;
    y[i] = top + height / 2;
    bottomY[i] = top + height;
    top += height + PADI_LANE_GAP;
  });
  const bounds = bottomY.slice(0, -1).map((bottom, i) => bottom + PADI_LANE_GAP / 2);
  return { y, topY, bottomY, bounds, heights: safeHeights };
}

function computePadiLaneHeights(buckets, nodes, links) {
  const heights = PADI_LANES.map((lane, i) => {
    const count = buckets[i]?.length || 0;
    const base = PADI_LANE_MIN_HEIGHT[lane.key] || PADI_LANE_DEFAULT_HEIGHT;
    if (count === 0) return base;
    return base + Math.min(72, Math.max(0, count - 3) * 12);
  });
  const byId = {};
  nodes.forEach(n => { byId[n.id] = n; });
  let maxToolCount = 0;
  const countsByBundle = {};
  links.forEach(l => {
    if (l.kind !== 'contains') return;
    const s = byId[lid(l.source)];
    const t = byId[lid(l.target)];
    if (s?.type === 'bundle' && t?.type === 'tool') {
      countsByBundle[s.id] = (countsByBundle[s.id] || 0) + 1;
      maxToolCount = Math.max(maxToolCount, countsByBundle[s.id]);
    }
  });
  const toolsLane = LANE_INDEX[String(LANE_Y.tool)];
  if (maxToolCount) {
    const haloR = 48 + maxToolCount * 4.7;
    heights[toolsLane] = Math.max(heights[toolsLane], Math.ceil((PADI_NODE_Y_OFFSET + haloR + 72) * 2));
  }
  return heights;
}

function padiRoutePinStorageKey(cluster = currentCluster) {
  return PADI_ROUTE_PIN_STORAGE_PREFIX + (cluster || 'workspace');
}

function loadPadiRoutePinOffsets(cluster = currentCluster) {
  try {
    const raw = localStorage.getItem(padiRoutePinStorageKey(cluster));
    if (!raw) return {};
    const parsed = JSON.parse(raw);
    return parsed && typeof parsed === 'object' ? parsed : {};
  } catch (_) {
    return {};
  }
}

function savePadiRoutePinOffsets(cluster = currentCluster) {
  try {
    const entries = Object.entries(padiRoutePinOffsets)
      .filter(([, value]) => Number.isFinite(value) && Math.abs(value) > 1);
    if (!entries.length) {
      localStorage.removeItem(padiRoutePinStorageKey(cluster));
      return;
    }
    localStorage.setItem(padiRoutePinStorageKey(cluster), JSON.stringify(Object.fromEntries(entries)));
  } catch (_) {
    // localStorage can fail in restricted embeds; route handles still work for the session.
  }
}

function routePinDefaultX(boundaryIndex, fallbackX = null) {
  const x = padiRoutePinDefaults[boundaryIndex];
  if (Number.isFinite(x)) return x;
  if (Number.isFinite(fallbackX)) return fallbackX;
  return (padiWorld.xLeft + padiWorld.xRight) / 2;
}

function routePinOffset(boundaryIndex) {
  const value = Number(padiRoutePinOffsets[String(boundaryIndex)]);
  return Number.isFinite(value) ? value : 0;
}

function padiRoutePinX(boundaryIndex, fallbackX = null) {
  return routePinDefaultX(boundaryIndex, fallbackX) + routePinOffset(boundaryIndex);
}

function hasManualRoutePin(boundaryIndex) {
  return Math.abs(routePinOffset(boundaryIndex)) > 1;
}

function clampPadiRouteX(x) {
  const pad = 120;
  return Math.max(padiWorld.xLeft + pad, Math.min(padiWorld.xRight - pad, x));
}

function padiRoutePinLabel(boundaryIndex) {
  const upper = PADI_LANES[boundaryIndex]?.label || 'Lane';
  const lower = PADI_LANES[boundaryIndex + 1]?.label || 'Lane';
  return `${upper} pins`;
}

function isDataSourceBoundary(boundaryIndex) {
  return boundaryIndex === LANE_INDEX[String(LANE_Y.tool)];
}

function shouldUseRoutePin(link, boundaryIndex) {
  if (hasManualRoutePin(boundaryIndex)) return true;
  return isDataSourceBoundary(boundaryIndex) && ['depends-on', 'authenticates-via'].includes(link?.kind || '');
}

function padiControlScale() {
  if (!fg || typeof fg.zoom !== 'function') return 1;
  const z = fg.zoom();
  return Number.isFinite(z) && z > 0 ? Math.max(0.2, z) : 1;
}

function padiControlLayoutUnits(px) {
  return px / padiControlScale();
}

function zoomedToolLabelsVisible(scale) {
  return isPadiLens() && viewMode !== 'agent' && scale >= PADI_TOOL_LABEL_ZOOM;
}

function zoomedToolLabelAlpha(scale) {
  if (scale >= PADI_TOOL_LABEL_ZOOM + 0.18) return 1;
  return Math.max(0, Math.min(1, (scale - PADI_TOOL_LABEL_ZOOM) / 0.18));
}

function toolHaloAngle(index, count) {
  if (count <= 1) return Math.PI / 2;
  const start = -Math.PI / 2 + PADI_TOOL_TOP_CORRIDOR / 2;
  const span = Math.PI * 2 - PADI_TOOL_TOP_CORRIDOR;
  return start + ((index + 0.5) / count) * span;
}

// ── Interface abstraction ──
const CHANNEL_LABEL = {
  discord: 'Discord', text: 'Text', sms: 'Text', email: 'Email',
  phone: 'Phone', twilio: 'Phone', voice: 'Phone',
  telegram: 'Telegram', slack: 'Slack', web: 'Hosted Chat', hosted: 'Hosted Chat',
  chainlit: 'Chainlit', api: 'API', webhook: 'Webhook', cli: 'CLI', terminal: 'Terminal',
  github: 'GitHub', calendar: 'Calendar', form: 'Form',
};
function channelTypeOf(n) {
  if (n.channel) return n.channel;
  if (n.id.startsWith('chan:')) return n.id;   // each Discord channel is its own surface (DM vs #team-social vs #screening-tv) — don't merge into one "Discord"
  if (n.id.startsWith('iface:')) return n.id.split(':')[1];
  return (n.id.split(':')[1] || 'other');
}

function isDiscordChannelType(type) {
  return type === 'discord' || String(type || '').startsWith('chan:');
}

function interfaceDisplayName(group) {
  const type = String(group.type || '');
  const firstName = group.members[0]?.name || type || 'Interface';
  if (isDiscordChannelType(type)) {
    const clean = firstName.replace(/^Discord\s*\((.*)\)$/i, '$1').trim();
    return clean.toLowerCase().startsWith('discord') ? clean : `Discord · ${clean}`;
  }
  return CHANNEL_LABEL[type] || firstName;
}

function interfaceArtifact(group) {
  if (isDiscordChannelType(group.type)) return 'Discord channels: ' + group.names.join(', ');
  return group.members[0]?.artifact || '';
}

function collapseIntake(data) {
  const intakeNodes = data.nodes.filter(n => n.type === 'intake');
  if (!intakeNodes.length) return data;
  const remap = {};
  const groups = {};
  intakeNodes.forEach(n => {
    const t = channelTypeOf(n);
    remap[n.id] = 'iface:' + t;
    (groups[t] = groups[t] || { type: t, names: [], members: [] });
    groups[t].names.push(n.name);
    groups[t].members.push(n);
  });
  const ifaceNodes = Object.values(groups).map(g => {
    const has = s => g.members.some(m => m.state === s);
    const state = has('live') ? 'live' : has('built') ? 'built' : has('building') ? 'building' : 'blank';
    const gates = ['L0','L1','L2','L3'].reduce((o,k) => { o[k] = g.members.some(m => m.gates && m.gates[k]); return o; }, {});
    return {
      id: 'iface:' + g.type, name: interfaceDisplayName(g),
      kind: 'intake', type: 'intake', channel: g.type,
      artifact: interfaceArtifact(g),
      gates, state, reachable: false,
      contract: { accepts: ['external_message'], emits: ['routed_message'] },
      role: 'plain', members: g.names,
    };
  });
  data.nodes = data.nodes.filter(n => n.type !== 'intake').concat(ifaceNodes);
  const seen = new Set();
  const newLinks = [];
  for (const l of data.links) {
    const s = remap[lid(l.source)] || lid(l.source);
    const t = remap[lid(l.target)] || lid(l.target);
    if (s === t) continue;
    const key = s + '→' + t + '→' + (l.kind || '');
    if (seen.has(key)) continue;
    seen.add(key);
    newLinks.push({ source: s, target: t, kind: l.kind });
  }
  data.links = newLinks;
  data.node_count = data.nodes.length;
  data.link_count = data.links.length;
  return data;
}

}

function loadClusters() {

    .then(r => r.json())
    .then(data => {
      clusters = data;
      renderTabs();
      if (clusters.length && !currentCluster) {

function renderTabs() {
  const bar = document.getElementById('tab-bar');

  bar.querySelectorAll('.tab').forEach(t => t.remove());
  clusters.forEach(c => {
    const btn = document.createElement('button');

    const pct = c.handoff_pct ? `<span class="pct">${esc(c.handoff_pct)}%</span>` : '';
    btn.textContent = c.name;
    if (pct) btn.innerHTML += pct;

function selectCluster(name) {

function loadGraph(clusterName) {
  info.textContent = 'Loading…';
  const _base = clusterName ? apiUrl(`/manifest?cluster=${encodeURIComponent(clusterName)}`) : 'agent-graph-v2.json';
  const url = _base + (_base.includes('?') ? '&' : '?') + '_=' + Date.now();   // cache-bust: the graph is derived live, always fetch fresh
  fetch(url)
    .then(r => r.json())
    .then(data => {
      if (!data || !data.nodes) {
        info.textContent = `Failed to load${clusterName ? ' cluster ' + clusterName : ''}: ${data?.error || 'no graph data'}`;
        graphData = { nodes: [], links: [], node_count: 0, link_count: 0, version: 0 };
        if (fg) { fg.graphData(graphData); }
        return;
      }
      const hosted = data.nodes.find(n => n.id === 'ui:bridge');
      if (hosted) hosted.name = 'Hosted Chat';
      collapseIntake(data);
      graphData = data;
      nodeMetrics = computeNodeMetrics(data);
      const clusterTag = data.cluster ? ` · ${data.cluster}` : '';
      info.textContent = `${data.node_count} nodes · ${data.link_count} links · v${data.version}${clusterTag}`;
      if (!fg) initGraph(graphData);

// ── Focus mode graph projection ──
function buildFocusDevNodes(agent) {
  const base = agent.id;
  const clean = cleanAgentId(base);
  const evalState = focusedAgentEval?.ok ? 'built' : (focusedAgentEval?.error ? 'error' : 'blank');
  const verifyState = focusedAgentVerify?.ok ? 'built' : (focusedAgentVerify?.error ? 'error' : 'blank');
  return [
    { id: focusNodeId(base, 'config'), name: 'Config', type: 'ui', state: agent.state || 'blank', synthetic: true, focusChild: true, artifact: `agent-config:${clean}` },
    { id: focusNodeId(base, 'tools'), name: 'Tools', type: 'tool', state: 'built', synthetic: true, focusChild: true, artifact: `agent-tools:${clean}` },
    { id: focusNodeId(base, 'evals'), name: 'Evals', type: 'capability', state: evalState, synthetic: true, focusChild: true, artifact: `agent-evals:${clean}` },
    { id: focusNodeId(base, 'runtime'), name: 'Runtime', type: 'capability', state: agent.state || 'blank', synthetic: true, focusChild: true, artifact: `agent-runtime:${clean}` },
    { id: focusNodeId(base, 'chat'), name: 'Chat', type: 'ui', state: 'built', synthetic: true, focusChild: true, artifact: `agent-chat:${clean}` },
    { id: focusNodeId(base, 'generate'), name: 'Generate', type: 'capability', state: 'built', synthetic: true, focusChild: true, artifact: `agent-generate:${clean}` },
    { id: focusNodeId(base, 'verify'), name: 'Verify', type: 'capability', state: verifyState, synthetic: true, focusChild: true, artifact: `agent-verify:${clean}` },
  ];
}

function buildAgentFocusData() {
  const agent = getNodeById(focusedAgentId);
  if (!agent) return { nodes: [], links: [] };

  // Find the agent's direct neighbors from the full manifest
  const ids = new Set([focusedAgentId]);
  for (const l of graphData.links || []) {
    const source = lid(l.source);
    const target = lid(l.target);
    if (source === focusedAgentId) ids.add(target);
    if (target === focusedAgentId) ids.add(source);
  }

  // Also pull in the agent's model node (even if no explicit link exists)
  let modelNodeId = null;
  if (agent.model) {
    modelNodeId = `model:${agent.model}`;
    if (graphData.nodes.some(n => n.id === modelNodeId)) ids.add(modelNodeId);
  }

  const baseNodes = graphData.nodes.filter(n => ids.has(n.id)).map(n => {
    // Model nodes: override shared/blank so they're visible in focus
    if (n.id === modelNodeId) {
      return { ...n, shared: false, state: n.state === 'blank' ? 'built' : n.state };
    }
    return n;
  });
  const baseLinks = graphData.links.filter(l => ids.has(lid(l.source)) && ids.has(lid(l.target)));

  // Add model link if agent has a model and it's included but not already linked
  if (modelNodeId && ids.has(modelNodeId) && !baseLinks.some(l => {
    const s = lid(l.source), t = lid(l.target);
    return (s === focusedAgentId && t === modelNodeId) || (s === modelNodeId && t === focusedAgentId);
  })) {
    baseLinks.push({ source: focusedAgentId, target: modelNodeId, kind: 'pinned-model' });
  }

  const devNodes = buildFocusDevNodes(agent);
  const devLinks = devNodes.map(n => ({ source: focusedAgentId, target: n.id, kind: 'focus' }));

  return {
    nodes: [...baseNodes, ...devNodes],
    links: [...baseLinks, ...devLinks],
  };
}

      sp.library().forEach((agent, order) => {
        nodes.push({
          id: `padi:library:${sk}:${agent.id}`,
          name: agent.name,
          type: 'agent',
          state: agent.inCluster ? 'blank' : 'built',
          synthetic: true,
          padiControl: true,
          padiControlKind: 'library',
          padiDisabled: !!agent.inCluster,
          padiSpawner: sk,
          padiAgentId: agent.id,
          padiOrder: order,
          padiLaneKey: lane.key,
          padiLaneIndex: laneIndex,
          padiHue: lane.hue,
          padiWidth: padiControlWidth('library', agent.name),
          padiHeight: 18,
        });
      });
    }
  });
  for (let boundaryIndex = 0; boundaryIndex < PADI_LANES.length - 1; boundaryIndex += 1) {
    nodes.push({
      id: `padi:route:${boundaryIndex}`,
      name: padiRoutePinLabel(boundaryIndex),
      type: 'capability',
      state: hasManualRoutePin(boundaryIndex) ? 'live' : 'built',
      synthetic: true,
      padiControl: true,
      padiControlKind: 'route',
      padiBoundaryIndex: boundaryIndex,
      padiLaneIndex: boundaryIndex,
      padiHue: PADI_LANES[boundaryIndex + 1]?.hue || PADI_LANES[boundaryIndex]?.hue || '88,166,255',
      padiWidth: padiControlWidth('route', ''),
      padiHeight: 20,
    });
  }
  return nodes;
}

function filterGraphBySeeds(base, seedIds, linkPredicate = null, includeNeighbors = true) {
  const visibleIds = new Set(seedIds);
  if (includeNeighbors) {
    base.links.forEach(l => {
      const s = lid(l.source);
      const t = lid(l.target);
      if (visibleIds.has(s)) visibleIds.add(t);
      if (visibleIds.has(t)) visibleIds.add(s);
    });
  }
  return {
    nodes: base.nodes.filter(n => visibleIds.has(n.id)),
    links: base.links.filter(l => {
      const s = lid(l.source);
      const t = lid(l.target);
      if (!visibleIds.has(s) || !visibleIds.has(t)) return false;
      return linkPredicate ? linkPredicate(l) || seedIds.has(s) || seedIds.has(t) : true;
    }),
  };
}

function filterNotBuiltGraph(base) {
  const builtStates = new Set(['built', 'live']);
  const seedIds = new Set(base.nodes.filter(n => {
    if (n.synthetic || n.padiControl) return false;
    if (n.type === 'agent') return !builtStates.has(n.state) || (nodeMetrics.gc[n.id] || 0) < 1;
    if (n.state === 'error' || n.state === 'building' || n.state === 'blank') return true;
    if (n.inactive) return true;
    return false;
  }).map(n => n.id));
  return filterGraphBySeeds(base, seedIds);
}

function filterDependencyGraph(base) {
  const depKinds = new Set(['depends-on', 'authenticates-via']);
  const seedIds = new Set(base.nodes.filter(n =>
    n.rail === 'dependency' || n.type === 'database' || /credential|vault|source/i.test([n.id, n.name, n.type].join(' '))
  ).map(n => n.id));
  base.links.forEach(l => {
    if (depKinds.has(l.kind || '')) {
      seedIds.add(lid(l.source));
      seedIds.add(lid(l.target));
    }
  });
  return filterGraphBySeeds(base, seedIds, l => depKinds.has(l.kind || ''));
}

function filterCrossoverGraph(base) {
  const usesByBundle = {};
  base.links.forEach(l => {
    if (l.kind === 'uses-bundle') {
      const target = lid(l.target);
      usesByBundle[target] = (usesByBundle[target] || 0) + 1;
    }
  });
  const seedIds = new Set(base.nodes.filter(n =>
    n.shared && (n.type === 'agent' || n.type === 'bundle' || n.type === 'intake')
  ).map(n => n.id));
  base.links.forEach(l => {
    const kind = l.kind || '';
    const s = lid(l.source);
    const t = lid(l.target);
    if (kind === 'delegates') {
      seedIds.add(s);
      seedIds.add(t);
    }
    if (kind === 'uses-bundle' && usesByBundle[t] > 1) {
      seedIds.add(s);
      seedIds.add(t);
    }
  });
  return filterGraphBySeeds(base, seedIds, l => {
    const kind = l.kind || '';
    if (kind === 'delegates') return true;
    if (kind === 'contains') return true;
    return kind === 'uses-bundle' && usesByBundle[lid(l.target)] > 1;
  }, false);
}

function getVisibleData() {
  // ── Focus mode: agent-specific subgraph ──
  if (viewMode === 'agent' && focusedAgentId) {
    return buildAgentFocusData();
  }

  let base;
  if (currentLens === 'all' || isPadiLens() || currentLens === 'tier') {
    base = { nodes: graphData.nodes.slice(), links: graphData.links.slice() };
  } else if (currentLens === 'live') {
    const liveIds = new Set(graphData.nodes.filter(n => n.state === 'live').map(n => n.id));
    base = {
      nodes: graphData.nodes.filter(n => n.state === 'live'),
      links: graphData.links.filter(l => liveIds.has(lid(l.source)) && liveIds.has(lid(l.target))),
    };
  } else if (currentLens === 'lineage' && lineageRoot) {
    const visited = new Set([lineageRoot]);
    const queue = [lineageRoot];
    while (queue.length) {
      const id = queue.shift();
      for (const l of graphData.links) {
        const s = lid(l.source), t = lid(l.target);
        if (s === id && !visited.has(t)) { visited.add(t); queue.push(t); }
        if (t === id && !visited.has(s)) { visited.add(s); queue.push(s); }
      }
    }
    base = {
      nodes: graphData.nodes.filter(n => visited.has(n.id)),
      links: graphData.links.filter(l => visited.has(lid(l.source)) && visited.has(lid(l.target))),
    };
  } else {
    base = { nodes: graphData.nodes.slice(), links: graphData.links.slice() };
  }

  if (isPadiLens()) {
    const internalUiIds = new Set(base.nodes.filter(n => n.type === 'ui').map(n => n.id));
    if (internalUiIds.size) {
      base = {
        nodes: base.nodes.filter(n => !internalUiIds.has(n.id)),
        links: base.links.filter(l => !internalUiIds.has(lid(l.source)) && !internalUiIds.has(lid(l.target))),
      };
    }

    const routerIds = new Set(base.nodes.filter(n => n.type === 'router').map(n => n.id));
    if (routerIds.size) {
      base = {
        nodes: base.nodes.filter(n => !routerIds.has(n.id)),
        links: base.links.filter(l => !routerIds.has(lid(l.source)) && !routerIds.has(lid(l.target))),
      };
    }

    const dataSourceIds = new Set(base.nodes.filter(isPadiDataSourceNode).map(n => n.id));
    if (dataSourceIds.size) {
      const visibleNonDataIds = new Set(base.nodes.filter(n => !dataSourceIds.has(n.id)).map(n => n.id));
      const linkedDataSourceIds = new Set();
      base.links.forEach(l => {
        const s = lid(l.source);
        const t = lid(l.target);
        if (dataSourceIds.has(s) && visibleNonDataIds.has(t)) linkedDataSourceIds.add(s);
        if (dataSourceIds.has(t) && visibleNonDataIds.has(s)) linkedDataSourceIds.add(t);
      });
      base = {
        nodes: base.nodes.filter(n => !dataSourceIds.has(n.id) || linkedDataSourceIds.has(n.id)),
        links: base.links.filter(l => {
          const s = lid(l.source);
          const t = lid(l.target);
          return (!dataSourceIds.has(s) || linkedDataSourceIds.has(s))
            && (!dataSourceIds.has(t) || linkedDataSourceIds.has(t));
        }),
      };
    }
  }

  if (currentLens === 'not-built') {
    base = filterNotBuiltGraph(base);
  } else if (currentLens === 'dependencies') {
    base = filterDependencyGraph(base);
  } else if (currentLens === 'crossover') {
    base = filterCrossoverGraph(base);
  }

  // Filter by rail visibility. In the PADI lens, dependency rail nodes become
  // first-class data sources, so they stay visible in the Data Sources row.
  if (!showDepRail && !isPadiLens()) {
    const depIds = new Set(base.nodes.filter(n => n.rail === 'dependency').map(n => n.id));
    if (depIds.size) {
      base = {
        nodes: base.nodes.filter(n => !depIds.has(n.id)),
        links: base.links.filter(l => !depIds.has(lid(l.source)) && !depIds.has(lid(l.target))),
      };
    }
  }
  if (!showInfraRail) {
    const infraIds = new Set(base.nodes.filter(n => n.rail === 'infrastructure').map(n => n.id));
    if (infraIds.size) {
      base = {
        nodes: base.nodes.filter(n => !infraIds.has(n.id)),
        links: base.links.filter(l => !infraIds.has(lid(l.source)) && !infraIds.has(lid(l.target))),
      };
    }
  }

  if (isPadiLens()) {
    base = { nodes: base.nodes.concat(buildPadiControlNodes()), links: base.links };
  }

  return base;
}

// ── PADI layout ──
function clearFocusPins(nodes) {
  nodes.forEach(n => {
    if (!n.synthetic) { n.fx = undefined; n.fy = undefined; }
  });
}

function applyLayout(vd) {
  // ── Focus mode: tiered layout ──
  if (viewMode === 'agent' && focusedAgentId) {
    const center = vd.nodes.find(n => n.id === focusedAgentId);
    if (center) { center.fx = 0; center.fy = -200; }

    // Synthetic dev nodes in a horizontal row below agent
    const dev = vd.nodes.filter(n => n.synthetic && n.focusChild);
    const devSpacing = Math.max(120, 600 / Math.max(1, dev.length));
    dev.forEach((n, i) => {
      n.fx = (i - (dev.length - 1) / 2) * devSpacing;
      n.fy = 0;
    });

    // Real tools fanned out below
    const tools = vd.nodes.filter(n => !n.synthetic && n.id !== focusedAgentId && n.type === 'tool');
    const toolSpacing = Math.max(80, 500 / Math.max(1, tools.length));
    tools.forEach((n, i) => {
      n.fx = (i - (tools.length - 1) / 2) * toolSpacing;
      n.fy = 200;
    });

    // Everything else (model, channels, etc.) between dev and tools
    const others = vd.nodes.filter(n => !n.synthetic && n.id !== focusedAgentId && n.type !== 'tool');
    others.forEach((n, i) => {
      n.fx = (i - (others.length - 1) / 2) * 100;
      n.fy = 100;
    });
    return;
  }

  // Pin rail nodes in a column on the left edge
  const depNodes = vd.nodes.filter(n => n.rail === 'dependency' && !isPadiDataSourceNode(n));
  const infraNodes = vd.nodes.filter(n => n.rail === 'infrastructure');
  const railOffset = 90;
  // Infra sort order: top-down logical stack
  const infraOrder = ['tunnel','network','service','container','host'];
  infraNodes.sort((a, b) => {
    const ai = infraOrder.indexOf(a.type), bi = infraOrder.indexOf(b.type);
    return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
  });
  const railMidpoint = 0; // centered vertically on graph
  depNodes.forEach((n, i) => {
    n.fx = -400;
    n.fy = railMidpoint + (i - (depNodes.length - 1) / 2) * railOffset;
  });
  infraNodes.forEach((n, i) => {
    n.fx = -540;
    n.fy = railMidpoint + (i - (infraNodes.length - 1) / 2) * railOffset;
  });

  // PADI swim-lane positions are computed in layoutPadi() so the graph lands
  // on a graph-space factory floor that can zoom and pan.
  if (!isPadiLens()) {
    vd.nodes.forEach(n => {
      if (isPinnedRailNode(n)) return; // rail nodes stay pinned
      n.fx = null;
      n.fy = null;
    });
  }
}

// ── Swim-lane controls: build the operator layer once; the colored sheet
// itself is drawn in canvas graph-space by drawPadiLaneSheet(). ──
function buildSwimlaneOverlay() {
  const overlay = document.getElementById('swimlane-overlay');
  if (!overlay || overlay.childElementCount) return;
  PADI_LANES.forEach(lane => {
    const row = document.createElement('div');
    row.className = 'swimlane-row';
    row.dataset.lane = lane.key;
    // Subtle hue wash, slightly stronger at the labelled left edge → fades right,
    // so the sheet reads as a labelled backdrop the graph sits on.
    row.style.background = `linear-gradient(90deg, rgba(${lane.hue},0.10) 0%, rgba(${lane.hue},0.05) 28%, rgba(${lane.hue},0.025) 100%)`;
    // Label + spawn controls live in the controls layer header, not the backdrop.
    overlay.appendChild(row);
  });
}

function layoutPadiControlShelf(laneIndex, controls) {
  const y = padiLaneY[laneIndex];
  if (!Number.isFinite(y)) return;

  const laneTop = Number.isFinite(padiLaneTop[laneIndex])
    ? padiLaneTop[laneIndex]
    : y - (padiLaneHeight[laneIndex] || PADI_LANE_DEFAULT_HEIGHT) / 2;
  const order = { label: 0, spawn: 1, library: 2 };
  const sorted = controls.slice().sort((a, b) => {
    return (order[a.padiControlKind] ?? 9) - (order[b.padiControlKind] ?? 9)
      || (a.padiOrder ?? 0) - (b.padiOrder ?? 0)
      || a.name.localeCompare(b.name);
  });

  const shelfLeft = padiWorld.xLeft + padiControlLayoutUnits(PADI_CONTROL_LEFT_PAD);
  const headerY = laneTop + padiControlLayoutUnits(PADI_CONTROL_TOP_PAD);
  const libraryY = headerY + padiControlLayoutUnits(PADI_CONTROL_ROW_GAP);

  function place(node, centerX, centerY) {
    node.__tx = centerX;
    node.__ty = centerY;
    node.x = centerX;
    node.y = centerY;
    node.fx = centerX;
    node.fy = centerY;
  }

  const label = sorted.find(n => n.padiControlKind === 'label');
  const spawn = sorted.find(n => n.padiControlKind === 'spawn');
  if (label) {
    const labelW = padiControlLayoutUnits(label.padiWidth || 80);
    place(label, shelfLeft + labelW / 2, headerY);
  }
  if (spawn) {
    const labelW = label ? padiControlLayoutUnits(label.padiWidth || 80) : 0;
    const spawnW = padiControlLayoutUnits(spawn.padiWidth || 80);
    place(spawn, shelfLeft + labelW + padiControlLayoutUnits(PADI_CONTROL_GAP) + spawnW / 2, headerY);
  }

  let cursorX = shelfLeft;
  let cursorRow = 0;
  sorted.filter(n => n.padiControlKind === 'library').forEach((node, index) => {
    const w = padiControlLayoutUnits(node.padiWidth || 46);
    if (index > 0 && index % PADI_LIBRARY_COLS === 0) {
      cursorRow++;
      cursorX = shelfLeft;
    }
    const x = cursorX + w / 2;
    const y = libraryY + padiControlLayoutUnits(PADI_LIBRARY_ROW_STEP * cursorRow);
    place(node, x, y);
    cursorX += w + padiControlLayoutUnits(PADI_CONTROL_GAP);
  });
}

function snapPadiControlNode(node) {
  if (!node?.padiControl || !fg || !isPadiLens() || viewMode === 'agent') return false;
  if (node.padiControlKind === 'route') {
    const boundaryIndex = Number(node.padiBoundaryIndex);
    const boundY = padiLaneBound[boundaryIndex];
    if (!Number.isFinite(boundaryIndex) || !Number.isFinite(boundY)) return false;
    const defaultX = routePinDefaultX(boundaryIndex, node.__tx ?? node.x);
    const x = clampPadiRouteX(node.x ?? defaultX);
    const offset = x - defaultX;
    if (Math.abs(offset) > 1) padiRoutePinOffsets[String(boundaryIndex)] = offset;
    else delete padiRoutePinOffsets[String(boundaryIndex)];
    savePadiRoutePinOffsets();
    node.__tx = x;
    node.__ty = boundY;
    node.x = x;
    node.y = boundY;
    node.fx = x;
    node.fy = boundY;
    return true;
  }
  const controls = fg.graphData().nodes
    .filter(n => n.padiControl && n.padiControlKind !== 'route' && n.padiLaneIndex === node.padiLaneIndex);
  layoutPadiControlShelf(node.padiLaneIndex, controls);
  positionSwimlaneControls();
  return true;
}

function computePadiRoutePinDefaults(graphNodes, graphLinks) {
  const byId = {};
  graphNodes.forEach(n => { byId[n.id] = n; });
  const buckets = Array.from({ length: PADI_LANES.length - 1 }, () => []);
  graphLinks.forEach(link => {
    const s = byId[lid(link.source)];
    const t = byId[lid(link.target)];
    if (!s || !t || s.__lane === undefined || t.__lane === undefined || s.__lane === t.__lane) return;
    const upper = s.__lane < t.__lane ? s : t;
    const lower = s.__lane < t.__lane ? t : s;
    const boundaryIndex = upper.__lane;
    if (boundaryIndex < 0 || boundaryIndex >= PADI_LANES.length - 1) return;
    const lowerX = lower.__tx ?? lower.x;
    if (!Number.isFinite(lowerX)) return;
    const weight = isDataSourceBoundary(boundaryIndex) && ['depends-on', 'authenticates-via'].includes(link.kind || '') ? 4 : 1;
    buckets[boundaryIndex].push([lowerX, weight]);
  });
  padiRoutePinDefaults = buckets.map((pairs, i) => {
    let total = 0;
    let weight = 0;
    pairs.forEach(([x, w]) => {
      total += x * w;
      weight += w;
    });
    const fallback = padiWorld.xLeft + (padiWorld.xRight - padiWorld.xLeft) * ((i + 1) / PADI_LANES.length);
    return clampPadiRouteX(weight ? total / weight : fallback);
  });
}

function layoutPadiRoutePins(graphNodes) {
  graphNodes
    .filter(n => n.padiControl && n.padiControlKind === 'route')
    .forEach(node => {
      const boundaryIndex = Number(node.padiBoundaryIndex);
      const y = padiLaneBound[boundaryIndex];
      if (!Number.isFinite(boundaryIndex) || !Number.isFinite(y)) return;
      const x = clampPadiRouteX(padiRoutePinX(boundaryIndex));
      node.__lane = undefined;
      node.__tx = x;
      node.__ty = y;
      node.x = x;
      node.y = y;
      node.fx = x;
      node.fy = y;
      node.padiDisabled = false;
      node.state = hasManualRoutePin(boundaryIndex) ? 'live' : 'built';
    });
}

function padiRouteControlAtScreen(clientX, clientY) {
  if (!fg || !isPadiLens() || viewMode === 'agent') return null;
  const routes = (fg.graphData().nodes || []).filter(n => n.padiControlKind === 'route');
  let best = null;
  routes.forEach(node => {
    if (!Number.isFinite(node.x) || !Number.isFinite(node.y)) return;
    const pt = fg.graph2ScreenCoords(node.x, node.y);
    const dx = Math.abs(clientX - pt.x);
    const dy = Math.abs(clientY - pt.y);
    const halfW = Math.max(34, (node.padiWidth || 78) / 2);
    const halfH = Math.max(16, (node.padiHeight || 20) / 2 + 8);
    if (dx <= halfW && dy <= halfH) {
      const score = dx + dy;
      if (!best || score < best.score) best = { node, score };
    }
  });
  return best?.node || null;
}

function movePadiRoutePin(boundaryIndex, graphX) {
  const defaultX = routePinDefaultX(boundaryIndex, graphX);
  const x = clampPadiRouteX(graphX);
  const offset = x - defaultX;
  if (Math.abs(offset) > 1) padiRoutePinOffsets[String(boundaryIndex)] = offset;
  else delete padiRoutePinOffsets[String(boundaryIndex)];
  savePadiRoutePinOffsets();
  layoutPadiRoutePins(fg.graphData().nodes || []);
  if (typeof fg.d3ReheatSimulation === 'function') fg.d3ReheatSimulation();
}

function installPadiRoutePinDragging(elem) {
  elem.addEventListener('pointerdown', event => {
    const node = padiRouteControlAtScreen(event.clientX, event.clientY);
    if (!node) return;
    padiDraggingRoutePin = {
      boundaryIndex: Number(node.padiBoundaryIndex),
      pointerId: event.pointerId,
    };
    elem.setPointerCapture?.(event.pointerId);
    event.preventDefault();
    event.stopPropagation();
  }, true);

  elem.addEventListener('pointermove', event => {
    if (!padiDraggingRoutePin || padiDraggingRoutePin.pointerId !== event.pointerId) return;
    const graphPoint = fg?.screen2GraphCoords ? fg.screen2GraphCoords(event.clientX, event.clientY) : null;
    if (graphPoint && Number.isFinite(graphPoint.x)) {
      movePadiRoutePin(padiDraggingRoutePin.boundaryIndex, graphPoint.x);
    }
    event.preventDefault();
    event.stopPropagation();
  }, true);

  const stopDrag = event => {
    if (!padiDraggingRoutePin || padiDraggingRoutePin.pointerId !== event.pointerId) return;
    elem.releasePointerCapture?.(event.pointerId);
    padiDraggingRoutePin = null;
    event.preventDefault();
    event.stopPropagation();
  };
  elem.addEventListener('pointerup', stopDrag, true);
  elem.addEventListener('pointercancel', stopDrag, true);
}

// Pin every visible node onto its swim-lane row, spread evenly across the
// graph-space factory floor. The first render fits the whole floor to the
// viewport; after that users can zoom/pan and the lanes move with the graph.
function layoutPadi() {
  const overlay = document.getElementById('swimlane-overlay');
  const wrap = document.getElementById('graph-wrap');
  if (!fg || !overlay || !wrap) return;
  const controls = document.getElementById('swimlane-controls');
  if (!isPadiLens() || viewMode === 'agent') {
    overlay.classList.remove('on');
    if (controls) controls.classList.remove('on');
    return;
  }
  overlay.classList.remove('on');
  if (controls) controls.classList.add('on');

  // Bucket visible non-rail nodes by lane, then give each a floaty *target*
  // (forces pull toward it — nothing is hard-pinned, so the sheet stays alive).
  const graph = fg.graphData();
  const graphNodes = graph.nodes || [];
  const graphLinks = graph.links || [];
  const buckets = [[], [], [], []];
  graphNodes.forEach(n => {
    if (n.padiControl) {
      n.__lane = n.padiControlKind === 'route' ? undefined : n.padiLaneIndex;
      return;
    }
    if (isPinnedRailNode(n)) { n.__lane = undefined; return; }
    if (n.type === 'tool') { n.__lane = LANE_INDEX[String(LANE_Y.tool)]; return; }   // tools float around their bundle (physics), not bucketed into the row
    const li = LANE_INDEX[String(LANE_Y[n.type])] ?? 2;
    n.__lane = li;
    buckets[li].push(n);
  });
  const laneGeometry = computePadiLaneGeometry(computePadiLaneHeights(buckets, graphNodes, graphLinks));
  const laneY = laneGeometry.y;
  padiLaneY = laneY;
  padiLaneTop = laneGeometry.topY;
  padiLaneBottom = laneGeometry.bottomY;
  padiLaneHeight = laneGeometry.heights;
  padiLaneBound = laneGeometry.bounds;

  const maxBucket = Math.max(1, ...buckets.map(arr => arr.length));
  const agentCount = buckets[LANE_INDEX[String(LANE_Y.agent)]]?.length || 0;
  const bundleCount = buckets[LANE_INDEX[String(LANE_Y.bundle)]]?.filter(n => n.type === 'bundle').length || 0;
  const contentCount = graphNodes.filter(n => !n.padiControl && !isPinnedRailNode(n)).length;
  const laneWidth = Math.max(
    1850,
    Math.min(3900, Math.max(
      maxBucket * 335,
      bundleCount * 285 + agentCount * 180,
      contentCount * 44
    ))
  );
  const xLeft = PADI_WORLD_X_SHIFT - laneWidth / 2;
  const xRight = PADI_WORLD_X_SHIFT + laneWidth / 2;
  padiWorld = {
    xLeft,
    xRight,
    yTop: laneGeometry.topY[0],
    yBottom: laneGeometry.bottomY[laneGeometry.bottomY.length - 1]
  };
  buckets.forEach((arr, li) => {
    arr.sort((a, b) => a.id.localeCompare(b.id));
    const n = arr.length;
    arr.forEach((node, k) => {
      const t = n === 1 ? 0.5 : (k + 0.5) / n;
      node.__tx = xLeft + (xRight - xLeft) * t;
      node.__ty = laneY[li] + PADI_NODE_Y_OFFSET;
      if (node.__phase === undefined) {
        const h = node.id.split('').reduce((a, c) => a + c.charCodeAt(0), 0);
        node.__phase = (h % 100) / 100 * Math.PI * 2;
      }
      // Seed an initial position so nodes ease in within their lane, not from origin.
      if (!Number.isFinite(node.x)) { node.x = node.__tx; node.y = node.__ty; }
      // Never hard-pin: lanes are held by forces (see padiLaneForce).
      node.fx = undefined; node.fy = undefined;
    });
  });

  // ── Clean-line layout: derive lane ordering from graph relationships. This is
  // a small layered barycenter pass (interfaces ⇄ agents ⇄ bundles ⇄ data
  // sources), so dense clusters reduce crossings without saved/manual coords.
  {
    const byId = {}; graphNodes.forEach(n => byId[n.id] = n);
    const links = graphLinks;
    const nodeX = node => node?.__tx ?? node?.x ?? 0;
    const clampX = (x, pad = 80) => Math.max(padiWorld.xLeft + pad, Math.min(padiWorld.xRight - pad, x));
    const weightedMean = pairs => {
      let total = 0;
      let weight = 0;
      pairs.forEach(([x, w = 1]) => {
        if (!Number.isFinite(x)) return;
        total += x * w;
        weight += w;
      });
      return weight ? total / weight : null;
    };
    const projectedToolX = node => {
      if (node?.type === 'tool' && node.__bundle) {
        return nodeX(node.__bundle) + Math.cos(node.__ang || 0) * (node.__rad || 0);
      }
      return nodeX(node);
    };
    const placeNearBary = (nodes, bary, minGap = 180, pad = 80) => {
      if (!nodes.length) return;
      const span = Math.max(1, padiWorld.xRight - padiWorld.xLeft - pad * 2);
      const gap = nodes.length > 1 ? Math.min(minGap, span / (nodes.length - 1)) : minGap;
      const sorted = nodes.slice().sort((a, b) => {
        const ax = bary.get(a) ?? nodeX(a);
        const bx = bary.get(b) ?? nodeX(b);
        return ax - bx || a.id.localeCompare(b.id);
      });
      const xs = [];
      sorted.forEach((node, i) => {
        const desired = clampX(bary.get(node) ?? nodeX(node), pad);
        xs[i] = i === 0 ? desired : Math.max(desired, xs[i - 1] + gap);
      });
      const overflow = xs[xs.length - 1] - (padiWorld.xRight - pad);
      if (overflow > 0) {
        for (let i = 0; i < xs.length; i += 1) xs[i] -= overflow;
      }
      const underflow = (padiWorld.xLeft + pad) - xs[0];
      if (underflow > 0) {
        for (let i = 0; i < xs.length; i += 1) xs[i] += underflow;
      }
      sorted.forEach((node, i) => { node.__tx = xs[i]; });
    };
    const placeInOrderNearBary = (ordered, bary, minGap = 180, pad = 80) => {
      if (!ordered.length) return;
      const span = Math.max(1, padiWorld.xRight - padiWorld.xLeft - pad * 2);
      const gap = ordered.length > 1 ? Math.min(minGap, span / (ordered.length - 1)) : minGap;
      const xs = [];
      ordered.forEach((node, i) => {
        const desired = clampX(bary.get(node) ?? nodeX(node), pad);
        xs[i] = i === 0 ? desired : Math.max(desired, xs[i - 1] + gap);
      });
      const overflow = xs[xs.length - 1] - (padiWorld.xRight - pad);
      if (overflow > 0) {
        for (let i = 0; i < xs.length; i += 1) xs[i] -= overflow;
      }
      const underflow = (padiWorld.xLeft + pad) - xs[0];
      if (underflow > 0) {
        for (let i = 0; i < xs.length; i += 1) xs[i] += underflow;
      }
      ordered.forEach((node, i) => { node.__tx = xs[i]; });
    };
    const placeOrderedGroupsLeft = (groups, minGap = 180, pad = 170, groupGap = 70) => {
      const ordered = [];
      const steps = [];
      groups.forEach((group, groupIndex) => {
        group.nodes.forEach((node, nodeIndex) => {
          if (ordered.length) steps.push(minGap + (nodeIndex === 0 && groupIndex > 0 ? groupGap : 0));
          ordered.push(node);
        });
      });
      if (!ordered.length) return;
      const span = Math.max(1, padiWorld.xRight - padiWorld.xLeft - pad * 2);
      const total = steps.reduce((sum, step) => sum + step, 0);
      const scale = total > span ? span / total : 1;
      let x = padiWorld.xLeft + pad;
      ordered[0].__tx = x;
      for (let i = 1; i < ordered.length; i += 1) {
        x += steps[i - 1] * scale;
        ordered[i].__tx = clampX(x, pad);
      }
    };
    const placeNodesLeftByBary = (nodes, bary, minGap = 180, pad = 170) => {
      if (!nodes.length) return;
      const groups = nodes.slice().sort((a, b) => {
        const ax = bary.get(a) ?? nodeX(a);
        const bx = bary.get(b) ?? nodeX(b);
        return ax - bx || a.id.localeCompare(b.id);
      }).map(node => ({
        nodes: [node],
        bary: bary.get(node) ?? nodeX(node),
      }));
      placeOrderedGroupsLeft(groups, minGap, pad, 0);
    };
    const neighborTx = (node, kinds) => {
      const xs = [];
      for (const l of links) {
        if (!kinds.includes(l.kind)) continue;
        const s = byId[lid(l.source)], t = byId[lid(l.target)];
        if (s === node && t && t.__tx != null) xs.push(t.__tx);
        else if (t === node && s && s.__tx != null) xs.push(s.__tx);
      }
      return xs.length ? xs.reduce((a, b) => a + b, 0) / xs.length : null;
    };
    const agents = graphNodes.filter(n => n.type === 'agent' && n.__tx != null && !n.padiControl);
    const bundles = graphNodes.filter(n => n.type === 'bundle' && n.__tx != null && !n.padiControl);
    const ifaces = graphNodes.filter(n => n.type === 'intake' && n.__tx != null);
    const dataSources = graphNodes.filter(n => n.type === 'database' && n.__tx != null && !n.padiControl);
    const bundleToAgents = new Map();
    const agentToBundles = new Map();
    const agentsByBundleIdentity = new Map();
    const bundleIdentityByAgent = new Map();
    const delegationNeighbors = new Map();
    const bundleIdentity = bundle => String(bundle?.bundle_key || bundle?.name || bundle?.id || '');
    const pushMap = (map, key, value) => (map.get(key) || map.set(key, []).get(key)).push(value);
    const addSetMap = (map, key, value) => {
      const set = map.get(key) || new Set();
      set.add(value);
      map.set(key, set);
    };
    links.forEach(l => {
      if (l.kind !== 'uses-bundle') return;
      const a = byId[lid(l.source)];
      const b = byId[lid(l.target)];
      if (!a || !b || a.type !== 'agent' || b.type !== 'bundle') return;
      pushMap(bundleToAgents, b, a);
      pushMap(agentToBundles, a, b);
      const key = bundleIdentity(b);
      if (key) {
        addSetMap(agentsByBundleIdentity, key, a);
        addSetMap(bundleIdentityByAgent, a, key);
      }
    });
    links.forEach(l => {
      if (l.kind !== 'delegates') return;
      const s = byId[lid(l.source)];
      const t = byId[lid(l.target)];
      if (!s || !t || s.type !== 'agent' || t.type !== 'agent') return;
      addSetMap(delegationNeighbors, s, t);
      addSetMap(delegationNeighbors, t, s);
    });
    const orderedDelegationComponent = (component, bary) => {
      if (component.length <= 2) {
        return component.slice().sort((a, b) => {
          const ax = bary.get(a) ?? nodeX(a);
          const bx = bary.get(b) ?? nodeX(b);
          return ax - bx || a.id.localeCompare(b.id);
        });
      }
      const score = node => (delegationNeighbors.get(node)?.size || 0);
      const hub = component.slice().sort((a, b) => {
        return score(b) - score(a)
          || (bary.get(a) ?? nodeX(a)) - (bary.get(b) ?? nodeX(b))
          || a.id.localeCompare(b.id);
      })[0];
      const peers = component
        .filter(node => node !== hub)
        .sort((a, b) => {
          const aAnchored = neighborTx(a, ['listens', 'wears']) != null ? 0 : 1;
          const bAnchored = neighborTx(b, ['listens', 'wears']) != null ? 0 : 1;
          if (aAnchored !== bAnchored) return aAnchored - bAnchored;
          const ax = bary.get(a) ?? nodeX(a);
          const bx = bary.get(b) ?? nodeX(b);
          return ax - bx || a.id.localeCompare(b.id);
        });
      const anchoredCount = peers.filter(node => neighborTx(node, ['listens', 'wears']) != null).length;
      const leftCount = Math.max(1, anchoredCount || Math.floor(peers.length / 2));
      return [...peers.slice(0, leftCount), hub, ...peers.slice(leftCount)];
    };
    const placeAgentBary = (bary, minGap = 230, pad = 120) => {
      if (!agents.length) return;
      const seen = new Set();
      const groups = [];
      agents.forEach(agent => {
        if (seen.has(agent)) return;
        const stack = [agent];
        const component = [];
        seen.add(agent);
        while (stack.length) {
          const node = stack.pop();
          component.push(node);
          (delegationNeighbors.get(node) || new Set()).forEach(next => {
            if (seen.has(next)) return;
            seen.add(next);
            stack.push(next);
          });
        }
        const groupBary = weightedMean(component.map(node => [bary.get(node) ?? nodeX(node), 1])) ?? nodeX(component[0]);
        groups.push({
          nodes: orderedDelegationComponent(component, bary),
          bary: groupBary,
          hasDelegation: component.some(node => (delegationNeighbors.get(node)?.size || 0) > 0),
        });
      });
      groups.sort((a, b) => {
        if (a.hasDelegation !== b.hasDelegation) return a.hasDelegation ? -1 : 1;
        return a.bary - b.bary || a.nodes[0].id.localeCompare(b.nodes[0].id);
      });
      placeOrderedGroupsLeft(groups, minGap, pad, 80);
    };
    const sharedBundlePeerPairs = agent => {
      const peerWeights = new Map();
      (bundleIdentityByAgent.get(agent) || new Set()).forEach(key => {
        const members = agentsByBundleIdentity.get(key);
        if (!members || members.size < 2) return;
        const perBundleWeight = Math.min(7, 3 + members.size);
        members.forEach(peer => {
          if (peer === agent) return;
          peerWeights.set(peer, (peerWeights.get(peer) || 0) + perBundleWeight);
        });
      });
      return [...peerWeights.entries()].map(([peer, weight]) => [nodeX(peer), weight]);
    };
    const agentGraphPairs = (agent, { includeBundles = false, includeSharedBundles = false } = {}) => {
      const pairs = [];
      const interfaceX = neighborTx(agent, ['listens', 'wears']);
      if (interfaceX != null) pairs.push([interfaceX, includeBundles ? 4 : 6]);
      links.forEach(l => {
        if (l.kind !== 'delegates') return;
        const s = byId[lid(l.source)];
        const t = byId[lid(l.target)];
        if (s === agent && t) pairs.push([nodeX(t), 8]);
        if (t === agent && s) pairs.push([nodeX(s), 8]);
      });
      if (includeBundles) {
        (agentToBundles.get(agent) || []).forEach(bundle => pairs.push([nodeX(bundle), 6]));
      }
      if (includeSharedBundles) {
        sharedBundlePeerPairs(agent).forEach(pair => pairs.push(pair));
      }
      return pairs;
    };
    const placeAgentsFromGraph = (options = {}, iterations = 1) => {
      if (!agents.length) return;
      for (let i = 0; i < iterations; i += 1) {
        const bary = new Map();
        agents.forEach(agent => {
          const pairs = agentGraphPairs(agent, options);
          bary.set(agent, weightedMean(pairs) ?? nodeX(agent));
        });
        placeAgentBary(bary, 300, 120);
      }
    };
    const bundleGraphPairs = bundle => {
      const directAgents = bundleToAgents.get(bundle) || [];
      const identityAgents = [...(agentsByBundleIdentity.get(bundleIdentity(bundle)) || new Set())];
      const pairs = [];
      directAgents.forEach(agent => pairs.push([nodeX(agent), 2.6]));
      identityAgents.forEach(agent => pairs.push([nodeX(agent), directAgents.includes(agent) ? 1.4 : 1.1]));
      return pairs;
    };
    const bundlePlacementGap = () => {
      const longestLabel = bundles.reduce((max, bundle) => {
        return Math.max(max, String(bundle.name || bundle.bundle_key || bundle.id || '').length);
      }, 0);
      return Math.min(245, Math.max(205, 76 + longestLabel * 9));
    };
    const placeBundlesFromGraph = () => {
      if (!bundles.length) return;
      const bary = new Map();
      bundles.forEach(bundle => {
        bary.set(bundle, weightedMean(bundleGraphPairs(bundle)) ?? nodeX(bundle));
      });
      placeNearBary(bundles, bary, bundlePlacementGap(), 90);
    };

    // 1. seed agents from their channel/delegation relationships.
    placeAgentsFromGraph({ includeSharedBundles: true }, 2);

    // 2. place bundles by the average of every agent that uses them. Shared
    // bundle identities also pull their generated per-agent bundle nodes into
    // one neighborhood, without saving manual coordinates.
    placeBundlesFromGraph();

    // 3. refine agent order from the generated bundle positions as well as
    // interfaces/delegations. This is still entirely graph-derived.
    placeAgentsFromGraph({ includeBundles: true, includeSharedBundles: true }, 3);

    // 4. re-run bundle placement after agent refinement.
    placeBundlesFromGraph();
    placeAgentsFromGraph({ includeBundles: true, includeSharedBundles: true }, 2);
    placeBundlesFromGraph();

    // 5. re-order interfaces above the agent that listens to them.
    if (ifaces.length) {
      const ibary = new Map(ifaces.map(n => [n, neighborTx(n, ['listens'])]));
      placeNodesLeftByBary(ifaces, ibary, 330, 170);
    }
    const positionDataSources = (getOtherX, minGap = 260) => {
      if (!dataSources.length) return;
      const bary = new Map();
      dataSources.forEach(ds => {
        const pairs = [];
        links.forEach(l => {
          if (!['authenticates-via', 'depends-on'].includes(l.kind)) return;
          const s = byId[lid(l.source)];
          const t = byId[lid(l.target)];
          const other = s === ds ? t : t === ds ? s : null;
          if (!other) return;
          pairs.push([getOtherX(other), other.type === 'tool' ? 2 : 1]);
        });
        bary.set(ds, weightedMean(pairs) ?? nodeX(ds));
      });
      placeNodesLeftByBary(dataSources, bary, minGap, 170);
    };

    // 6. halo each bundle's tools around it (seeded near the bundle's lane slot)
    const groups = {};
    const credentialTargetForTool = new Map();
    links.forEach(l => {
      if (!['authenticates-via', 'depends-on'].includes(l.kind)) return;
      const s = byId[lid(l.source)];
      const t = byId[lid(l.target)];
      if (s?.type === 'tool' && t?.type === 'database') credentialTargetForTool.set(s, t);
      if (t?.type === 'tool' && s?.type === 'database') credentialTargetForTool.set(t, s);
    });
    for (const l of links) {
      if (l.kind !== 'contains') continue;
      const s = byId[lid(l.source)], t = byId[lid(l.target)];
      if (s && t && t.type === 'tool' && s.type === 'bundle') {
        t.__bundle = s;
        (groups[s.id] = groups[s.id] || []).push(t);
      }
    }
    positionDataSources(other => other?.type === 'tool' && other.__bundle ? nodeX(other.__bundle) : nodeX(other), 260);
    Object.values(groups).forEach(arr => {
      const haloR = 48 + arr.length * 4.7;
      const bundle = arr[0]?.__bundle;
      if (bundle) bundle.__toolHaloR = haloR;
      const start = -Math.PI / 2 + PADI_TOOL_TOP_CORRIDOR / 2;
      const span = Math.PI * 2 - PADI_TOOL_TOP_CORRIDOR;
      const angleOnArc = angle => {
        let a = angle;
        while (a < start) a += Math.PI * 2;
        while (a > start + span) a -= Math.PI * 2;
        if (a < start) a = start;
        if (a > start + span) a = start + span;
        return a;
      };
      const desiredToolAngle = tool => {
        const target = credentialTargetForTool.get(tool);
        if (target && bundle) {
          const tx = nodeX(target) - nodeX(bundle);
          const ty = (target.__ty ?? target.y ?? laneY[LANE_INDEX[String(LANE_Y.database)]]) - (bundle.__ty ?? bundle.y ?? laneY[LANE_INDEX[String(LANE_Y.bundle)]]);
          return Math.atan2(ty, tx);
        }
        const h = tool.id.split('').reduce((sum, ch) => sum + ch.charCodeAt(0), 0);
        return start + ((h % 1000) / 1000) * span;
      };
      const ordered = arr.slice().sort((a, b) => {
        return angleOnArc(desiredToolAngle(a)) - angleOnArc(desiredToolAngle(b)) || a.id.localeCompare(b.id);
      });
      ordered.forEach((t, i) => {
        t.__ang = toolHaloAngle(i, arr.length);
        t.__rad = haloR;
        if (!Number.isFinite(t.x)) {
          t.x = (t.__bundle.__tx || 0) + Math.cos(t.__ang) * t.__rad;
          t.y = (t.__bundle.__ty || 0) + Math.sin(t.__ang) * t.__rad;
        }
      });
    });

    // 7. refine data sources from the actual projected halo positions.
    positionDataSources(projectedToolX, 260);
    computePadiRoutePinDefaults(graphNodes, graphLinks);
    layoutPadiRoutePins(graphNodes);
    const visibleTargets = graphNodes.filter(n => !n.padiControl && !isPinnedRailNode(n));
    const content = visibleTargets.reduce((bounds, node) => {
      let x = node.__tx ?? node.x;
      let y = node.__ty ?? node.y;
      let extentX = nodeRadius(node) + 22;
      let extentY = nodeRadius(node) + 22;
      if (node.type === 'tool' && node.__bundle) {
        x = nodeX(node.__bundle) + Math.cos(node.__ang || 0) * (node.__rad || 0);
        y = (node.__bundle.__ty ?? node.__bundle.y ?? laneY[LANE_INDEX[String(LANE_Y.bundle)]])
          + Math.sin(node.__ang || 0) * (node.__rad || 0);
        extentX = Math.max(extentX, 46);
        extentY = Math.max(extentY, 34);
      }
      if (node.type === 'bundle') {
        extentX = Math.max(extentX, 74);
        extentY = Math.max(extentY, (node.__toolHaloR || 0) + 38);
      }
      if (!Number.isFinite(x) || !Number.isFinite(y)) return bounds;
      bounds.xLeft = Math.min(bounds.xLeft, x - extentX);
      bounds.xRight = Math.max(bounds.xRight, x + extentX);
      bounds.yTop = Math.min(bounds.yTop, y - extentY);
      bounds.yBottom = Math.max(bounds.yBottom, y + extentY);
      return bounds;
    }, { xLeft: Infinity, xRight: -Infinity, yTop: Infinity, yBottom: -Infinity });
    padiContentBounds = Number.isFinite(content.xLeft) ? content : null;
  }

  PADI_LANES.forEach((lane, li) => {
    const controls = graphNodes
      .filter(n => n.padiControl && n.padiControlKind !== 'route' && n.padiLaneIndex === li);
    layoutPadiControlShelf(li, controls);
  });

  renderLaneLibraries();   // keep chip in-cluster state in sync with the graph
  positionSwimlaneControls();
}

function fitPadiToViewport(ms = 650) {
  if (!fg || !isPadiLens() || viewMode === 'agent') return;
  const wrap = document.getElementById('graph-wrap');
  const panel = document.getElementById('panel');
  if (!wrap) return;

  const W = wrap.clientWidth || window.innerWidth;
  const H = wrap.clientHeight || window.innerHeight;
  const panelLeft = panel ? panel.getBoundingClientRect().left : W - 300;
  const usableW = Math.max(320, panelLeft - 24);
  const usableH = Math.max(320, H - 72);

  const fitBounds = padiContentBounds || padiWorld;
  const xMin = Math.min(fitBounds.xLeft, padiWorld.xLeft + 28) - 96;
  const xMax = fitBounds.xRight + 132;
  const yMin = padiWorld.yTop - 44;
  const yMax = padiWorld.yBottom + 88;
  const boundsW = Math.max(1, xMax - xMin);
  const boundsH = Math.max(1, yMax - yMin);
