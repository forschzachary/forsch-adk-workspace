  const zoom = Math.max(0.36, Math.min(2.1, Math.min(usableW / boundsW, usableH / boundsH)));
  const leftMargin = 36;
  const cx = xMin + (W / 2 - leftMargin) / zoom;
  const cy = (yMin + yMax) / 2;

  fg.centerAt(cx, cy, ms);
  fg.zoom(zoom, ms);
  window.setTimeout(() => {
    layoutPadi();
    positionSwimlaneControls();
  }, ms ? ms + 40 : 0);
}

function drawPadiLaneSheet(ctx, scale) {
  if (!isPadiLens() || viewMode === 'agent') return;
  const x = padiWorld.xLeft;
  const w = padiWorld.xRight - padiWorld.xLeft;
  PADI_LANES.forEach((lane, i) => {
    const y = padiLaneY[i];
    if (!Number.isFinite(y)) return;
    const top = Number.isFinite(padiLaneTop[i]) ? padiLaneTop[i] : y - (padiLaneHeight[i] || PADI_LANE_DEFAULT_HEIGHT) / 2;
    const height = padiLaneHeight[i] || PADI_LANE_DEFAULT_HEIGHT;
    const grad = ctx.createLinearGradient(x, 0, padiWorld.xRight, 0);
    grad.addColorStop(0, `rgba(${lane.hue},0.12)`);
    grad.addColorStop(0.35, `rgba(${lane.hue},0.055)`);
    grad.addColorStop(1, `rgba(${lane.hue},0.022)`);
    ctx.fillStyle = grad;
    ctx.fillRect(x, top, w, height);
    ctx.strokeStyle = 'rgba(255,255,255,0.055)';
    ctx.lineWidth = 1 / scale;
    ctx.beginPath();
    ctx.moveTo(x, top);
    ctx.lineTo(padiWorld.xRight, top);
    ctx.stroke();
  });
}

function positionSwimlaneControls() {
  const layer = document.getElementById('swimlane-controls');
  if (!fg || !layer || !isPadiLens() || viewMode === 'agent') return;
  if (typeof fg.graph2ScreenCoords !== 'function') return;
  const rows = layer.querySelectorAll('.swimlane-ctrl-row');
  rows.forEach(row => {
    const laneIndex = Number(row.dataset.laneIndex);
    const y = padiLaneY[laneIndex];
    if (!Number.isFinite(y)) return;
    const top = Number.isFinite(padiLaneTop[laneIndex]) ? padiLaneTop[laneIndex] : y - (padiLaneHeight[laneIndex] || PADI_LANE_DEFAULT_HEIGHT) / 2;
    const bottom = Number.isFinite(padiLaneBottom[laneIndex]) ? padiLaneBottom[laneIndex] : y + (padiLaneHeight[laneIndex] || PADI_LANE_DEFAULT_HEIGHT) / 2;
    const topLeft = fg.graph2ScreenCoords(padiWorld.xLeft, top);
    const bottomRight = fg.graph2ScreenCoords(padiWorld.xRight, bottom);
    const w = Math.max(0, bottomRight.x - topLeft.x);
    const h = Math.max(0, bottomRight.y - topLeft.y);
    row.style.transform = `translate(${topLeft.x}px, ${topLeft.y}px)`;
    row.style.width = `${w}px`;
    row.style.height = `${h}px`;
  });
}

// Custom force: spring each node toward its lane target plus a small perpetual
// float so the sheet feels alive but stays aligned. Horizontal is held tight
// (columns line up, risers stay vertical); the float is a gentle vertical drift.
// Constant (not alpha-scaled) so motion never dies when the simulation cools.
function padiLaneForce() {
  padiTick++;
  const nodes = padiLaneForce._nodes || [];
  for (const n of nodes) {
    if (isPinnedRailNode(n)) continue;
    if (n.type === 'tool') {
      // tool → its slot in the halo around its bundle (one-sided: the bundle is never moved)
      const b = n.__bundle;
      if (b && Number.isFinite(b.x)) {
        const tx = b.x + Math.cos(n.__ang || 0) * (n.__rad || 30);
        const ty = b.y + Math.sin(n.__ang || 0) * (n.__rad || 30);
        n.vx += (tx - n.x) * 0.08;
        n.vy += (ty - n.y) * 0.08 + Math.sin(padiTick * 0.02 + (n.__ang || 0) * 2) * 0.04;
      }
      continue;
    }
    if (n.__tx === undefined) continue;
    if (n.padiControl) continue;
    const sx = n.padiControl ? 0.35 : 0.12;
    const sy = n.padiControl ? 0.35 : 0.06;
    n.vx += (n.__tx - n.x) * sx;
    n.vy += (n.__ty - n.y) * sy;
    if (!n.padiControl) n.vy += Math.sin(padiTick * 0.013 + n.__phase) * 0.07;
  }
}
padiLaneForce.initialize = nodes => { padiLaneForce._nodes = nodes; };

// PADI link routing: leave the lower node going straight up, drop a pin where it
// crosses the lane divider, then bend straight to the upper node.
function drawPadiLink(link, ctx, scale) {
  const s = link.source, t = link.target;
  if (!s || !t || !Number.isFinite(s.x) || !Number.isFinite(t.x)) return;
  const highlighted = hoverLink === link || hoverLinks.has(link);
  const hoverDim = (hoverNode || hoverLink) && !highlighted;
  const col = padiLinkColor(link, hoverDim ? 0.22 : 1);
  const delegates = link.kind === 'delegates';   // a real agent→agent handoff (Huberto consults Ops over A2A)
  const inactive = !!link.inactive;
  ctx.lineWidth = (highlighted ? 2.4 : delegates ? 1.8 : inactive ? 0.8 : 1.1) / scale;
  ctx.strokeStyle = col;
  if (delegates) ctx.setLineDash([6 / scale, 4 / scale]);   // dashed: a relationship, not structural plumbing
  if (inactive) ctx.setLineDash([2 / scale, 5 / scale]);
  const pts = padiLinkPath(s, t, link);
  if (pts.length < 2) return;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
  ctx.stroke();
  if (!inactive && !hoverDim && link.kind !== 'contains') drawPadiArrow(link, pts, ctx, scale, col);
  if (highlighted && link.kind === 'contains') drawPadiArrow(link, pts, ctx, scale, col);
  if (pts.length > 2) {
    pts.slice(1, -1).forEach(pin => {
    ctx.beginPath();
    ctx.arc(pin.x, pin.y, (highlighted ? 3.4 : 2.6) / scale, 0, 2 * Math.PI);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.lineWidth = 1.5 / scale;
    ctx.strokeStyle = '#0d1117';
    ctx.stroke();
    });
  }
  ctx.setLineDash([]);
  drawPadiLinkLabel(link, pts, ctx, scale, col, highlighted);
}
function padiLinkColor(l, alphaScale = 1) {
  if (l.kind === 'contains') return rgba('#8b949e', (l.inactive ? 0.18 : 0.32) * alphaScale);
  if (l.kind === 'delegates') return rgba('#8b949e', 0.62 * alphaScale);
  if (l.kind === 'depends-on') return rgba('#8b949e', 0.36 * alphaScale);
  if (l.kind === 'runs-on' || l.kind === 'runs-in') return rgba('#8b949e', 0.34 * alphaScale);
  return rgba('#8b949e', 0.44 * alphaScale);
}

function applyForces() {
  const charge = fg.d3Force('charge');
  const link = fg.d3Force('link');
  const center = fg.d3Force('center');
  if (isPadiLens()) {
    // No charge/link tug — they'd shove nodes off their even spread (and behind
    // the panel). Positioning + the floaty bob are entirely the lane force's job.
    // Tools float in an organic blob around their bundle — only tools get charge
    // (they repel each other for spacing) and the contains-link pulls them in;
    // agents/bundles/interfaces keep charge 0 so their lanes stay clean + evenly spread.
    if (charge) charge.strength(0);
    if (link) link.strength(0);   // PADI positions everything via the lane force (backbone rows + the one-sided tool halo); charge/link stay off so nothing drifts off-lane
    if (center) center.strength(0);   // else it recentres the centroid, sliding the whole sheet off
    fg.d3Force('lane', padiLaneForce);
    fg.d3VelocityDecay(0.55);
    fg.d3AlphaDecay(0);          // never fully cool → perpetual gentle float
  } else {
    if (charge) charge.strength(-30);
    if (link) link.distance(30).strength(1);
    if (center) center.strength(1);
    fg.d3Force('lane', null);    // drop the lane force outside PADI
    fg.d3VelocityDecay(0.4);
    fg.d3AlphaDecay(0.0228);     // d3 default
  }
}

// ── Canvas drawing helpers ──
function drawWarningTriangle(ctx, x, y, size, scale) {
  const s = size / scale;
  ctx.beginPath();
  ctx.moveTo(x, y - s);
  ctx.lineTo(x + s * 0.87, y + s * 0.5);
  ctx.lineTo(x - s * 0.87, y + s * 0.5);
  ctx.closePath();
  ctx.fillStyle = '#d29922';
  ctx.fill();
  ctx.fillStyle = '#0d1117';
  ctx.font = `bold ${s * 0.7}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('!', x, y + s * 0.08);
}

function drawX(ctx, x, y, size, scale) {
  const s = size / scale;
  ctx.strokeStyle = '#ff7b72';
  ctx.lineWidth = 2.5 / scale;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(x - s * 0.55, y - s * 0.55);
  ctx.lineTo(x + s * 0.55, y + s * 0.55);
  ctx.moveTo(x + s * 0.55, y - s * 0.55);
  ctx.lineTo(x - s * 0.55, y + s * 0.55);
  ctx.stroke();
}

function roundRectPath(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.lineTo(x + w - rr, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + rr);
  ctx.lineTo(x + w, y + h - rr);
  ctx.quadraticCurveTo(x + w, y + h, x + w - rr, y + h);
  ctx.lineTo(x + rr, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - rr);
  ctx.lineTo(x, y + rr);
  ctx.quadraticCurveTo(x, y, x + rr, y);
  ctx.closePath();
}

function folderPath(ctx, x, y, r, scale) {
  const rr = Math.max(2 / scale, Math.min(5 / scale, r * 0.28));
  const left = x - r * 1.12;
  const right = x + r * 1.12;
  const top = y - r * 0.58;
  const bottom = y + r * 0.76;
  const tabLeft = left + r * 0.2;
  const tabRight = left + r * 0.92;
  const tabTop = y - r * 0.88;
  ctx.beginPath();
  ctx.moveTo(left + rr, top);
  ctx.lineTo(tabLeft, top);
  ctx.lineTo(tabLeft + r * 0.14, tabTop);
  ctx.lineTo(tabRight, tabTop);
  ctx.lineTo(tabRight + r * 0.24, top);
  ctx.lineTo(right - rr, top);
  ctx.quadraticCurveTo(right, top, right, top + rr);
  ctx.lineTo(right, bottom - rr);
  ctx.quadraticCurveTo(right, bottom, right - rr, bottom);
  ctx.lineTo(left + rr, bottom);
  ctx.quadraticCurveTo(left, bottom, left, bottom - rr);
  ctx.lineTo(left, top + rr);
  ctx.quadraticCurveTo(left, top, left + rr, top);
  ctx.closePath();
}

function inboxPath(ctx, x, y, r, scale) {
  const rr = Math.max(2 / scale, Math.min(5 / scale, r * 0.25));
  const left = x - r * 1.08;
  const right = x + r * 1.08;
  const top = y - r * 0.74;
  const bottom = y + r * 0.72;
  ctx.beginPath();
  ctx.moveTo(left + rr, top);
  ctx.lineTo(right - rr, top);
  ctx.quadraticCurveTo(right, top, right, top + rr);
  ctx.lineTo(right, bottom - rr);
  ctx.quadraticCurveTo(right, bottom, right - rr, bottom);
  ctx.lineTo(x + r * 0.4, bottom);
  ctx.lineTo(x + r * 0.2, y + r * 0.34);
  ctx.lineTo(x - r * 0.2, y + r * 0.34);
  ctx.lineTo(x - r * 0.4, bottom);
  ctx.lineTo(left + rr, bottom);
  ctx.quadraticCurveTo(left, bottom, left, bottom - rr);
  ctx.lineTo(left, top + rr);
  ctx.quadraticCurveTo(left, top, left + rr, top);
  ctx.closePath();
}

function interfaceGlyphKind(node) {
  const pieces = [
    node.id, node.name, node.channel, node.artifact,
    ...(Array.isArray(node.members) ? node.members : []),
  ].filter(Boolean).map(v => String(v).toLowerCase());
  const text = pieces.join(' ');
  if (text.includes('discord') || text.includes('chan:') || text.includes('#')) return 'discord';
  if (text.includes('phone') || text.includes('sms') || text.includes('text') || text.includes('twilio') || text.includes('call') || text.includes('voice') || text.includes('whatsapp')) return 'phone';
  if (text.includes('email') || text.includes('mail') || text.includes('resend')) return 'email';
  if (text.includes('slack')) return 'slack';
  if (text.includes('telegram')) return 'telegram';
  if (text.includes('chainlit') || text.includes('chat')) return 'chat';
  if (text.includes('github') || text.includes('gitlab') || text.includes('git ')) return 'code';
  if (text.includes('calendar') || text.includes('calendly') || text.includes('meeting')) return 'calendar';
  if (text.includes('form') || text.includes('survey') || text.includes('typeform')) return 'form';
  if (text.includes('cli') || text.includes('terminal') || text.includes('shell')) return 'terminal';
  if (text.includes('api') || text.includes('webhook') || text.includes('rest') || text.includes('graphql')) return 'api';
  if (text.includes('web') || text.includes('hosted') || text.includes('http') || text.includes('browser') || text.includes('cockpit') || text.includes('builder')) return 'web';
  return 'inbox';
}

function drawInterfaceGlyph(node, ctx, r, scale, color, alpha) {
  const x = node.x;
  const y = node.y;
  const kind = interfaceGlyphKind(node);
  const ink = rgba(color, Math.min(0.86, alpha * 0.86));
  const fill = rgba(color, Math.min(0.18, alpha * 0.2));
  const line = Math.max(1 / scale, 1.25 / scale);
  ctx.strokeStyle = ink;
  ctx.fillStyle = ink;
  ctx.lineWidth = line;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (kind === 'discord') {
    roundRectPath(ctx, x - r * 0.48, y - r * 0.2, r * 0.96, r * 0.5, r * 0.17);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = ink;
    ctx.stroke();
    ctx.fillStyle = ink;
    ctx.beginPath();
    ctx.arc(x - r * 0.2, y + r * 0.04, Math.max(1.1 / scale, r * 0.055), 0, 2 * Math.PI);
    ctx.arc(x + r * 0.2, y + r * 0.04, Math.max(1.1 / scale, r * 0.055), 0, 2 * Math.PI);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x - r * 0.44, y - r * 0.05, r * 0.16, Math.PI * 1.2, Math.PI * 1.75);
    ctx.arc(x + r * 0.44, y - r * 0.05, r * 0.16, Math.PI * 1.25, Math.PI * 1.8);
    ctx.stroke();
    return;
  }

  if (kind === 'phone') {
    ctx.beginPath();
    ctx.arc(x, y + r * 0.02, r * 0.42, Math.PI * 0.75, Math.PI * 1.82);
    ctx.stroke();
    ctx.fillStyle = ink;
    roundRectPath(ctx, x - r * 0.47, y + r * 0.16, r * 0.22, r * 0.14, r * 0.05);
    ctx.fill();
    roundRectPath(ctx, x + r * 0.22, y - r * 0.34, r * 0.22, r * 0.14, r * 0.05);
    ctx.fill();
    return;
  }

  if (kind === 'email') {
    roundRectPath(ctx, x - r * 0.5, y - r * 0.25, r, r * 0.62, r * 0.08);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - r * 0.46, y - r * 0.2);
    ctx.lineTo(x, y + r * 0.09);
    ctx.lineTo(x + r * 0.46, y - r * 0.2);
    ctx.stroke();
    return;
  }

  if (kind === 'slack') {
    const w = r * 0.16;
    const h = r * 0.48;
    roundRectPath(ctx, x - r * 0.26, y - r * 0.32, w, h, w / 2);
    ctx.fill();
    roundRectPath(ctx, x + r * 0.1, y - r * 0.16, h, w, w / 2);
    ctx.fill();
    roundRectPath(ctx, x + r * 0.1, y - r * 0.32, w, h, w / 2);
    ctx.fill();
    roundRectPath(ctx, x - r * 0.42, y + r * 0.1, h, w, w / 2);
    ctx.fill();
    return;
  }

  if (kind === 'telegram') {
    ctx.beginPath();
    ctx.moveTo(x - r * 0.5, y - r * 0.05);
    ctx.lineTo(x + r * 0.48, y - r * 0.38);
    ctx.lineTo(x + r * 0.15, y + r * 0.42);
    ctx.lineTo(x - r * 0.05, y + r * 0.14);
    ctx.closePath();
    ctx.stroke();
    return;
  }

  if (kind === 'chat') {
    roundRectPath(ctx, x - r * 0.52, y - r * 0.28, r * 1.04, r * 0.58, r * 0.16);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - r * 0.18, y + r * 0.3);
    ctx.lineTo(x - r * 0.32, y + r * 0.47);
    ctx.lineTo(x + r * 0.04, y + r * 0.3);
    ctx.stroke();
    return;
  }

  if (kind === 'web') {
    ctx.beginPath();
    ctx.arc(x, y + r * 0.04, r * 0.38, 0, 2 * Math.PI);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - r * 0.38, y + r * 0.04);
    ctx.lineTo(x + r * 0.38, y + r * 0.04);
    ctx.moveTo(x, y - r * 0.34);
    ctx.quadraticCurveTo(x - r * 0.24, y + r * 0.04, x, y + r * 0.42);
    ctx.quadraticCurveTo(x + r * 0.24, y + r * 0.04, x, y - r * 0.34);
    ctx.stroke();
    return;
  }

  if (kind === 'api') {
    ctx.beginPath();
    ctx.moveTo(x - r * 0.16, y - r * 0.36);
    ctx.lineTo(x - r * 0.46, y);
    ctx.lineTo(x - r * 0.16, y + r * 0.36);
    ctx.moveTo(x + r * 0.16, y - r * 0.36);
    ctx.lineTo(x + r * 0.46, y);
    ctx.lineTo(x + r * 0.16, y + r * 0.36);
    ctx.moveTo(x - r * 0.02, y + r * 0.34);
    ctx.lineTo(x + r * 0.12, y - r * 0.34);
    ctx.stroke();
    return;
  }

  if (kind === 'terminal') {
    roundRectPath(ctx, x - r * 0.5, y - r * 0.32, r, r * 0.68, r * 0.1);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - r * 0.3, y - r * 0.1);
    ctx.lineTo(x - r * 0.14, y + r * 0.03);
    ctx.lineTo(x - r * 0.3, y + r * 0.16);
    ctx.moveTo(x - r * 0.02, y + r * 0.17);
    ctx.lineTo(x + r * 0.26, y + r * 0.17);
    ctx.stroke();
    return;
  }

  if (kind === 'code') {
    const dotR = Math.max(1.2 / scale, r * 0.075);
    ctx.beginPath();
    ctx.moveTo(x - r * 0.28, y - r * 0.26);
    ctx.lineTo(x - r * 0.28, y + r * 0.3);
    ctx.lineTo(x + r * 0.28, y + r * 0.3);
    ctx.moveTo(x - r * 0.28, y);
    ctx.lineTo(x + r * 0.22, y - r * 0.24);
    ctx.stroke();
    ctx.fillStyle = ink;
    [
      [x - r * 0.28, y - r * 0.26],
      [x - r * 0.28, y + r * 0.3],
      [x + r * 0.28, y + r * 0.3],
      [x + r * 0.22, y - r * 0.24],
    ].forEach(([px, py]) => {
      ctx.beginPath();
      ctx.arc(px, py, dotR, 0, 2 * Math.PI);
      ctx.fill();
    });
    return;
  }

  if (kind === 'calendar') {
    roundRectPath(ctx, x - r * 0.46, y - r * 0.36, r * 0.92, r * 0.76, r * 0.08);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x - r * 0.46, y - r * 0.14);
    ctx.lineTo(x + r * 0.46, y - r * 0.14);
    ctx.moveTo(x - r * 0.24, y - r * 0.44);
    ctx.lineTo(x - r * 0.24, y - r * 0.26);
    ctx.moveTo(x + r * 0.24, y - r * 0.44);
    ctx.lineTo(x + r * 0.24, y - r * 0.26);
    ctx.stroke();
    ctx.fillStyle = ink;
    ctx.beginPath();
    ctx.arc(x, y + r * 0.12, Math.max(1.4 / scale, r * 0.08), 0, 2 * Math.PI);
    ctx.fill();
    return;
  }

  if (kind === 'form') {
    roundRectPath(ctx, x - r * 0.42, y - r * 0.38, r * 0.84, r * 0.82, r * 0.08);
    ctx.stroke();
    [-0.14, 0.1, 0.32].forEach(offset => {
      ctx.beginPath();
      ctx.moveTo(x - r * 0.22, y + r * offset);
      ctx.lineTo(x + r * 0.26, y + r * offset);
      ctx.stroke();
    });
    ctx.beginPath();
    ctx.moveTo(x - r * 0.28, y - r * 0.18);
    ctx.lineTo(x - r * 0.22, y - r * 0.1);
    ctx.lineTo(x - r * 0.12, y - r * 0.25);
    ctx.stroke();
    return;
  }

  ctx.beginPath();
  ctx.moveTo(x - r * 0.78, y - r * 0.08);
  ctx.lineTo(x - r * 0.36, y + r * 0.28);
  ctx.lineTo(x + r * 0.36, y + r * 0.28);
  ctx.lineTo(x + r * 0.78, y - r * 0.08);
  ctx.stroke();
}

function nodeShapePath(ctx, node, x, y, r, scale) {
  const rr = Math.max(2 / scale, Math.min(7 / scale, r * 0.45));
  if (node.type === 'agent') {
    roundRectPath(ctx, x - r * 0.9, y - r * 0.76, r * 1.8, r * 1.52, rr);
    return;
  }
  if (node.type === 'tool') {
    ctx.beginPath();
    ctx.arc(x, y, r * 0.78, 0, 2 * Math.PI);
    return;
  }
  if (node.type === 'network') {
    ctx.beginPath();
    ctx.moveTo(x, y - r);
    ctx.lineTo(x + r, y);
    ctx.lineTo(x, y + r);
    ctx.lineTo(x - r, y);
    ctx.closePath();
    return;
  }
  if (node.type === 'bundle') {
    folderPath(ctx, x, y, r, scale);
    return;
  }
  if (node.type === 'router') {
    ctx.beginPath();
    ctx.moveTo(x, y - r * 1.05);
    ctx.lineTo(x + r * 0.95, y + r * 0.72);
    ctx.lineTo(x - r * 0.95, y + r * 0.72);
    ctx.closePath();
    return;
  }
  if (node.type === 'intake') {
    inboxPath(ctx, x, y, r, scale);
    return;
  }
  if (node.type === 'ui') {
    inboxPath(ctx, x, y, r, scale);
    return;
  }
  if (node.type === 'database') {
    roundRectPath(ctx, x - r * 0.94, y - r * 0.94, r * 1.88, r * 1.88, rr);
    return;
  }
  if (node.type === 'service' || node.type === 'container' || node.type === 'host') {
    roundRectPath(ctx, x - r, y - r * 0.82, r * 2, r * 1.64, rr);
    return;
  }
  if (node.type === 'tunnel') {
    ctx.beginPath();
    ctx.arc(x, y + r * 0.18, r * 0.85, Math.PI, 0);
    ctx.lineTo(x + r * 0.62, y + r * 0.8);
    ctx.lineTo(x - r * 0.62, y + r * 0.8);
    ctx.closePath();
    return;
  }
  ctx.beginPath();
  ctx.arc(x, y, r, 0, 2 * Math.PI);
}

function drawNodeInteriorGlyph(node, ctx, r, scale, color, alpha) {
  const line = Math.max(1 / scale, 1.35 / scale);
  const x = node.x;
  const y = node.y;
  ctx.save();
  ctx.lineWidth = line;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (node.type === 'agent') {
    const faceInk = rgba('#f0f6fc', Math.min(0.9, alpha * 0.88));
    const detailInk = rgba(color, Math.min(0.82, alpha * 0.82));
    const earW = r * 0.16;
    const earH = r * 0.44;
    ctx.fillStyle = rgba(color, Math.min(0.32, alpha * 0.35));
    roundRectPath(ctx, x - r * 1.02, y - earH / 2, earW, earH, 2 / scale);
    ctx.fill();
    roundRectPath(ctx, x + r * 0.86, y - earH / 2, earW, earH, 2 / scale);
    ctx.fill();

    ctx.strokeStyle = detailInk;
    ctx.beginPath();
    ctx.moveTo(x, y - r * 0.76);
    ctx.lineTo(x, y - r * 1.02);
    ctx.stroke();
    ctx.fillStyle = detailInk;
    ctx.beginPath();
    ctx.arc(x, y - r * 1.08, Math.max(1.5 / scale, r * 0.11), 0, 2 * Math.PI);
    ctx.fill();

    ctx.fillStyle = faceInk;
    roundRectPath(ctx, x - r * 0.42, y - r * 0.22, r * 0.22, r * 0.22, 2 / scale);
    ctx.fill();
    roundRectPath(ctx, x + r * 0.2, y - r * 0.22, r * 0.22, r * 0.22, 2 / scale);
    ctx.fill();
    ctx.strokeStyle = faceInk;
    ctx.beginPath();
    ctx.moveTo(x - r * 0.33, y + r * 0.32);
    ctx.lineTo(x + r * 0.33, y + r * 0.32);
    ctx.stroke();
    ctx.restore();
    return;
  }

  if (node.type === 'bundle') {
    ctx.strokeStyle = rgba(color, Math.min(0.72, alpha * 0.72));
    ctx.beginPath();
    ctx.moveTo(x - r * 0.92, y - r * 0.2);
    ctx.lineTo(x + r * 0.92, y - r * 0.2);
    ctx.stroke();
    ctx.restore();
    return;
  }

  if (node.type === 'database') {
    ctx.strokeStyle = rgba(color, Math.min(0.78, alpha * 0.78));
    roundRectPath(ctx, x - r * 0.54, y - r * 0.52, r * 1.08, r * 1.04, 3 / scale);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(x, y, Math.max(2.2 / scale, r * 0.2), 0, 2 * Math.PI);
    ctx.stroke();
    for (let i = 0; i < 4; i += 1) {
      const a = Math.PI / 4 + i * Math.PI / 2;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(a) * r * 0.08, y + Math.sin(a) * r * 0.08);
      ctx.lineTo(x + Math.cos(a) * r * 0.23, y + Math.sin(a) * r * 0.23);
      ctx.stroke();
    }
    ctx.restore();
    return;
  }

  if (node.type === 'intake' || node.type === 'ui') {
    drawInterfaceGlyph(node, ctx, r, scale, color, alpha);
    ctx.restore();
    return;
  }

  ctx.restore();
}

function drawMiniBadge(ctx, x, y, text, color, scale) {
  const fs = text.length > 1 ? 7.5 / scale : 8.5 / scale;
  ctx.font = `700 ${fs}px ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace`;
  const w = Math.max(10 / scale, ctx.measureText(text).width + 5 / scale);
  const h = 11 / scale;
  roundRectPath(ctx, x - w / 2, y - h / 2, w, h, h / 2);
  ctx.fillStyle = '#0d1117cc';
  ctx.fill();
  ctx.strokeStyle = rgba(color, 0.8);
  ctx.lineWidth = 1 / scale;
  ctx.stroke();
  ctx.fillStyle = rgba(color, 0.95);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y + 0.2 / scale);
}

function drawNodeBadges(node, ctx, r, scale, color) {
  const badges = [];
  if (node.role === 'builder') badges.push('B');
  if (node.role === 'orchestrator') badges.push('O');
  if (node.type === 'bundle' && (node.inactive_tools || []).length) badges.push('-' + node.inactive_tools.length);
  badges.slice(0, 2).forEach((badge, i) => {
    drawMiniBadge(ctx, node.x + r * 0.78 + i * 14 / scale, node.y - r * 0.78, badge, color, scale);
  });
}

function truncateLabel(ctx, label, maxWidth) {
  if (!label || ctx.measureText(label).width <= maxWidth) return label || '';
  const ell = '…';
  let lo = 0, hi = label.length;
  while (lo < hi) {
    const mid = Math.ceil((lo + hi) / 2);
    if (ctx.measureText(label.slice(0, mid) + ell).width <= maxWidth) lo = mid;
    else hi = mid - 1;
  }
  return label.slice(0, Math.max(1, lo)) + ell;
}

function padiControlRect(node, scale) {
  const w = (node.padiWidth || 80) / scale;
  const h = (node.padiHeight || 22) / scale;
  return { x: node.x - w / 2, y: node.y - h / 2, w, h };
}

function drawPadiControlNode(node, ctx, scale) {
  const { x, y, w, h } = padiControlRect(node, scale);
  const disabled = !!node.padiDisabled;
  const hue = node.padiHue || '88,166,255';
  ctx.save();
  const controlFontSize = node.padiControlKind === 'library' ? 10 : 11;
  ctx.font = `${node.padiControlKind === 'label' ? '600 ' : ''}${controlFontSize / scale}px ${node.padiControlKind === 'library' ? "ui-monospace, 'SF Mono', monospace" : "-apple-system, BlinkMacSystemFont, sans-serif"}`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  if (node.padiControlKind === 'label') {
    ctx.fillStyle = `rgba(${hue},0.78)`;
    roundRectPath(ctx, x, y + 2 / scale, 3 / scale, h - 4 / scale, 2 / scale);
    ctx.fill();
    ctx.fillStyle = disabled ? 'rgba(139,148,158,0.32)' : 'rgba(150,170,190,0.62)';
    ctx.letterSpacing = `${2.5 / scale}px`;
    ctx.fillText(node.name.toUpperCase(), node.x + 8 / scale, node.y);
    ctx.restore();
    return;
  }

  if (node.padiControlKind === 'route') {
    const active = hasManualRoutePin(Number(node.padiBoundaryIndex));
    ctx.beginPath();
    ctx.moveTo(node.x, node.y - 34 / scale);
    ctx.lineTo(node.x, node.y + 34 / scale);
    ctx.strokeStyle = active ? `rgba(${hue},0.62)` : `rgba(${hue},0.28)`;
    ctx.lineWidth = active ? 1.6 / scale : 1 / scale;
    ctx.setLineDash(active ? [] : [3 / scale, 4 / scale]);
    ctx.stroke();
    ctx.setLineDash([]);
    roundRectPath(ctx, x, y, w, h, h / 2);
    ctx.fillStyle = active ? `rgba(${hue},0.18)` : 'rgba(13,17,23,0.82)';
    ctx.fill();
    ctx.strokeStyle = active ? `rgba(${hue},0.86)` : `rgba(${hue},0.48)`;
    ctx.lineWidth = 1 / scale;
    ctx.stroke();
    ctx.fillStyle = active ? '#e6edf3' : 'rgba(201,209,217,0.72)';
    ctx.font = `700 ${9.5 / scale}px ui-monospace, 'SF Mono', monospace`;
    ctx.fillText('pins', node.x, node.y + 0.5 / scale);
    ctx.restore();
    return;
  }

  if (node.padiControlKind === 'spawn') {
    roundRectPath(ctx, x, y, w, h, 5 / scale);
    ctx.fillStyle = 'rgba(255,255,255,0.025)';
    ctx.fill();
    ctx.setLineDash([4 / scale, 3 / scale]);
    ctx.strokeStyle = disabled ? 'rgba(140,160,180,0.18)' : `rgba(${hue},0.55)`;
    ctx.lineWidth = 1 / scale;
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = disabled ? `rgba(${hue},0.26)` : `rgb(${hue})`;
    ctx.fillText(node.name, node.x, node.y);
    ctx.restore();
    return;
  }

  roundRectPath(ctx, x, y, w, h, h / 2);
  ctx.fillStyle = disabled ? 'rgba(255,255,255,0.018)' : 'rgba(255,255,255,0.035)';
  ctx.fill();
  ctx.save();
  roundRectPath(ctx, x, y, w, h, h / 2);
  ctx.clip();
  ctx.fillStyle = disabled ? 'rgba(139,148,158,0.52)' : '#c9d1d9';
  ctx.fillText(node.name, node.x, node.y + 0.5 / scale);
  ctx.restore();
  if (disabled) ctx.setLineDash([4 / scale, 3 / scale]);
  ctx.strokeStyle = disabled ? `rgba(${hue},0.34)` : `rgb(${hue})`;
  ctx.lineWidth = 1.25 / scale;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function paintPadiControlHitArea(node, color, ctx, scale) {
  const { x, y, w, h } = padiControlRect(node, scale);
  ctx.fillStyle = color;
  roundRectPath(ctx, x, y, w, h, h / 2);
  ctx.fill();
}

function handlePadiControlClick(node) {
  if (!node || node.padiDisabled) return;
  if (node.padiControlKind === 'route') return;
  if (node.padiControlKind === 'spawn' && node.padiSpawner === 'agent') {
    const id = prompt('New agent id (a-z, 0-9, _)');
    if (!id) return;
    const desc = prompt('Description (optional)') || '';
    spawnBlankAgent(id, desc, null);
    return;
  }
  if (node.padiControlKind === 'library' && node.padiAgentId) {
    if (node.padiSpawner === 'agent') {
      addAgentToCluster(node.padiAgentId, null);
    } else {
      inspectGraphNode(node.padiSpawner, node.padiAgentId);
    }
  }
}

// ── Custom live particles along visible link segments ──
let liveNodeIds = new Set();
let particlePhase = 0;

function drawLiveParticles(ctx, scale) {
  if (!liveNodeIds.size || !isPadiLens()) return;
  const gLinks = fg.graphData().links || [];
  const now = Date.now();
  particlePhase = (now % 4000) / 4000;
  gLinks.forEach(link => {
    const s = link.source, t = link.target;
    if (!s || !t || !Number.isFinite(s.x) || !Number.isFinite(t.x)) return;
    if (!liveNodeIds.has(s.id) && !liveNodeIds.has(t.id)) return;
    const pts = padiLinkPath(s, t, link);
    if (pts.length < 2) return;
    const totalLen = pathLength(pts);
    if (totalLen < 1) return;
    const count = Math.max(2, Math.ceil(totalLen / 120));
    for (let i = 0; i < count; i++) {
      const frac = ((particlePhase + i / count) % 1) * totalLen;
      const pos = pointAtDist(pts, frac);
      const r = 2 / scale;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, r, 0, 2 * Math.PI);
      ctx.fillStyle = '#4ade80';
      ctx.fill();
    }
  });
}

function padiLinkPath(s, t, link = null) {
  const rS = nodeVisualRadius(s, 1) + 2;
  const rT = nodeVisualRadius(t, 1) + 2;
  if (isPinnedRailNode(s) || isPinnedRailNode(t) || s.__lane === undefined || t.__lane === undefined || s.__lane === t.__lane) {
    return clipSegment(s, t, rS, rT);
  }
  const upper = s.__lane < t.__lane ? s : t;   // smaller index = higher row
  const lower = s.__lane < t.__lane ? t : s;
  const boundaryIndex = upper.__lane;
  const boundY = padiLaneBound[boundaryIndex];
  const px = lower.__tx;
  if (!Number.isFinite(boundY) || !Number.isFinite(px)) return clipSegment(s, t, rS, rT);
  if (shouldUseRoutePin(link, boundaryIndex)) {
    const pin = { x: clampPadiRouteX(padiRoutePinX(boundaryIndex, px)), y: boundY };
    const seg1 = clipSegment(s, pin, rS, 0);
    const seg2 = clipSegment(pin, t, 0, rT);
    return [seg1[0], seg1[1], seg2[1]];
  }
  if (link?.kind === 'uses-bundle' && upper.type === 'agent' && lower.type === 'bundle') {
    const upperX = upper.__tx ?? upper.x;
    const lowerX = lower.__tx ?? lower.x;
    if (!Number.isFinite(upperX) || !Number.isFinite(lowerX)) return clipSegment(s, t, rS, rT);
    const pin = { x: (upperX + lowerX) / 2, y: boundY };
    const seg1 = clipSegment(s, pin, rS, 0);
    const seg2 = clipSegment(pin, t, 0, rT);
    return [seg1[0], seg1[1], seg2[1]];
  }
  const pin = { x: px, y: boundY };
  const seg1 = clipSegment(s, pin, rS, 0);
  const seg2 = clipSegment(pin, t, 0, rT);
  return [seg1[0], seg1[1], seg2[1]];
}

function clipSegment(a, b, rA, rB) {
  const dx = b.x - a.x, dy = b.y - a.y;
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len < rA + rB) return [a, b];
  const ux = dx / len, uy = dy / len;
  return [
    { x: a.x + ux * rA, y: a.y + uy * rA },
    { x: b.x - ux * rB, y: b.y - uy * rB },
  ];
}

function pathLength(pts) {
  let len = 0;
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y;
    len += Math.sqrt(dx * dx + dy * dy);
  }
  return len;
}

function pointAtDist(pts, dist) {
  let rem = dist;
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x - pts[i-1].x, dy = pts[i].y - pts[i-1].y;
    const segLen = Math.sqrt(dx * dx + dy * dy);
    if (rem <= segLen) {
      const t = segLen > 0 ? rem / segLen : 0;
      return { x: pts[i-1].x + dx * t, y: pts[i-1].y + dy * t };
    }
    rem -= segLen;
  }
  return pts[pts.length - 1];
}

function drawPadiArrow(link, pts, ctx, scale, color) {
  const totalLen = pathLength(pts);
  if (totalLen < 18 / scale) return;
  const headDist = Math.max(8 / scale, totalLen - 8 / scale);
  const tailDist = Math.max(0, headDist - 10 / scale);
  const head = pointAtDist(pts, headDist);
  const tail = pointAtDist(pts, tailDist);
  const angle = Math.atan2(head.y - tail.y, head.x - tail.x);
  const len = link.kind === 'delegates' ? 9 / scale : 7 / scale;
  const half = len * 0.48;
  ctx.save();
  ctx.translate(head.x, head.y);
  ctx.rotate(angle);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-len, -half);
  ctx.lineTo(-len * 0.72, 0);
  ctx.lineTo(-len, half);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

function padiLinkLabelText(link, highlighted) {
  const labels = {
    'delegates': 'delegates',
    'listens': 'listens',
    'wears': 'group',
    'depends-on': 'credential',
    'runs-in': 'runs in',
    'runs-on': 'runs on',
  };
  if (labels[link.kind]) return labels[link.kind];
  return '';
}

function drawPadiLinkLabel(link, pts, ctx, scale, color, highlighted) {
  const text = padiLinkLabelText(link, highlighted);
  if (!text) return;
  const totalLen = pathLength(pts);
  if (totalLen < 60 / scale && !highlighted) return;
  const mid = pointAtDist(pts, totalLen * 0.5);
  const fs = (highlighted ? 10 : 8.5) / scale;
  ctx.save();
  ctx.font = `700 ${fs}px ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace`;
  const w = ctx.measureText(text).width + 8 / scale;
  const h = fs + 5 / scale;
  roundRectPath(ctx, mid.x - w / 2, mid.y - h / 2, w, h, 4 / scale);
  ctx.fillStyle = highlighted ? '#111820e6' : '#0d1117b8';
  ctx.fill();
  ctx.strokeStyle = color;
  ctx.lineWidth = 0.75 / scale;
  ctx.stroke();
  ctx.fillStyle = highlighted ? '#e6edf3' : rgba('#c9d1d9', 0.74);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, mid.x, mid.y + 0.4 / scale);
  ctx.restore();
}

function paintPadiLinkHitArea(link, color, ctx, scale) {
  const s = link.source, t = link.target;
  if (!s || !t || !Number.isFinite(s.x) || !Number.isFinite(t.x)) return;
  const pts = isPadiLens() ? padiLinkPath(s, t, link) : clipSegment(s, t, nodeVisualRadius(s, 1), nodeVisualRadius(t, 1));
  if (pts.length < 2) return;
  ctx.strokeStyle = color;
  ctx.lineWidth = Math.max(8 / scale, 6);
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  pts.slice(1).forEach(p => ctx.lineTo(p.x, p.y));
  ctx.stroke();
}

function setHoverNode(node) {
  hoverNode = node || null;
  hoverLink = null;
  hoverNodeIds = new Set();
  hoverLinks = new Set();
  if (!node || !fg) return;
  hoverNodeIds.add(node.id);
  (fg.graphData().links || []).forEach(link => {
    const s = lid(link.source), t = lid(link.target);
    if (s === node.id || t === node.id) {
      hoverLinks.add(link);
      hoverNodeIds.add(s);
      hoverNodeIds.add(t);
    }
  });
}

function setHoverLink(link) {
  hoverLink = link || null;
  hoverNode = null;
  hoverNodeIds = new Set();
  hoverLinks = new Set();
  if (!link) return;
  hoverLinks.add(link);
  hoverNodeIds.add(lid(link.source));
  hoverNodeIds.add(lid(link.target));
}

function keyboardGraphNodes() {
  return (fg?.graphData().nodes || []).filter(n => !n.padiControl);
}

function keyboardNodeById(id) {
  return keyboardGraphNodes().find(n => n.id === id) || null;
}

function updateKeyboardStatus(node, suffix = '') {
  const el = document.getElementById('keyboard-status');
  if (!el) return;
  if (!node) {
    el.textContent = 'Graph keyboard selection cleared.';
    return;
  }
  const count = keyboardNeighbors(node).length;
  el.textContent = `Selected ${node.name || node.id}, ${node.type || 'node'}, ${count} connected node${count === 1 ? '' : 's'}.${suffix ? ' ' + suffix : ''}`;
}

function clearKeyboardNode() {
  keyboardNodeId = null;
  setHoverNode(null);
  updateKeyboardStatus(null);
  updateSelectionPanel();
}

function selectKeyboardNode(node, opts = {}) {
  if (!node || node.padiControl) return false;
  keyboardNodeId = node.id;
  setHoverNode(node);
  updateKeyboardStatus(node);
  updateSelectionPanel();
  if (opts.center !== false) centerKeyboardNode(node);
  const graphEl = document.getElementById('graph');
  if (graphEl && document.activeElement !== graphEl) graphEl.focus({ preventScroll: true });
  return true;
}

function visibleNodeById(id) {
  return keyboardGraphNodes().find(n => n.id === id) || getNodeById(id);
}

function explicitSelectionNodes() {
  return [...selectedNodeIds].map(visibleNodeById).filter(Boolean);
}

function activeSelectionNodes() {
  const explicit = explicitSelectionNodes();
  if (explicit.length) return explicit;
  const current = keyboardNodeById(keyboardNodeId);
  return current ? [current] : [];
}

function selectionPrimaryNode() {
  return visibleNodeById(primarySelectedNodeId) || activeSelectionNodes()[0] || null;
}

function setGraphSelection(ids, primaryId = null) {
  selectedNodeIds = new Set(ids.filter(Boolean));
  primarySelectedNodeId = primaryId || ids[ids.length - 1] || null;
  updateSelectionPanel();
  renderHubertContext();
  if (fg && typeof fg.refresh === 'function') fg.refresh();
}

function setSingleGraphSelection(node) {
  if (!node || node.padiControl) return;
  setGraphSelection([node.id], node.id);
}

function toggleGraphSelection(node) {
  if (!node || node.padiControl) return;
  const next = new Set(selectedNodeIds);
  if (next.has(node.id)) next.delete(node.id);
  else next.add(node.id);
  setGraphSelection([...next], next.has(node.id) ? node.id : [...next].at(-1));
}

function clearGraphSelection() {
  selectedNodeIds = new Set();
  primarySelectedNodeId = null;
  keyboardNodeId = null;
  setHoverNode(null);
  updateKeyboardStatus(null);
  updateSelectionPanel();
  renderHubertContext();
  if (fg && typeof fg.refresh === 'function') fg.refresh();
}

function selectionDetail(node) {
  const state = node.state ? `state:${node.state}` : '';
  const artifact = node.artifact ? `artifact:${node.artifact}` : '';
  return [node.type || 'node', state, artifact].filter(Boolean).join(' · ');
}

function selectionContextLines(nodes = activeSelectionNodes()) {
  return nodes.map(n => {
    const name = n.name || n.id;
    const type = n.type || 'node';
    const artifact = n.artifact ? ` artifact=${n.artifact}` : '';
    const state = n.state ? ` state=${n.state}` : '';
    return `@${name} (${type}) id=${n.id}${state}${artifact}`;
  });
}

function updateSelectionPanel() {
  const title = document.getElementById('selection-title');
  const meta = document.getElementById('selection-meta');
  const list = document.getElementById('selection-list');
  const focusBtn = document.getElementById('selection-focus-btn');
  const vibeBtn = document.getElementById('selection-vibe-btn');
  const clearBtn = document.getElementById('selection-clear-btn');
  if (!title || !meta || !list) return;
  const nodes = activeSelectionNodes();
  const explicit = selectedNodeIds.size > 0;
  title.textContent = nodes.length
    ? (nodes.length === 1 ? (nodes[0].name || nodes[0].id) : `${nodes.length} selected`)
    : 'Nothing selected';
  meta.textContent = nodes.length
    ? (explicit ? 'Shift-click adds or removes nodes from this build set.' : 'Current node. Shift-click to build a multi-node set.')
    : 'Click a node. Shift-click to gather a build set.';
  list.innerHTML = nodes.map(n => `
    <div class="selection-chip" title="${esc(n.id)}">
      <span class="swatch" style="background:${esc(nodeColor(n))}"></span>
      <div>
        <div class="name">${esc(n.name || n.id)}</div>
        <div class="meta">${esc(selectionDetail(n))}</div>
      </div>
    </div>
  `).join('');
  const enabled = nodes.length > 0;
  if (focusBtn) focusBtn.disabled = !enabled;
  if (vibeBtn) vibeBtn.disabled = !enabled;
  if (clearBtn) clearBtn.disabled = !enabled;
  const status = document.getElementById('mimo-ready-status');
  if (status) {
    status.textContent = enabled
      ? `Ready to send ${nodes.length} selected node${nodes.length === 1 ? '' : 's'} to MiMo.`
      : 'Ready for graph context.';
  }
}

function focusGraphSelection() {
  const nodes = activeSelectionNodes();
  if (!nodes.length) return;
  const primary = selectionPrimaryNode() || nodes[0];
  if (nodes.length === 1 && primary.type === 'agent' && primary.id.startsWith('agent:')) {
    enterAgentFocus(primary.id);
    return;
  }
  if (nodes.length > 1 && fg && typeof fg.zoomToFit === 'function') {
    const ids = new Set(nodes.map(n => n.id));
    fg.zoomToFit(420, 120, n => ids.has(n.id));
    selectKeyboardNode(primary, { center: false });
    return;
  }
  selectKeyboardNode(primary, { center: true });
  openInspect(primary);
}

function pipeSelectionToMimo() {
  const nodes = activeSelectionNodes();
  if (!nodes.length) return;
  const detail = {
    cluster: currentCluster,
    lens: currentLens,
    nodes: nodes.map(n => ({
      id: n.id,
      name: n.name || n.id,
      type: n.type || 'node',
      state: n.state || '',
      artifact: n.artifact || '',
    })),
  };
  window.__lastVibeSelection = detail;
  window.dispatchEvent(new CustomEvent('vibe-selection-requested', { detail }));
  openSidecar(sidecarAgentId || '', 'hubert');
  const input = document.getElementById('hubert-input');
  if (!input) return;
  const header = `Focus ${currentCluster || 'this project'} in ${currentLens} lens.`;
  const prompt = `${header}\n${selectionContextLines(nodes).join('\n')}\n\nHelp me build this out from the configuration and call out the safest next edit.`;
  input.value = input.value.trim() ? `${input.value.trim()}\n\n${prompt}` : prompt;
  input.dispatchEvent(new Event('input', { bubbles: true }));
  input.focus();
  const status = document.getElementById('mimo-ready-status');
  if (status) status.textContent = `${nodes.length} node${nodes.length === 1 ? '' : 's'} piped into MiMo.`;
  renderHubertContext();
}

function centerKeyboardNode(node) {
  if (!fg || !node || !Number.isFinite(node.x) || !Number.isFinite(node.y)) return;
  const currentZoom = typeof fg.zoom === 'function' ? fg.zoom() : 1;
  let targetZoom = currentZoom;
  if (isPadiLens() && viewMode !== 'agent' && node.type === 'tool' && currentZoom < PADI_TOOL_LABEL_ZOOM) {
    targetZoom = PADI_TOOL_LABEL_ZOOM + 0.08;
  }
  fg.centerAt(node.x, node.y, 320);
  if (Math.abs(targetZoom - currentZoom) > 0.01) fg.zoom(targetZoom, 320);
}

function keyboardSeedNode() {
  const nodes = keyboardGraphNodes().filter(n => Number.isFinite(n.x) && Number.isFinite(n.y));
  if (!nodes.length) return null;
  if (hoverNode && nodes.some(n => n.id === hoverNode.id)) return hoverNode;
  if (typeof inspectedNode !== 'undefined' && inspectedNode && nodes.some(n => n.id === inspectedNode.id)) return keyboardNodeById(inspectedNode.id);
  const wrap = document.getElementById('graph-wrap');
  let center = { x: 0, y: 0 };
  if (fg?.screen2GraphCoords && wrap) {
    center = fg.screen2GraphCoords(Math.max(1, wrap.clientWidth) / 2, Math.max(1, wrap.clientHeight) / 2);
  }
  return nodes.slice().sort((a, b) => {
    const da = (a.x - center.x) ** 2 + (a.y - center.y) ** 2;
    const db = (b.x - center.x) ** 2 + (b.y - center.y) ** 2;
    return da - db;
  })[0];
}

function keyboardNeighbors(node) {
  if (!node || !fg) return [];
  const byId = {};
  keyboardGraphNodes().forEach(n => { byId[n.id] = n; });
  const out = [];
  (fg.graphData().links || []).forEach(link => {
    const s = lid(link.source);
    const t = lid(link.target);
    if (s !== node.id && t !== node.id) return;
    const nextId = s === node.id ? t : s;
    const next = byId[nextId];
    if (!next || next.padiControl) return;
    out.push({ node: next, link });
  });
  return out;
}

function arrowVector(key) {
  if (key === 'ArrowLeft') return { x: -1, y: 0 };
  if (key === 'ArrowRight') return { x: 1, y: 0 };
  if (key === 'ArrowUp') return { x: 0, y: -1 };
  if (key === 'ArrowDown') return { x: 0, y: 1 };
  return null;
}

function pickKeyboardNeighbor(node, key) {
  const dir = arrowVector(key);
  if (!dir) return null;
  const candidates = keyboardNeighbors(node).map(({ node: next, link }) => {
    const dx = (next.__tx ?? next.x) - (node.__tx ?? node.x);
    const dy = (next.__ty ?? next.y) - (node.__ty ?? node.y);
    const dist = Math.max(1, Math.hypot(dx, dy));
    const align = (dx * dir.x + dy * dir.y) / dist;
    const lateral = Math.abs(dx * dir.y - dy * dir.x) / dist;
    const laneDelta = (next.__lane ?? node.__lane ?? 0) - (node.__lane ?? next.__lane ?? 0);
    const verticalIntent = key === 'ArrowUp' || key === 'ArrowDown';
    const crossLaneBonus = verticalIntent && ((key === 'ArrowUp' && laneDelta < 0) || (key === 'ArrowDown' && laneDelta > 0)) ? 2.4 : 0;
    const sameLaneToolPenalty = verticalIntent && link.kind === 'contains' && laneDelta === 0 ? 1.4 : 0;
    return {
      next, link, dist, align, lateral,
      score: align * 4 + crossLaneBonus - sameLaneToolPenalty - lateral - Math.min(dist / 1200, 0.8)
    };
  }).filter(c => Number.isFinite(c.score));
  const directional = candidates.filter(c => c.align > 0.18);
  const pool = directional.length ? directional : candidates;
  return pool.sort((a, b) => b.score - a.score || a.dist - b.dist)[0] || null;
}

function handleGraphArrowKey(key) {
  let current = keyboardNodeById(keyboardNodeId);
  if (!current) {
    current = keyboardSeedNode();
    return selectKeyboardNode(current);
  }
  const picked = pickKeyboardNeighbor(current, key);
  if (!picked) {
    updateKeyboardStatus(current, 'No connected node in that direction.');
    return true;
  }
  return selectKeyboardNode(picked.next);
}

function ensureKeyboardNodeVisible() {
  if (!keyboardNodeId) return;
  const node = keyboardNodeById(keyboardNodeId);
  if (!node) {
    clearKeyboardNode();
    return;
  }
  setHoverNode(node);
}

// ── Graph init ──
let fg;
function initGraph(data) {
  const elem = document.getElementById('graph');
  fg = ForceGraph()(elem)
    .graphData(data)
    .nodeId('id')
    .nodeLabel(() => '')
    .nodeCanvasObjectMode(() => 'replace')
    .nodeCanvasObject((node, ctx, globalScale) => {
      if (isNaN(node.x) || isNaN(node.y)) return;
      if (node.padiControl) {
        drawPadiControlNode(node, ctx, globalScale);
        return;
      }

      const baseR = nodeRadius(node);
      const r = nodeVisualRadius(node, globalScale);
      const color = nodeColor(node);
      const isAgent = node.type === 'agent';
      const state = node.state;
      const completion = isAgent ? (nodeMetrics.gc[node.id] || 0) : 0;
      const isSynthetic = !!node.synthetic;
      const keyboardSelected = keyboardNodeId === node.id;
      const multiSelected = selectedNodeIds.has(node.id);
      const highlighted = hoverNodeIds.has(node.id) || keyboardSelected || multiSelected;
      const hoverDim = (hoverNode || hoverLink || keyboardNodeId) && !highlighted;

      // Alpha: dim for blank/building, extra-dim for shared and synthetic
      let alpha = 1.0;
      if (node.type === 'bundle') alpha = 0.95;   // bundle blobs read as solid, not "blank"
      else if (state === 'blank') alpha = 0.35;
      else if (state === 'building') alpha = 0.6;
      else if (state === 'error') alpha = 0.75;
      if (node.shared) alpha *= 0.5;
      if (isSynthetic) alpha *= 0.85;
      if (isPinnedRailNode(node)) alpha *= 0.7; // Rail nodes are muted
      if (hoverDim) alpha *= 0.22;

      // ── Outer silhouette ──
      if (highlighted) {
        nodeShapePath(ctx, node, node.x, node.y, r + 5 / globalScale, globalScale);
        ctx.fillStyle = rgba(color, 0.1);
        ctx.fill();
      }
      if (keyboardSelected) {
        nodeShapePath(ctx, node, node.x, node.y, r + 8 / globalScale, globalScale);
        ctx.strokeStyle = rgba('#e6edf3', 0.95);
        ctx.lineWidth = 1.35 / globalScale;
        ctx.setLineDash([4 / globalScale, 3 / globalScale]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      if (multiSelected && !keyboardSelected) {
        nodeShapePath(ctx, node, node.x, node.y, r + 8 / globalScale, globalScale);
        ctx.strokeStyle = rgba('#7ee787', 0.92);
        ctx.lineWidth = 1.4 / globalScale;
        ctx.setLineDash([2 / globalScale, 2 / globalScale]);
        ctx.stroke();
        ctx.setLineDash([]);
      }
      nodeShapePath(ctx, node, node.x, node.y, r, globalScale);
      ctx.fillStyle = rgba(color, alpha * (node.type === 'bundle' ? 0.3 : 0.22));
      ctx.fill();
      ctx.strokeStyle = rgba(color, alpha);
      ctx.lineWidth = (highlighted ? 2.4 : 1.5) / globalScale;
      if (node.shared) ctx.setLineDash([3 / globalScale, 3 / globalScale]);
      if (isSynthetic) ctx.setLineDash([4 / globalScale, 3 / globalScale]);
      if (isPinnedRailNode(node)) ctx.setLineDash([2 / globalScale, 2 / globalScale]);
      ctx.stroke();
      ctx.setLineDash([]);

      // ── Fill arc (gate completion, agents only) ──
      if (isAgent && completion > 0) {
        const innerR = r - 1.5 / globalScale;
        ctx.save();
        nodeShapePath(ctx, node, node.x, node.y, r - 0.5 / globalScale, globalScale);
        ctx.clip();
        ctx.beginPath();
        ctx.moveTo(node.x, node.y);
        ctx.arc(node.x, node.y, innerR, -Math.PI / 2, -Math.PI / 2 + completion * 2 * Math.PI);
        ctx.closePath();
        ctx.fillStyle = color + hexAlpha(0.55 * (node.shared ? 0.5 : 1));
        ctx.fill();
        ctx.restore();
      }
      drawNodeInteriorGlyph(node, ctx, r, globalScale, color, alpha);

      // ── Status symbol (agents only) ──
      if (isAgent) {
        const symSize = (padiScreenStableNodes() ? baseR : r) * 0.55;
        if (state === 'blank') {
          ctx.beginPath();
          ctx.arc(node.x, node.y, 1.2 / globalScale, 0, 2 * Math.PI);
          ctx.fillStyle = '#8b949e';
          ctx.fill();
        } else if (state === 'building') {
          drawWarningTriangle(ctx, node.x, node.y, symSize, globalScale);
        } else if (state === 'error') {
          drawX(ctx, node.x, node.y, symSize, globalScale);
        } else if (state === 'live') {
          ctx.beginPath();
          ctx.arc(node.x, node.y, r + 2.5 / globalScale, 0, 2 * Math.PI);
          ctx.strokeStyle = '#3fb950';
          ctx.lineWidth = 2 / globalScale;
          ctx.stroke();
        }
      }
      drawNodeBadges(node, ctx, r, globalScale, color);

      // ── Label ── Tool names stay quiet in overview, then appear as you zoom
      // into the tool row. Bundle names are emphasized — that's the label that
      // matters at a glance.
      const showZoomedToolLabel = node.type === 'tool' && zoomedToolLabelsVisible(globalScale);
      if (node.type !== 'tool' || highlighted || showZoomedToolLabel) {
        const rawLabel = node.name;
        const big = node.type === 'bundle' ? 1.08 : 1;
        const baseFontSize = (padiScreenStableNodes() && !isPinnedRailNode(node)
          ? 11 / globalScale
          : (isPinnedRailNode(node) ? Math.max(10, 11 / globalScale) : Math.max(9, 11 / globalScale))) * big;
        const fontSize = node.type === 'tool' ? baseFontSize * 0.82 : baseFontSize;
        ctx.font = `${node.type === 'bundle' ? '600 ' : ''}${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
        const toolLabelMaxPx = highlighted ? 140 : Math.min(132, 64 + globalScale * 56);
        const label = truncateLabel(ctx, rawLabel, (node.type === 'tool' ? toolLabelMaxPx : node.type === 'bundle' ? 92 : 130) / globalScale);
        if (isPinnedRailNode(node)) {
          // Rail nodes: label to the right, vertically centered
          ctx.save();
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillStyle = rgba(color, hoverDim ? 0.32 : 0.9);
          ctx.fillText(label, node.x + r + 5 / globalScale, node.y);
          ctx.restore();
        } else {
          ctx.textAlign = 'center';
          const labelY = node.type === 'bundle'
            ? node.y + Math.max(r, node.__toolHaloR || 0) + 5 / globalScale
            : node.y + r + 3 / globalScale;
          if (node.type === 'tool') {
            const labelAlpha = highlighted ? 1 : zoomedToolLabelAlpha(globalScale);
            const w = ctx.measureText(label).width + 6 / globalScale;
            const h = fontSize + 4 / globalScale;
            const midY = labelY + h / 2;
            ctx.save();
            roundRectPath(ctx, node.x - w / 2, midY - h / 2, w, h, 4 / globalScale);
            ctx.fillStyle = rgba('#0d1117', (hoverDim ? 0.42 : 0.72) * labelAlpha);
            ctx.fill();
            ctx.strokeStyle = rgba(color, (hoverDim ? 0.24 : 0.48) * labelAlpha);
            ctx.lineWidth = 0.75 / globalScale;
            ctx.stroke();
            ctx.fillStyle = rgba('#e6edf3', (hoverDim ? 0.38 : 0.9) * labelAlpha);
            ctx.textBaseline = 'middle';
            ctx.fillText(label, node.x, midY + 0.2 / globalScale);
            ctx.restore();
          } else {
            ctx.textBaseline = 'top';
            ctx.fillStyle = hoverDim ? rgba('#8b949e', 0.38) : node.type === 'bundle' ? '#f0c890' : (node.shared ? '#8b949e' : '#c9d1d9');
            ctx.fillText(label, node.x, labelY);
          }
        }
      }
    })
    .nodePointerAreaPaint((node, color, ctx, globalScale) => {
      if (node.padiControl) {
        paintPadiControlHitArea(node, color, ctx, globalScale);
        return;
	      }
	      const r = nodeVisualRadius(node, globalScale);
	      ctx.fillStyle = color;
	      nodeShapePath(ctx, node, node.x, node.y, r + 5 / globalScale, globalScale);
	      ctx.fill();
	    })
    .linkColor(l => {
      if (l.kind === 'depends-on') return 'rgba(165,214,255,0.4)'; // dependency rail
      if (l.kind === 'runs-on' || l.kind === 'runs-in') return 'rgba(200,160,255,0.4)'; // infra rail
      return '#30363d';
    })
    .linkDirectionalArrowLength(() => isPadiLens() ? 0 : 6)
    .linkDirectionalArrowRelPos(0.95)
	    .linkLabel(l => l.kind)
	    .linkWidth(l => (hoverLink === l || hoverLinks.has(l)) ? 2 : 1)
	    .linkCanvasObjectMode(() => isPadiLens() ? 'replace' : undefined)
	    .linkCanvasObject((link, ctx, scale) => { if (isPadiLens()) drawPadiLink(link, ctx, scale); })
	    .linkPointerAreaPaint((link, color, ctx, scale) => paintPadiLinkHitArea(link, color, ctx, scale))
	    .linkDirectionalParticles(0)
	    .autoPauseRedraw(false)
    .onRenderFramePre((ctx, scale) => {
      // PADI lanes and optional rail columns are graph-space surfaces, so they
      // zoom and pan with the live graph instead of fighting the camera.
      try {
        drawPadiLaneSheet(ctx, scale);
        const gNodes = fg.graphData().nodes;
        if (showDepRail) {
          const dn = gNodes.filter(n => n.rail === 'dependency' && !isPadiDataSourceNode(n));
          if (dn.length) {
            const cx = dn.reduce((s,n) => s + n.x, 0) / dn.length;
            const cy = dn.reduce((s,n) => s + n.y, 0) / dn.length;
            const hw = 100, hh = dn.length * 50;
            ctx.fillStyle = 'rgba(86,212,221,0.04)';
            ctx.fillRect(cx - hw, cy - hh, hw * 2, hh * 2);
            ctx.strokeStyle = 'rgba(86,212,221,0.1)';
            ctx.lineWidth = 1 / scale;
            ctx.strokeRect(cx - hw, cy - hh, hw * 2, hh * 2);
            ctx.fillStyle = 'rgba(86,212,225,0.7)';
            ctx.font = `bold ${11 / scale}px -apple-system, sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
            ctx.fillText('DEPENDENCIES', cx, cy - hh - 6 / scale);
          }
        }
        if (showInfraRail) {
          const ig = gNodes.filter(n => n.rail === 'infrastructure');
          if (ig.length) {
            const cx = ig.reduce((s,n) => s + n.x, 0) / ig.length;
            const cy = ig.reduce((s,n) => s + n.y, 0) / ig.length;
            const hw = 120, hh = ig.length * 55;
            ctx.fillStyle = 'rgba(200,160,255,0.04)';
            ctx.fillRect(cx - hw, cy - hh, hw * 2, hh * 2);
            ctx.strokeStyle = 'rgba(200,160,255,0.1)';
            ctx.lineWidth = 1 / scale;
            ctx.strokeRect(cx - hw, cy - hh, hw * 2, hh * 2);
            ctx.fillStyle = 'rgba(200,160,255,0.7)';
            ctx.font = `bold ${11 / scale}px -apple-system, sans-serif`;
            ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
            ctx.fillText('INFRASTRUCTURE', cx, cy - hh - 6 / scale);
          }
        }
      } catch(e) { /* rail rendering is non-critical */ }
    })
    .onRenderFramePost((ctx, scale) => {
      drawLiveParticles(ctx, scale);
      positionSwimlaneControls();
    })
    .onZoom(() => {
      if (isPadiLens() && viewMode !== 'agent') layoutPadi();
      positionSwimlaneControls();
    })
    .onNodeDrag(node => {
      snapPadiControlNode(node);
    })
    .onNodeDragEnd(node => {
      if (snapPadiControlNode(node) && typeof fg.d3ReheatSimulation === 'function') {
        fg.d3ReheatSimulation();
      }
    })
    .onNodeClick((node, event) => {
      if (node?.padiControl) { handlePadiControlClick(node); return; }
      // Wire mode: handle wire target click
      if (wireMode) { handleWireClick(node); return; }
      // Chat synthetic node → open sidecar on Agent tab
      if (node?.artifact?.startsWith('agent-chat:')) {
        openSidecar(node.artifact.replace('agent-chat:', ''), 'agent');
        return;
      }
      // Focus mode: synthetic node → switch workbench tab
      if (node.synthetic && node.id.startsWith('focus:') && focusedAgentId) {
        const suffix = node.id.split(':').pop();
        const section = ['tools', 'evals', 'runtime'].includes(suffix) ? suffix : (suffix === 'generate' || suffix === 'verify' ? 'run' : 'config');
        openAgentWorkbench(focusedAgentId, section);
        return;
      }
      if (event?.shiftKey) {
        _lastClick = { id: null, ts: 0 };
        toggleGraphSelection(node);
        selectKeyboardNode(node, { center: false });
        return;
      }
      // Double-click detector for agent focus
      if (node.type === 'agent' && _maybeDoubleClick(node)) {
        enterAgentFocus(node.id);
        return;
      }
      // Lineage lens: click agent to set root
      if (currentLens === 'lineage' && node.type === 'agent') {
        lineageRoot = node.id;
        renderLens();
      }
      setSingleGraphSelection(node);
      selectKeyboardNode(node, { center: false });
      // Always open inspect panel on click
      openInspect(node);
    })
	    .onNodeHover(node => {
	      if (node) setHoverNode(node);
	      else if (keyboardNodeId) ensureKeyboardNodeVisible();
	      else setHoverNode(null);
	      if (node) {
	        tooltip.style.display = 'block';
	        const extra = node.members ? `<br>channels: ${node.members.join(', ')}` : '';
	        const sharedTag = node.shared ? '<br><span style="color:#8b949e">shared component</span>' : '';
	        const cc = nodeMetrics.cc[node.id] || 0;
	        const gc = node.type === 'agent' ? Math.round((nodeMetrics.gc[node.id] || 0) * 100) : null;
	        const gcStr = gc !== null ? ` · gates: ${gc}%` : '';
	        tooltip.innerHTML = `
	          <strong>${node.name}</strong> <span style="color:${nodeColor(node)}">${node.type}</span>${sharedTag}<br>
	          state: <b>${node.state}</b> · role: ${node.role} · links: ${cc}${gcStr}<br>
	          artifact: <code style="font-size:10px">${node.artifact || '—'}</code><br>
	          gates: L0:${node.gates?.L0?'✓':'✗'} L1:${node.gates?.L1?'✓':'✗'} L2:${node.gates?.L2?'✓':'✗'} L3:${node.gates?.L3?'✓':'✗'}${extra}
	        `;
	        const pt = fg?.graph2ScreenCoords ? fg.graph2ScreenCoords(node.x, node.y) : { x: node.x, y: node.y };
	        tooltip.style.left = (pt.x + nodeRadius(node) + 16) + 'px';
	        tooltip.style.top = (pt.y - 10) + 'px';
	      } else {
	        tooltip.style.display = 'none';
	      }
	    })
	    .onLinkHover(link => {
	      setHoverLink(link);
	      if (link) {
	        const s = lid(link.source), t = lid(link.target);
	        const label = padiLinkLabelText(link, true) || (link.kind || 'link');
	        tooltip.style.display = 'block';
	        tooltip.innerHTML = `
	          <strong>${label}</strong> <span style="color:${padiLinkColor(link, 1)}">${link.kind || 'link'}</span><br>
	          source: <code style="font-size:10px">${s}</code><br>
	          target: <code style="font-size:10px">${t}</code>${link.inactive ? '<br><span style="color:#d29922">inactive in this bundle</span>' : ''}
	        `;
	        const source = link.source, target = link.target;
	        const mx = source && target ? (source.x + target.x) / 2 : 0;
	        const my = source && target ? (source.y + target.y) / 2 : 0;
	        const pt = fg?.graph2ScreenCoords ? fg.graph2ScreenCoords(mx, my) : { x: mx, y: my };
	        tooltip.style.left = (pt.x + 12) + 'px';
	        tooltip.style.top = (pt.y + 12) + 'px';
	      } else if (!hoverNode) {
	        tooltip.style.display = 'none';
	      }
	    })
    .dagMode('td')
    .dagLevelDistance(80)
    .cooldownTicks(100);
  window.fg = fg; // expose for debugging
  installPadiRoutePinDragging(elem);

  // Build the swim-lane controls and keep the canvas, sheet, and node targets
  // in sync with the container size (force-graph auto-sizing is unreliable
  // when the panel/viewport changes, which left the canvas at 0×0).
  buildSwimlaneOverlay();
  buildSwimlaneControls();
  const wrapEl = document.getElementById('graph-wrap');
  const syncSize = () => {
    fg.width(wrapEl.clientWidth).height(wrapEl.clientHeight);
    if (isPadiLens() && viewMode !== 'agent') {
      layoutPadi();
      fitPadiToViewport(0);
    }
  };
  if (window.ResizeObserver) new ResizeObserver(syncSize).observe(wrapEl);
  syncSize();
}

function renderLens() {
  const vd = getVisibleData();
  fg.graphData(vd);
  ensureKeyboardNodeVisible();
  if (currentLens === 'tier') fg.dagMode('td').dagLevelDistance(80);
  else fg.dagMode(null);
  applyLayout(vd);
  applyForces();
  // In PADI mode, hold nodes on the graph-space factory floor.
  if (isPadiLens()) {
    layoutPadi();
    fg.cooldownTicks(Infinity);   // keep the sheet alive (floaty)…
    fg.cooldownTime(Infinity);    // …the engine also stops after cooldownTime (15s default)
    fg.enableZoomInteraction(true).enablePanInteraction(true);
    if (padiFitPending) {
      padiFitPending = false;
      requestAnimationFrame(() => fitPadiToViewport(650));
    }
  } else {
    document.getElementById('swimlane-overlay').classList.remove('on');  // sheet is PADI-only
    document.getElementById('swimlane-controls').classList.remove('on');
    fg.enableZoomInteraction(true).enablePanInteraction(true);
    fg.cooldownTicks(150);
    fg.cooldownTime(15000);
  }
  fg.d3ReheatSimulation();
  const tag = isPadiLens() ? ' · swim lanes' : '';
  const clusterTag = currentCluster ? ` · ${currentCluster}` : '';
  if (viewMode === 'agent' && focusedAgentId) {
    info.textContent = `${vd.nodes.length} focused nodes · agent: ${cleanAgentId(focusedAgentId)} · project: ${currentCluster || '—'}`;
  } else {
    const displayNodeCount = vd.nodes.filter(n => !n.padiControl).length;
    info.textContent = `${displayNodeCount} nodes · ${vd.links.length} links · lens: ${currentLens}${tag}${clusterTag}`;
  }
  updateViewCrumb();
  updateSelectionPanel();
}

// Load the built-agent registry → library chips for the Agent·Logic lane.
function loadRegistryAgents() {
  fetch(apiUrl('registry/agents/agents.yaml'))
    .then(r => r.text())
    .then(text => {
      // Crude YAML parse — extract agent ids from "  <id>:" lines under "agents:"
      const ids = [];
      let inAgents = false;
      for (const line of text.split('\n')) {
        if (line.startsWith('agents:')) { inAgents = true; continue; }
        if (inAgents && /^  [a-z][a-z0-9_]*:/.test(line)) ids.push(line.trim().replace(':', ''));
        if (inAgents && line && !line.startsWith('  ')) break;
      }
      registryAgentIds = ids;
      renderLaneLibraries();
      if (fg && isPadiLens() && viewMode !== 'agent') renderLens();
    })
    .catch(() => {});
}

function setLaneMsg(el, cls, txt) { if (el) { el.className = 'lane-msg ' + cls; el.textContent = txt; } }
function clusterHasAgent(id) {
  return !!(graphData && graphData.nodes && graphData.nodes.some(n => n.id === 'agent:' + id));
}

function clusterHasNode(nodeId) {
  return !!(graphData && graphData.nodes && graphData.nodes.some(n => n.id === nodeId));
}

function findGraphNode(nodeId) {
  return (graphData?.nodes || []).find(n => n.id === nodeId);
}

const NODE_PREFIX = { tool: 'tool', interface: 'iface', router: 'router' };

function graphNodeLibrary(nodeType) {
  let nodes = graphData?.nodes || [];
  if (nodeType === 'intake') {
    nodes = collapseIntake({ nodes, links: [] }).nodes;
  }
  return nodes
    .filter(n => n.type === nodeType)
    .map(n => ({
      id: n.id.replace(NODE_PREFIX[nodeType] + ':', ''),
      name: n.name || n.id.replace(NODE_PREFIX[nodeType] + ':', ''),
      inCluster: clusterHasNode(n.id),
    }));
}

// Tool bundles: one entry per distinct bundle_key (deduped across the per-agent
// bundle nodes), with its member tools (the `contains` links) for the picker.
function graphBundleLibrary() {
  const nodes = graphData?.nodes || [];
  const links = graphData?.links || [];
  const byKey = {};
  nodes.filter(n => n.type === 'bundle').forEach(n => {
    const key = n.bundle_key || n.name;
    if (!byKey[key]) {
      const children = links
        .filter(l => lid(l.source) === n.id && l.kind === 'contains')
        .map(l => lid(l.target).replace(/^tool:/, ''));
      byKey[key] = {
        id: key, name: key,
        tools_count: (n.tools_count != null ? n.tools_count : children.length),
        children,
        inactive: n.inactive_tools || [],
        inCluster: false,
      };
    }
    if (clusterHasNode(n.id)) byKey[key].inCluster = true;
  });
  return Object.values(byKey);
}

function inspectBundle(bundleKey) {
  const n = (graphData?.nodes || []).find(x => x.type === 'bundle' && (x.bundle_key === bundleKey || x.name === bundleKey));
  if (n) openInspect(n);
}

function inspectGraphNode(spawnerKey, itemId) {
  const node = findGraphNode(NODE_PREFIX[spawnerKey] + ':' + itemId);
  if (node) openInspect(node);
}

// Shared actions, reused by both the spawn form and drag/click-to-add.
async function spawnBlankAgent(id, desc, msgEl) {
  id = (id || '').trim();
  if (!id) { setLaneMsg(msgEl, 'err', 'Enter an agent_id'); return; }
  if (!/^[a-z][a-z0-9_]*$/.test(id)) { setLaneMsg(msgEl, 'err', 'Invalid id (a-z, 0-9, _)'); return; }
  if (!(await ensureGraphSecret())) { setLaneMsg(msgEl, 'err', 'Edits locked'); return; }
  setLaneMsg(msgEl, '', 'Spawning…');
  let body = `id=${encodeURIComponent(id)}&model=gpt-5.5&description=${encodeURIComponent((desc || '').trim() || id + ' agent')}`;
  if (currentCluster) body += `&cluster=${encodeURIComponent(currentCluster)}`;
  fetch(apiUrl('/spawn'), { method: 'POST', headers: mutationHeaders(), body })
    .then(r => r.json())
    .then(data => {
      if (!data.ok) { setLaneMsg(msgEl, 'err', data.error || 'Spawn failed'); return; }
      const suffix = data.already_exists ? 'already exists' : 'created';
      setLaneMsg(msgEl, 'ok', `✓ ${data.agent_id} ${suffix}`);
      setTimeout(() => {
        loadRegistryAgents();
        loadGraph(currentCluster);
      }, 500);
    })
    .catch(err => setLaneMsg(msgEl, 'err', 'Server error: ' + err.message));
}
async function addAgentToCluster(agentId, msgEl) {
  if (!currentCluster) { setLaneMsg(msgEl, 'err', 'No cluster selected'); return; }
  if (!(await ensureGraphSecret())) { setLaneMsg(msgEl, 'err', 'Edits locked'); return; }
  setLaneMsg(msgEl, '', 'Adding…');
  const body = `cluster=${encodeURIComponent(currentCluster)}&agent_id=${encodeURIComponent(agentId)}`;
  fetch(apiUrl('/add-agent'), { method: 'POST', headers: mutationHeaders(), body })
    .then(r => r.json())
    .then(data => {
      if (!data.ok) { setLaneMsg(msgEl, 'err', data.error || 'Failed'); return; }
      setLaneMsg(msgEl, 'ok', data.already_member ? `✓ already in ${currentCluster}` : `✓ Added ${agentId}`);
      setTimeout(() => loadGraph(currentCluster), 500);
    })
    .catch(err => setLaneMsg(msgEl, 'err', 'Server error: ' + err.message));
}

// existing picker/inspect code available without showing "new" affordances.

  agent: {
    blankLabel: 'New agent',
    formFields: [{ ph: 'agent_id' }, { ph: 'description (optional)' }],
    spawnBlank(vals, msg) { spawnBlankAgent(vals[0], vals[1], msg); },
    hideCanvasLibrary: true,
    library() { return registryAgentIds.map(id => ({ id, name: id, inCluster: clusterHasAgent(id) })); },
    onDrop(item, msg) { addAgentToCluster(item.id, msg); },
  },
  tool: {
    blankLabel: 'New bundle',
    disabled: true,
    isBundle: true,                                  // picker is restricted to bundles, not loose tools
    hideCanvasLibrary: true,
    hideLaneLibrary: true,
    library() { return graphBundleLibrary(); },
    onDrop(item, msg) { inspectBundle(item.id); },
  },
  interface: {
    blankLabel: 'New interface',
    disabled: true,
    hideCanvasLibrary: true,
    hideLaneLibrary: true,
    library() { return graphNodeLibrary('intake'); },
    onDrop(item, msg) { inspectGraphNode('interface', item.id); },
  },
  datasource: {
    blankLabel: 'New data source',
    disabled: true,
  },
};
const LANE_KEY_TO_SPAWNER = { interfaces: 'interface', agent: 'agent', tools: 'tool', datasources: 'datasource' };

// Build the per-lane header controls once (above the canvas).
function buildSwimlaneControls() {
  const layer = document.getElementById('swimlane-controls');
  if (!layer || layer.childElementCount) return;
  PADI_LANES.forEach((lane, laneIndex) => {
    const sk = LANE_KEY_TO_SPAWNER[lane.key];
    const sp = LANE_SPAWNERS[sk] || {};
    const row = document.createElement('div');
    row.className = 'swimlane-ctrl-row';
    row.dataset.lane = lane.key;
    row.dataset.laneIndex = String(laneIndex);
    row.dataset.spawner = sk;
    row.style.setProperty('--lane-hue', `rgb(${lane.hue})`);

    const header = document.createElement('div');
    header.className = 'swimlane-header' + (sp.disabled ? ' disabled' : '');

    const label = document.createElement('span');
    label.className = 'swimlane-label';
    label.textContent = lane.label;
    header.appendChild(label);

    const form = document.createElement('div');
    form.className = 'lane-form';
    form.hidden = true;
    const msg = document.createElement('span');
    msg.className = 'lane-msg';
    if (!sp.disabled && sp.formFields) {
      const inputs = sp.formFields.map(f => { const i = document.createElement('input'); i.placeholder = f.ph; return i; });
      inputs.forEach(i => form.appendChild(i));
      const go = document.createElement('button');
      go.textContent = 'Spawn';
      go.addEventListener('click', () => sp.spawnBlank(inputs.map(i => i.value), msg));
      form.appendChild(go);
    }
    header.appendChild(form);
    header.appendChild(msg);

    const lib = document.createElement('div');
    lib.className = 'lane-lib';
    lib.dataset.lib = sk;
    header.appendChild(lib);

    row.appendChild(header);

    // Drop target (active only while a chip of this lane is being dragged).
    if (!sp.disabled) {
      row.addEventListener('dragover', e => {
        if (dragItem && dragItem.laneKey === lane.key) { e.preventDefault(); row.classList.add('drop-ok'); }
      });
      row.addEventListener('dragleave', () => row.classList.remove('drop-ok'));
      row.addEventListener('drop', e => {
        e.preventDefault(); row.classList.remove('drop-ok');
        if (dragItem && dragItem.laneKey === lane.key && !dragItem.inCluster) sp.onDrop(dragItem, msg);
      });
    }
    layer.appendChild(row);
  });
}

// (Re)populate each lane's library strip; in-cluster items are dimmed + non-draggable.
// Expanded-state of bundle groups in the picker (persists across re-renders).
const bundleExpanded = new Set();

function makeChip(it, laneKey, sp, msgEl) {
  const chip = document.createElement('div');
  chip.className = 'lane-chip' + (it.inCluster ? ' in-cluster' : '');
  chip.textContent = it.name;
  if (it.inCluster) {
    chip.title = 'already in cluster';
  } else {
    chip.draggable = true;
    chip.title = 'drag into lane or click to add';
    chip.addEventListener('dragstart', e => {
      dragItem = { laneKey, id: it.id, inCluster: false };
      document.body.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'copy';
      e.dataTransfer.setData('text/plain', it.id);
    });
    chip.addEventListener('dragend', () => {
      dragItem = null;
      document.body.classList.remove('dragging');
      document.querySelectorAll('.swimlane-ctrl-row').forEach(r => r.classList.remove('drop-ok'));
    });
    chip.addEventListener('click', () => sp.onDrop({ id: it.id }, msgEl));
  }
  return chip;
}

// A bundle renders as a collapsible group: a gold bundle chip (name + tool count +
// chevron) over a hidden row of its member-tool chips. Click the chip to expand.
function makeBundleGroup(b) {
  const group = document.createElement('div');
  group.className = 'lane-bundle-group';
  const open0 = bundleExpanded.has(b.id);
  const chip = document.createElement('div');
  chip.className = 'lane-bundle-chip' + (open0 ? ' open' : '');
  chip.title = 'click to expand its tools';
  chip.innerHTML = `<span class="chev">▶</span><span>${b.name}</span><span class="count">${b.tools_count}</span>`;
  const kids = document.createElement('div');
  kids.className = 'lane-bundle-children' + (open0 ? ' open' : '');
  (b.children || []).forEach(t => {
    const inactive = (b.inactive || []).includes(t);
    const tc = document.createElement('div');
    tc.className = 'tool-child' + (inactive ? ' inactive' : '');
    tc.textContent = t;
    tc.title = inactive ? 'deactivated for this agent' : 'tool: ' + t + ' (click to inspect)';
    if (!inactive) tc.addEventListener('click', () => inspectGraphNode('tool', t));
    kids.appendChild(tc);
  });
  chip.addEventListener('click', () => {
    const open = chip.classList.toggle('open');
    kids.classList.toggle('open', open);
    if (open) bundleExpanded.add(b.id); else bundleExpanded.delete(b.id);
  });
  group.appendChild(chip);
  group.appendChild(kids);
  return group;
}

function renderLaneLibraries() {
  const layer = document.getElementById('swimlane-controls');
  if (!layer) return;
  PADI_LANES.forEach(lane => {
    const sk = LANE_KEY_TO_SPAWNER[lane.key];
    const sp = LANE_SPAWNERS[sk] || {};
    const lib = layer.querySelector(`.lane-lib[data-lib="${sk}"]`);
    if (!lib) return;
    lib.innerHTML = '';
    if (sp.hideLaneLibrary) return;
    if (!sp.library) return;
    const items = sp.library();
    if (!items.length) {
      const e = document.createElement('span');
      e.className = 'lane-msg'; e.style.opacity = '0.5';
      e.textContent = sp.isBundle ? 'no bundles yet' : `no built ${sk}s yet`;
      lib.appendChild(e); return;
    }
    const msgEl = layer.querySelector(`.swimlane-ctrl-row[data-spawner="${sk}"] .lane-msg`);
    if (sp.isBundle) {
      items.forEach(b => lib.appendChild(makeBundleGroup(b)));
    } else {
      items.forEach(it => lib.appendChild(makeChip(it, lane.key, sp, msgEl)));
    }
  });
}

// ── Pulse (live traffic particles) ──
let pulseInterval;
function startPulse() {
  pulseInterval = setInterval(() => {
    fetch(apiUrl('/pulse'))
      .then(r => r.json())
      .then(p => {
        if (fg && p.active_edges) {
          liveNodeIds = new Set();
          p.active_edges.forEach(e => { liveNodeIds.add(e.source); liveNodeIds.add(e.target); });
          // Map collapsed intake nodes: if any member channel is live, the collapsed iface node is live too
          if (graphData && graphData.nodes) {
            graphData.nodes.forEach(n => {
              if (n.type === 'intake' && n.members) {
                if (n.members.some(m => liveNodeIds.has('chan:' + m) || liveNodeIds.has(m))) {
                  liveNodeIds.add(n.id);
                }
              }
            });
          }
          fg.linkColor(l => {
            const s = lid(l.source), t = lid(l.target);
            return liveNodeIds.has(s) || liveNodeIds.has(t) ? '#2ea043' : '#30363d';
          });
          fg.linkWidth(l => {
            const s = lid(l.source), t = lid(l.target);
            return liveNodeIds.has(s) || liveNodeIds.has(t) ? 2 : 1;
          });
          const pulseStr = p.bridge_alive ? '🌉' : '';
          const authStr = p.authsome_alive ? '🔐' : '';
          const llmStr = p.litellm_alive ? '🧠' : '';
          const liveStr = [pulseStr, authStr, llmStr].filter(Boolean).join(' ');
          const clusterTag = currentCluster ? ` · ${currentCluster}` : '';
          if (isPadiLens() && viewMode !== 'agent') {
            const displayNodeCount = fg.graphData().nodes.filter(n => !n.padiControl).length;
            info.textContent = `${displayNodeCount} nodes · ${fg.graphData().links.length} links · lens: ${currentLens} · swim lanes${clusterTag}`;
          } else {
            info.textContent = `${graphData.node_count} nodes · ${graphData.link_count} links · ${p.active_edges.length} live edges ${liveStr}${clusterTag}`;
          }
        }
      })
      .catch(() => {});
  }, 3000);
}
