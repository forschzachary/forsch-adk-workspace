# Infrastructure topology for the ADK workspace
# Describes where agents run and what services support them.
# This is descriptive metadata, not live config — update when topology changes.
#
# Edge topology (post-2026-06-27 collapse):
#   browser -> https://graph.forschfrontiers.com (Cloudflare edge, orange-cloud)
#           -> cloudflared named tunnel (token mode, PID-managed on box)
#           -> 127.0.0.1:8888 (serve.py, localhost-only bind)
#   The tunnel is the SOLE inbound path. No Cloudflare Worker, no public port
#   on serve.py, no CRM graph_embed secret-injection proxy. Auth is X-Graph-Secret
#   on mutating endpoints; reads are unauthed with CORS pinned to CRM_ORIGIN.

hosts:
  - id: hetzner-vps
    name: "Hetzner VPS (hubertsp6)"
    provider: hetzner
    tailscale: hubert-cloud-sp6.tail818cf8.ts.net

containers:
  - id: adk-bridge
    name: "ADK Bridge"
    host: hetzner-vps
    port: 8800
    runs_agents: true

services:
  - id: litellm
    name: "LiteLLM (model gateway)"
    host: hetzner-vps
    port: 4000
    role: model_routing

  - id: authsome
    name: "Authsome (credential gateway)"
    host: hetzner-vps
    port: 7998
    role: credential_broker
    brokers: [github, resend, cloudflare-global, frappe-crm]

  - id: frappe-crm
    name: "Frappe CRM (ff-ops-prod)"
    host: railway
    url: crm.forschfrontiers.com
    role: crm_backend

  - id: serve-py
    name: "Live Agent Graph server (serve.py)"
    host: hetzner-vps
    bind: 127.0.0.1
    port: 8888
    role: graph_control_surface
    auth: x-graph-secret

networks:
  - id: tailscale
    name: "Tailscale mesh"
    type: mesh_vpn
    role: operator_access_only

tunnels:
  - id: cloudflare-named
    name: "Cloudflare named tunnel (cloudflared, token mode)"
    type: reverse_proxy
    routes:
      - hostname: graph.forschfrontiers.com
        target: 127.0.0.1:8888
        note: "Sole inbound path for the graph + chat iframe. serve.py reverse-proxies /chat/* to the ADK bridge at 127.0.0.1:8800."
      - hostname: chat.forschfrontiers.com
        target: 127.0.0.1:8800
        note: "Legacy separate route for the Gradio bridge. Superseded by the /chat/ proxy on the main hostname. Can be removed from the Cloudflare dashboard."
      - hostname: cockpit.forschfrontiers.com
        target: 127.0.0.1:8780
      - hostname: files.forschfrontiers.com
        target: 100.120.21.13:8334
      - hostname: litellm.forschfrontiers.com
        target: 127.0.0.1:4000
    note: "Managed via Cloudflare dashboard ingress config + on-box cloudflared daemon (PID-managed, not systemd)."
