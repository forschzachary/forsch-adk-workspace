# Shared Components — tools, models, and infrastructure common to all clusters
#
# Tools are organized into families. Each cluster picks which families to
# include via `config.tool_families` in its cluster.yaml, and can exclude
# individual tools via `config.exclude_tools`.
#
# A tool that an agent uses but is NOT in any requested family still appears
# as a non-shared (cluster-specific) node. The builder always wires agent tools.

tool_families:
  terminal:
    - get_workspace_inventory
    - get_git_state
    - validate_agent_imports
    - check_service_health
    - execute_bash_command
    - read_host_file
    - write_host_file
  household:
    - log_groceries
    - get_grocery_log
    - add_reminder
    - add_grocery_email_sender
    - remove_grocery_email_sender
    - list_grocery_email_senders
    - is_grocery_email_sender_allowed
    - log_grocery_email_receipt
  growth:
    - get_linkedin_brand_brief
    - score_linkedin_draft
    - create_linkedin_draft
    - list_linkedin_drafts
    - stage_linkedin_profile_update
    - create_linkedin_go_live_plan
    - record_linkedin_metric_snapshot
    - get_linkedin_metric_dashboard
    - run_linkedin_observability_cycle
    - list_linkedin_autonomous_actions
    - get_personal_site_launch_brief
    - audit_personal_site_launch
    - create_website_launch_task

# Legacy flat list (deprecated — kept for backward compat, builder prefers tool_families)
tools: []

# Models removed from graph canvas — shown in agent inspect panel only.
# Defined per-agent in agents.yaml.

connections:
  github: GitHub (OAuth)
  resend: Resend (email)
  cloudflare-global: Cloudflare (global)
  linkedin-manual: LinkedIn (manual approval)
  personal-site: Personal website

tool_connections:
  get_linkedin_brand_brief: linkedin-manual
  score_linkedin_draft: linkedin-manual
  create_linkedin_draft: linkedin-manual
  list_linkedin_drafts: linkedin-manual
  stage_linkedin_profile_update: linkedin-manual
  create_linkedin_go_live_plan: linkedin-manual
  record_linkedin_metric_snapshot: linkedin-manual
  get_linkedin_metric_dashboard: linkedin-manual
  run_linkedin_observability_cycle: linkedin-manual
  list_linkedin_autonomous_actions: linkedin-manual
  get_personal_site_launch_brief: personal-site
  audit_personal_site_launch: personal-site
  create_website_launch_task: personal-site
