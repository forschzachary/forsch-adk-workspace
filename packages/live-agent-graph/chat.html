<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hubert — AI Sidecar</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --text: #e0e0e0;
    --accent: #7ec8a0;
    --accent-dim: #5a9e7a;
    --user-bubble: #2d4a3e;
    --hubert-bubble: #16213e;
    --border: #2a2a4a;
    --muted: #888;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    font-size: 14px;
  }
  #header {
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  #header .avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }
  #header .title { font-weight: 600; }
  #header .subtitle { color: var(--muted); font-size: 12px; margin-left: auto; }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg {
    max-width: 85%;
    padding: 8px 12px;
    border-radius: 12px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .msg.hubert {
    align-self: flex-start;
    background: var(--hubert-bubble);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.error {
    align-self: center;
    background: #3a1a1a;
    color: #ff9999;
    font-size: 12px;
    border-radius: 8px;
  }
  #input-area {
    padding: 10px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  #input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-size: 14px;
    resize: none;
    outline: none;
    font-family: inherit;
  }
  #input:focus { border-color: var(--accent); }
  #send {
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  #send:hover { background: var(--accent-dim); }
  #send:disabled { opacity: 0.5; cursor: default; }
  .typing { color: var(--muted); font-style: italic; padding: 4px 12px; font-size: 12px; }
</style>
</head>
<body>
<div id="header">
  <div class="avatar">🐱</div>
  <div class="title">Hubert</div>
  <div class="subtitle" id="status">ready</div>
</div>
<div id="messages"></div>
<div id="input-area">
  <textarea id="input" rows="1" placeholder="Ask Hubert anything..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="send" onclick="send()">Send</button>
</div>

<script>
const API = '/chat';
let sessionId = null;

function addMsg(text, cls) {
  const div = document.createElement('div');
  div.className = 'msg ' + cls;
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}

function setStatus(s) {
  document.getElementById('status').textContent = s;
}

async function send() {
  const input = document.getElementById('input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg(msg, 'user');
  setStatus('thinking...');
  document.getElementById('send').disabled = true;

  const body = new URLSearchParams();
  body.append('message', msg);
  if (sessionId) body.append('session_id', sessionId);

  try {
    const res = await fetch(API, { method: 'POST', body });
    const data = await res.json();
    if (data.ok) {
      addMsg(data.response, 'hubert');
      if (data.session_id) sessionId = data.session_id;
      setStatus('ready');
    } else {
      addMsg('Error: ' + (data.error || 'unknown'), 'error');
      setStatus('error');
    }
  } catch (e) {
    addMsg('Connection error: ' + e.message, 'error');
    setStatus('offline');
  }
  document.getElementById('send').disabled = false;
  input.focus();
}

document.getElementById('input').focus();
</script>
</body>
</html>
